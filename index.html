<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ZHANG MENG YUAN — 我的空间</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #0a0a0a;
      --pink: #ef4cac;
      --pink-glow: rgba(239,76,172,0.6);
      --cyan: #60a5fa;
      --card-bg: rgba(255,255,255,0.025);
      --card-border: rgba(255,255,255,0.07);
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.65);
      --text-muted: rgba(255,255,255,0.42);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:var(--bg);
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      color:#fff;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow-x:hidden;
    }

    /* ── Shared background canvases ── */
    canvas#starfield, canvas#antigravity3d{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      pointer-events:none;
    }
    canvas#starfield{z-index:0}
    canvas#antigravity3d{z-index:2}

    /* ── Pink edge glow ── */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      background-image:
        linear-gradient(180deg, rgba(239,76,172,0.22), rgba(239,76,172,0.05) 45%, transparent 65%),
        linear-gradient(180deg, transparent 35%, rgba(239,76,172,0.05) 55%, rgba(239,76,172,0.22)),
        linear-gradient(90deg, rgba(239,76,172,0.22), rgba(239,76,172,0.05) 45%, transparent 65%),
        linear-gradient(90deg, transparent 35%, rgba(239,76,172,0.05) 55%, rgba(239,76,172,0.22));
      background-repeat:no-repeat;
      background-size:100% 24%, 100% 24%, 24% 100%, 24% 100%;
      background-position: top, bottom, left, right;
      filter: blur(20px);
      animation: pinkFlow 7.5s ease-in-out infinite;
      mix-blend-mode: screen;
    }
    @keyframes pinkFlow{
      0%,100%{opacity:0.75; transform: scale(1);}
      50%{opacity:0.92; transform: scale(1.02);}
    }

    /* ── PillNav ── */
    .pill-nav-container{
      position:fixed;top:1em;left:0;right:0;z-index:99;
      display:flex;justify-content:center;pointer-events:none;
      padding:0 2em;
    }
    .pill-nav{
      --nav-h:44px;
      --pill-pad-x:18px;
      --pill-gap:4px;
      display:flex;align-items:center;justify-content:space-between;
      width:100%;max-width:1200px;
      pointer-events:auto;
    }
    .pill-nav-left{
      display:flex;align-items:center;gap:10px;
    }
    .pill-nav-name{
      color:#fff;font-size:1rem;
      font-family:'SimSun','Songti SC','宋体',serif;
      font-weight:700;white-space:nowrap;
    }
    .pill-nav-items{
      display:flex;align-items:center;
      height:var(--nav-h);
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:9999px;
    }
    .pill-logo{
      width:var(--nav-h);height:var(--nav-h);
      border-radius:50%;
      background:rgba(239,76,172,0.15);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(239,76,172,0.3);
      display:inline-flex;align-items:center;justify-content:center;
      font-size:1.2rem;text-decoration:none;
      pointer-events:auto;flex-shrink:0;
      transition:all 0.3s;
    }
    .pill-logo:hover{
      background:rgba(239,76,172,0.3);
      box-shadow:0 0 20px rgba(239,76,172,0.25);
    }
    .pill-list{
      list-style:none;display:flex;align-items:stretch;
      gap:var(--pill-gap);margin:0;padding:3px;height:100%;
    }
    .pill-list>li{display:flex;height:100%}
    .pill{
      display:inline-flex;align-items:center;justify-content:center;
      height:100%;padding:0 var(--pill-pad-x);
      background:var(--pill-bg,rgba(255,255,255,0.08));
      color:var(--pill-text,#fff);
      text-decoration:none;border-radius:9999px;
      font-weight:600;font-size:0.82rem;
      font-family:'JetBrains Mono',monospace;
      text-transform:uppercase;letter-spacing:0.5px;
      white-space:nowrap;cursor:pointer;
      position:relative;overflow:hidden;
      transition:color 0.2s;
    }
    .pill .hover-circle{
      position:absolute;left:50%;bottom:0;
      border-radius:50%;
      background:var(--circle-bg,var(--pink));
      z-index:1;display:block;pointer-events:none;
      will-change:transform;
    }
    .pill .label-stack{
      position:relative;display:inline-block;line-height:1;z-index:2;
    }
    .pill .pill-label{
      position:relative;z-index:2;display:inline-block;line-height:1;
      will-change:transform;
    }
    .pill .pill-label-hover{
      position:absolute;left:0;top:0;
      color:var(--hover-text,#fff);
      z-index:3;display:inline-block;
      will-change:transform,opacity;
    }
    .pill.is-active{
      background:var(--circle-bg,var(--pink)) !important;
      color:#fff !important;
      box-shadow:0 4px 18px rgba(239,76,172,0.3);
    }
    .pill.is-active::after{
      content:'';position:absolute;bottom:-5px;left:50%;
      transform:translateX(-50%);
      width:10px;height:10px;background:var(--circle-bg,var(--pink));
      border-radius:50px;z-index:4;
    }

    @media (max-width:768px){
      .pill-nav-container{top:0.5em}
      .pill-nav{--nav-h:38px;--pill-pad-x:12px;gap:8px}
      .pill{font-size:0.7rem}
    }

    /* Hide old nav CSS classes */
    .top-nav,.logo,.logo-icon,.nav-links,.bubble-menu,.pill-list-inline,.pill-link-inline{display:none}

    /* ── SECTION 1: HERO ── */
    .section-hero{
      position:relative;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:5;
    }
    .hero-inner{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:24px;
    }
    #hero-title-root{
      z-index:6;
      position:relative;
    }
    .hero-title{
      margin:0;
      font-family:'SimHei','STHeiti','Heiti SC','黑体','Microsoft YaHei',sans-serif;
      font-weight:700;
      font-size:clamp(3.2rem,10vw,9rem);
      line-height:1.15;
      letter-spacing:3px;
      position:relative;
    }
    .hero-btn{
      display:inline-block;
      padding:12px 36px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.5);
      color:#ffffff;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      text-decoration:none;
      font-family:'JetBrains Mono',monospace;
      font-weight:600;
      font-size:0.9rem;
      letter-spacing:1px;
      transition:all 0.25s ease;
      z-index:7;
      position:relative;
    }
    .hero-btn:hover{
      background:rgba(255,255,255,0.22);
      border-color:rgba(255,255,255,0.8);
      box-shadow:0 0 30px rgba(239,76,172,0.2);
      transform:translateY(-2px);
    }
    .sr-only{
      position:absolute;
      width:1px;height:1px;padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);
      white-space:nowrap;border:0;
    }
    .float-dot{
      position:absolute;
      width:14px;height:14px;
      border-radius:50%;
      background:rgba(239,76,172,0.12);
      box-shadow:0 0 18px rgba(239,76,172,0.18);
      pointer-events:none;
      animation:floatSlow 12s ease-in-out infinite;
    }
    .dot-1{top:14%;left:16%;animation-duration:14s}
    .dot-2{top:26%;right:18%;animation-duration:10s}
    .dot-3{bottom:20%;left:20%;animation-duration:16s}
    .dot-4{bottom:16%;right:16%;animation-duration:13s}
    .dot-5{top:50%;right:10%;animation-duration:11s}
    @keyframes floatSlow{
      0%,100%{transform:translateY(0) translateX(0)}
      50%{transform:translateY(-12px) translateX(6px)}
    }



    /* ── SECTION 2: ABOUT ME (React ScrollStack) ── */
    .section-about{
      position:relative;
      z-index:5;
      min-height:100vh;
      padding-left:60px;
    }
    .about-page{
      display:grid;
      grid-template-columns:340px 1fr;
      min-height:100vh;
      max-width:1200px;
      margin:0 auto;
      padding:0 40px;
      gap:56px;
    }

    /* Left sticky sidebar */
    .about-left{
      position:sticky;
      top:0;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      padding:120px 40px 60px 0;
      z-index:10;
    }
    .about-left h2{
      margin:0;
      font-family:'SimSun','Songti SC','宋体',serif;
      font-weight:900;
      font-size:clamp(2.2rem,4.5vw,3.6rem);
      background:linear-gradient(135deg,#c084fc 0%,#60a5fa 50%,#34d399 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      line-height:1.2;
      letter-spacing:2px;
    }
    .about-left .name-en{
      font-family:'SimSun','Songti SC','宋体',serif;
      font-size:0.8rem;
      color:var(--text-muted);
      margin-top:4px;
      letter-spacing:2px;
    }
    .about-left .tagline-live{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:16px;
      padding:10px 20px;
      border-radius:999px;
      border:1px solid rgba(239,76,172,0.35);
      background:rgba(239,76,172,0.06);
      color:var(--pink);
      font-family:'SimSun','Songti SC','宋体',serif;
      font-size:0.82rem;
    }
    .about-left .tagline-live .dot{
      width:7px;height:7px;
      border-radius:50%;
      background:var(--pink);
      box-shadow:0 0 10px var(--pink-glow);
      animation:pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:0.35;transform:scale(1.6)}
    }
    .about-left .contact-block{
      margin-top:24px;
      padding-top:20px;
      border-top:1px solid rgba(255,255,255,0.06);
    }
    .about-left .contact-item{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
      font-size:0.84rem;
      color:var(--text-secondary);
      font-family:'SimSun','Songti SC','宋体',serif;
    }
    .about-left .contact-item .icon{
      font-size:0.95rem;
      width:22px;
      text-align:center;
    }
    .about-left .about-scroll-hint{
      margin-top:32px;
      font-family:'SimSun','Songti SC','宋体',serif;
      font-size:0.68rem;
      color:var(--text-muted);
      letter-spacing:2px;
      animation:hintPulse 2s ease-in-out infinite;
    }
    @keyframes hintPulse{
      0%,100%{opacity:0.25}
      50%{opacity:0.65}
    }

    /* Right area */
    .about-right{
      position:relative;
      padding-top:80px;
      padding-left:36px;
    }
    .about-section-title{
      font-family:'Inter',sans-serif;font-weight:900;
      font-size:2.8rem;color:#fff;margin:0 0 24px;
      letter-spacing:4px;
      text-align:center;width:100%;
    }

    /* ── ScrollStack cards (rendered by React) ── */
    .scroll-stack-scroller{position:relative;overflow:visible;height:auto}
    .scroll-stack-inner{position:relative}
    .scroll-stack-card{
      position:relative;
      background:rgba(20,20,20,0.6);
      border:1px solid rgba(255,255,255,0.08);
      border-left:3px solid transparent;
      border-radius:0 18px 18px 0;
      padding:30px 34px;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      transition:box-shadow 0.4s ease, border-color 0.4s ease;
    }
    .scroll-stack-card:hover{
      box-shadow:0 0 50px rgba(239,76,172,0.1),0 8px 30px rgba(0,0,0,0.4);
      border-color:rgba(255,255,255,0.14);
    }
    /* Neon left border colors */
    .card-blue{border-left-color:rgba(96,165,250,0.7)}
    .card-blue:hover{box-shadow:0 0 60px rgba(96,165,250,0.12),0 0 30px rgba(96,165,250,0.06)}
    .card-purple{border-left-color:rgba(168,85,247,0.7)}
    .card-purple:hover{box-shadow:0 0 60px rgba(168,85,247,0.12),0 0 30px rgba(168,85,247,0.06)}
    .card-cyan{border-left-color:rgba(34,211,238,0.7)}
    .card-cyan:hover{box-shadow:0 0 60px rgba(34,211,238,0.12),0 0 30px rgba(34,211,238,0.06)}
    .card-green{border-left-color:rgba(52,211,153,0.7)}
    .card-green:hover{box-shadow:0 0 60px rgba(52,211,153,0.12),0 0 30px rgba(52,211,153,0.06)}

    .scroll-stack-card h4{
      margin:0 0 6px;
      font-family:'JetBrains Mono',monospace;
      font-size:0.74rem;
      color:var(--pink);
      letter-spacing:1.5px;
      text-transform:uppercase;
    }
    .scroll-stack-card h3{
      margin:0 0 16px;
      font-family:'Inter',sans-serif;
      font-weight:700;
      font-size:1.2rem;
      color:var(--text-primary);
    }
    .about-info-table{
      width:100%;
      border-collapse:collapse;
      margin-bottom:12px;
    }
    .about-info-table td{
      padding:5px 0;
      font-size:0.88rem;
      vertical-align:top;
      line-height:1.6;
    }
    .about-info-table td.alabel{
      color:#fff;
      white-space:nowrap;
      padding-right:14px;
      font-family:'SimSun','Songti SC','宋体',serif;
      font-size:0.8rem;
      width:75px;
    }
    .about-info-table td.avalue{color:#fff;font-family:'SimSun','Songti SC','宋体',serif;font-size:0.85rem}
    .highlight-num{
      font-family:'SimSun','Songti SC','宋体',serif;
      font-weight:700;
      color:#fff;
      font-size:1.02rem;
    }
    .about-tag-row{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-top:8px;
    }
    .about-tag{
      padding:5px 13px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.04);
      font-size:0.78rem;
      color:#fff;
      transition:all 0.22s ease;
      cursor:default;
      font-family:'SimSun','Songti SC','宋体',serif;
    }
    .about-tag:hover{
      border-color:var(--pink);
      background:rgba(239,76,172,0.12);
      color:#fff;
      box-shadow:0 0 16px rgba(239,76,172,0.15);
    }
    .about-honor-badge{
      padding:5px 14px;
      border-radius:6px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.04);
      font-size:0.8rem;
      color:#fff;
      font-family:'SimSun','Songti SC','宋体',serif;
    }
    .scroll-stack-end{height:55vh}

    /* FloatingDock Nav */
    .gooey-nav-container{
      position:relative;margin-bottom:28px;
      display:flex;justify-content:center;
    }
    .gooey-nav-container nav{
      display:flex;align-items:center;
      background:rgba(255,255,255,0.04);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:999px;
      padding:6px 8px;
      gap:4px;
    }
    .gooey-nav-container nav ul{
      display:flex;gap:4px;list-style:none;padding:0;margin:0;
      position:relative;z-index:3;
    }
    .gooey-nav-container nav ul li{
      border-radius:999px;position:relative;cursor:pointer;
      transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);color:rgba(255,255,255,0.6);
      display:flex;align-items:center;
    }
    .gooey-nav-container nav ul li a{
      display:flex;align-items:center;gap:7px;
      padding:10px 18px;
      font-size:0.82rem;font-family:'SimSun','Songti SC','宋体',serif;
      text-decoration:none;color:inherit;white-space:nowrap;
      border-radius:999px;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .gooey-nav-container nav ul li:hover{
      color:#fff;
      background:rgba(255,255,255,0.06);
      transform:translateY(-4px);
      box-shadow:0 8px 24px rgba(0,0,0,0.3);
    }
    .gooey-nav-container nav ul li.active{
      color:#fff;text-shadow:none;
      background:var(--li-bg,var(--pink));
      box-shadow:0 4px 20px rgba(239,76,172,0.25);
      transform:translateY(0);
    }
    .gooey-nav-container nav ul li .dock-icon{
      font-size:1.1rem;line-height:1;
    }
    .gooey-nav-container .effect{display:none}

    /* CardStack */
    .cs-container{position:relative;height:240px;width:100%}
    .cs-card{
      position:absolute;inset:0;
      background:rgba(20,20,20,0.85);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;
      padding:24px 28px;
      display:flex;flex-direction:column;justify-content:space-between;
      transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .cs-card .cs-content{font-size:0.9rem;color:var(--text-primary);line-height:1.7}
    .cs-card .cs-name{font-size:0.85rem;color:var(--pink);font-weight:600;margin-top:12px}
    .cs-card .cs-desc{font-size:0.76rem;color:var(--text-muted);margin-top:2px}

    /* Tabs panel content */
    .tp-panel-wrap{position:relative;overflow:hidden;min-height:260px}
    .tp-panel{
      position:absolute;top:0;left:0;right:0;
      opacity:0;transform:translateY(20px);filter:blur(4px);
      pointer-events:none;
      transition:opacity 0.3s ease,transform 0.3s ease,filter 0.3s ease;
    }
    .tp-panel.center{opacity:1;transform:translateY(0);filter:blur(0px);pointer-events:auto;position:relative}
    .tp-panel.exit-above{opacity:0;transform:translateY(-30px);filter:blur(4px)}
    .tp-panel.exit-below{opacity:0;transform:translateY(30px);filter:blur(4px)}

    /* Job Matcher */
    /* ── JobMatcher: Form (View 1) ── */
    .jm-box{
      margin-top:8px;
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:16px;
      padding:24px 28px;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .jm-box h3{margin:0 0 4px;font-size:1.05rem;color:#fff}
    .jm-box .jm-sub{font-size:0.75rem;color:var(--text-muted);margin-bottom:18px;font-family:'JetBrains Mono',monospace}
    .jm-textarea{
      width:100%;min-height:110px;
      background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
      border-radius:10px;padding:14px;color:#fff;
      font-size:0.85rem;font-family:'Inter',sans-serif;
      resize:vertical;outline:none;margin-bottom:14px;
      transition:border-color 0.25s;
    }
    .jm-textarea:focus{border-color:var(--pink)}
    .jm-textarea::placeholder{color:rgba(255,255,255,0.25)}
    .jm-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;margin-bottom:14px}
    .jm-field{display:flex;flex-direction:column;gap:4px}
    .jm-field label{font-size:0.72rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
    .jm-field input,.jm-field textarea{
      background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
      border-radius:8px;padding:10px 12px;color:#fff;
      font-size:0.84rem;font-family:'Inter',sans-serif;outline:none;
      transition:border-color 0.25s;resize:vertical;
    }
    .jm-field input:focus,.jm-field textarea:focus{border-color:var(--pink)}
    .jm-field input::placeholder,.jm-field textarea::placeholder{color:rgba(255,255,255,0.25)}
    .jm-field textarea{min-height:80px}
    .jm-field-full{grid-column:1/-1}
    .jm-btn{
      display:inline-flex;align-items:center;gap:8px;
      padding:12px 32px;border-radius:999px;
      border:1px solid var(--pink);
      background:rgba(239,76,172,0.12);
      color:var(--pink);font-family:'JetBrains Mono',monospace;
      font-size:0.85rem;font-weight:600;cursor:pointer;
      transition:all 0.3s;width:100%;justify-content:center;
    }
    .jm-btn:hover:not(:disabled){background:var(--pink);color:#fff;box-shadow:0 0 28px rgba(239,76,172,0.35)}
    .jm-btn:disabled{opacity:0.6;cursor:not-allowed}
    .jm-spinner{
      width:18px;height:18px;border:2px solid rgba(239,76,172,0.2);
      border-top-color:var(--pink);border-radius:50%;
      animation:jmSpin 0.7s linear infinite;
    }
    @keyframes jmSpin{to{transform:rotate(360deg)}}

    /* ── JobMatcher: Full-Page Overlay (View 2) ── */
    .jm-overlay{
      position:fixed;inset:0;z-index:999;
      background:#0a0a10;
      display:none;flex-direction:column;
      overflow-y:auto;overflow-x:hidden;
    }
    .jm-overlay.open{display:flex}
    .jm-modal-topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 28px;flex-shrink:0;
      border-bottom:1px solid rgba(255,255,255,0.05);
      background:rgba(10,10,16,0.95);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }
    .jm-back-btn{
      display:flex;align-items:center;gap:6px;
      background:none;border:1px solid rgba(255,255,255,0.12);
      color:#fff;font-size:0.82rem;cursor:pointer;
      padding:8px 16px;border-radius:999px;
      font-family:'JetBrains Mono',monospace;
      transition:all 0.25s;
    }
    .jm-back-btn:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.2)}
    .jm-topbar-title{font-family:'Inter',sans-serif;font-weight:900;font-size:1.2rem;color:#fff}
    .jm-topbar-tag{
      padding:6px 16px;border-radius:999px;
      background:rgba(239,76,172,0.1);border:1px solid rgba(239,76,172,0.2);
      color:var(--pink);font-size:0.78rem;font-family:'JetBrains Mono',monospace;
    }
    .jm-modal-scroll{
      flex:1;overflow-y:auto;padding:40px 48px 50px;
      scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.06) transparent;
    }
    .jm-modal-scroll::-webkit-scrollbar{width:5px}
    .jm-modal-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px}
    .jm-modal-inner{width:100%;max-width:1300px;margin:0 auto}

    /* Staggered reveal */
    .jm-block{
      opacity:0;transform:translateY(30px);
      transition:opacity 0.5s ease,transform 0.5s cubic-bezier(0.25,1,0.5,1);
    }
    .jm-block.visible{opacity:1;transform:translateY(0)}

    /* ② Overall score ring */
    .jm-score-section{text-align:center;margin-bottom:40px}
    .jm-score-ring{position:relative;display:inline-block}
    .jm-score-ring svg{display:block}
    .jm-score-text{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    .jm-score-num{font-size:2.6rem;font-weight:900;color:#fff;line-height:1}
    .jm-score-label{font-size:0.75rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
    .jm-score-summary{
      margin-top:14px;font-size:0.9rem;color:var(--text-secondary);
      max-width:500px;margin-left:auto;margin-right:auto;line-height:1.7;
    }

    /* ③ Radar */
    .jm-radar-section{margin-bottom:40px}
    .jm-radar-section h3,.jm-detail-section h3,.jm-hl-section h3{
      text-align:center;margin:0 0 20px;
      font-family:'Inter',sans-serif;font-weight:900;
      font-size:1.2rem;color:#fff;
    }
    .jm-radar-wrap2{display:flex;justify-content:center}

    /* ④ Dimension cards */
    .jm-detail-section{margin-bottom:40px}
    .jm-dim-list2{display:flex;flex-direction:column;gap:14px;max-height:420px;overflow-y:auto;padding-right:6px}
    .jm-dim-list2::-webkit-scrollbar{width:4px}
    .jm-dim-list2::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px}
    .jm-dim-row{
      display:grid;grid-template-columns:160px 1fr 80px;
      align-items:center;gap:20px;
      background:rgba(255,255,255,0.016);
      border:1px solid rgba(255,255,255,0.04);
      border-radius:14px;padding:20px 28px;
    }
    .jm-dim-name2{font-family:'Inter',sans-serif;font-weight:700;font-size:0.9rem;color:#fff}
    .jm-dim-bar-wrap{position:relative;height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden}
    .jm-dim-bar-fill2{height:100%;border-radius:5px;transition:width 1s ease 0.3s}
    .jm-dim-score2{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1rem;text-align:right}
    .jm-dim-comment{grid-column:1/-1;font-size:0.8rem;color:var(--text-secondary);line-height:1.6;margin-top:2px}

    /* ⑤ Highlights & Suggestions */
    .jm-hl-section{margin-bottom:20px}
    .jm-hl-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .jm-hl-card{
      background:rgba(255,255,255,0.016);
      border:1px solid rgba(255,255,255,0.04);
      border-radius:16px;padding:22px 24px;
    }
    .jm-hl-card h4{
      margin:0 0 12px;font-size:0.78rem;
      font-family:'JetBrains Mono',monospace;
      color:var(--pink);letter-spacing:1px;
    }
    .jm-hl-card ul{list-style:none;padding:0;margin:0}
    .jm-hl-card li{
      font-size:0.85rem;color:var(--text-secondary);
      line-height:1.8;padding-left:16px;position:relative;
      margin-bottom:6px;
    }
    .jm-hl-card li::before{content:'▸';position:absolute;left:0;color:var(--pink);font-size:0.7rem;top:1px}

    @media(max-width:768px){
      .jm-form-grid{grid-template-columns:1fr}
      .jm-modal-scroll{padding:24px 18px 40px}
      .jm-dim-row{grid-template-columns:100px 1fr 50px;gap:10px;padding:14px 16px}
      .jm-dim-name2{font-size:0.78rem}
      .jm-hl-grid{grid-template-columns:1fr}
      .jm-score-num{font-size:2rem}
      .jm-modal-topbar{padding:14px 16px}
      .jm-topbar-title{font-size:1rem}
    }
    /* ── BorderGlow ── */
    .border-glow-card{
      --edge-proximity:0;--cursor-angle:45deg;
      --edge-sensitivity:30;--color-sensitivity:50;
      --border-radius:20px;--glow-padding:30px;--cone-spread:25;
      position:relative;border-radius:var(--border-radius);
      isolation:isolate;transform:translate3d(0,0,0.01px);
      display:grid;overflow:visible;padding:28px;
      background:rgba(255,255,255,0.02);
    }
    .border-glow-card::before,.border-glow-card::after,.border-glow-card>.edge-light{
      content:"";position:absolute;inset:0;border-radius:inherit;
      transition:opacity 0.25s ease-out;z-index:-1;
    }
    .border-glow-card:not(:hover):not(.sweep-active)::before,
    .border-glow-card:not(:hover):not(.sweep-active)::after,
    .border-glow-card:not(:hover):not(.sweep-active)>.edge-light{opacity:0;transition:opacity 0.75s ease-in-out}
    .border-glow-card>.edge-light{
      inset:calc(var(--glow-padding)*-1);pointer-events:none;z-index:1;
      mask-image:conic-gradient(from var(--cursor-angle) at center,black 2.5%,transparent 10%,transparent 90%,black 97.5%);
      opacity:calc((var(--edge-proximity)-var(--edge-sensitivity))/(100-var(--edge-sensitivity)));
      mix-blend-mode:plus-lighter;
    }
    .border-glow-card>.edge-light::before{
      content:"";position:absolute;inset:var(--glow-padding);border-radius:inherit;
      box-shadow:
        inset 0 0 0 1px var(--glow-color,hsl(330deg 100% 65%/100%)),
        inset 0 0 3px 0 var(--glow-color-60,hsl(330deg 100% 65%/60%)),
        inset 0 0 6px 0 var(--glow-color-40,hsl(330deg 100% 65%/40%)),
        inset 0 0 15px 0 var(--glow-color-30,hsl(330deg 100% 65%/30%)),
        inset 0 0 25px 2px var(--glow-color-20,hsl(330deg 100% 65%/20%)),
        inset 0 0 50px 2px var(--glow-color-10,hsl(330deg 100% 65%/10%)),
        0 0 3px 0 var(--glow-color-60,hsl(330deg 100% 65%/60%)),
        0 0 6px 0 var(--glow-color-40,hsl(330deg 100% 65%/40%)),
        0 0 15px 0 var(--glow-color-30,hsl(330deg 100% 65%/30%)),
        0 0 25px 2px var(--glow-color-20,hsl(330deg 100% 65%/20%)),
        0 0 50px 2px var(--glow-color-10,hsl(330deg 100% 65%/10%));
    }
    .border-glow-inner{display:flex;flex-direction:column;position:relative;z-index:1}
    .border-glow-inner h3{
      color:#fff;
    }
    .border-glow-inner .about-tag,
    .border-glow-inner .about-honor-badge,
    .border-glow-inner .highlight-num,
    .border-glow-inner .avalue,
    .border-glow-inner .alabel,
    .border-glow-inner p{
      color:#fff;
    }
    .border-glow-inner .about-tag{
      border-color:rgba(244,114,182,0.2);
    }
    .border-glow-inner .about-tag:hover{
      border-color:#f472b6;
      box-shadow:0 0 14px rgba(244,114,182,0.2);
    }
    .border-glow-inner .about-honor-badge{
      border-color:rgba(192,132,252,0.3);
    }

    /* Fallback static (hidden) */
    .about-static-fallback{display:none}

    /* ── ProfileCard ── */
    .pc-card-wrapper{
      perspective:500px;
      transform:translate3d(0,0,0.1px);
      position:relative;
      touch-action:none;
      width:100%;
      max-width:380px;
      --card-opacity:0;
    }
    .pc-card-wrapper:hover, .pc-card-wrapper.active{--card-opacity:1}
    .pc-behind{
      position:absolute;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(circle at var(--pointer-x,50%) var(--pointer-y,50%), rgba(239,76,172,0.5) 0%, transparent 40%);
      filter:blur(50px);
      opacity:calc(0.8*var(--card-opacity));
      transition:opacity 0.2s;
    }
    .pc-card-shell{position:relative;z-index:1}
    .pc-card{
      aspect-ratio:0.718;
      border-radius:30px;
      position:relative;
      background:rgba(0,0,0,0.9);
      overflow:hidden;
      transition:transform 1s ease;
      transform:translateZ(0) rotateX(0) rotateY(0);
      box-shadow:0 8px 40px rgba(0,0,0,0.5);
      height:auto;
      min-height:420px;
    }
    .pc-card:hover, .pc-card.active{transition:none;transform:translateZ(0) rotateX(var(--rotate-y,0deg)) rotateY(var(--rotate-x,0deg))}
    .pc-card-shell.entering .pc-card{transition:transform 180ms ease-out}
    .pc-inside{inset:0;position:absolute;background:linear-gradient(145deg,rgba(96,73,110,0.35) 0%,rgba(113,196,255,0.15) 100%);background-color:rgba(0,0,0,0.85)}
    .pc-shine{
      mask-image:none;position:absolute;inset:0;z-index:3;
      background:radial-gradient(farthest-corner circle at var(--pointer-x,50%) var(--pointer-y,50%), hsla(0,0%,0%,0.1) 12%,hsla(0,0%,0%,0.15) 20%,hsla(0,0%,0%,0.25) 120%);
      mix-blend-mode:color-dodge;pointer-events:none;
    }
    .pc-glare{
      position:absolute;inset:0;z-index:4;pointer-events:none;
      background:radial-gradient(farthest-corner circle at var(--pointer-x,50%) var(--pointer-y,50%), hsla(248,25%,80%,0.6) 12%,hsla(207,40%,30%,0.4) 90%);
      mix-blend-mode:overlay;
    }
    .pc-avatar-area{
      position:absolute;bottom:0;left:0;right:0;top:0;z-index:5;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;border-radius:30px 30px 0 0;
    }
    .pc-avatar-area img{
      width:100%;height:100%;object-fit:cover;
      transform:translateX(calc((var(--pointer-from-left,0.5)-0.5)*6px)) scale(calc(1+(var(--pointer-from-top,0.5)-0.5)*0.02));
      transition:transform 120ms ease-out;
    }

    .pc-name-area{
      position:absolute;bottom:24px;left:20px;right:20px;z-index:6;
      text-align:left;pointer-events:none;
    }
    .pc-name-area h3{
      font-weight:700;font-size:1.6rem;margin:0;
      background:linear-gradient(to bottom,#fff,#c084fc);
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .pc-name-area p{font-size:0.9rem;margin:2px 0 0;color:rgba(255,255,255,0.7)}

    @media(max-width:768px){
      .pc-card-wrapper{max-width:300px;margin:0 auto}
      .pc-card{min-height:360px}
    }

    /* ── Section reveal animation ── */
    .section-hero .hero-inner,
    .section-about,
    .section-book,
    .campus-scroll-container,
    .section-contact .contact-card{
      opacity:0;transform:translateY(40px);
      transition:opacity 0.8s ease,transform 0.8s cubic-bezier(0.25,1,0.5,1);
    }
    .section-hero .hero-inner.revealed,
    .section-about.revealed,
    .section-book.revealed,
    .campus-scroll-container.revealed,
    .section-contact .contact-card.revealed{
      opacity:1;transform:translateY(0);
    }

    /* ── ShinyText animation ── */
    @keyframes shinySweep{
      0%{background-position:200% center}
      100%{background-position:-200% center}
    }
    .shiny-text{
      display:inline-block;
      background-size:200% auto;
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      animation-name:shinySweep;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
    }

    /* ── SECTION 3: Book Flip ── */
    .section-book{
      position:relative;z-index:5;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;
      padding:120px 40px 80px;
      perspective:1200px;
      perspective-origin:left center;
    }
    .project-section-title{
      font-family:'Inter',sans-serif;font-weight:900;
      font-size:2.8rem;color:#fff;margin:0 0 48px;
      letter-spacing:4px;text-align:center;
    }
    .project-section-title .split-char{
      display:inline-block;
    }
    .book-stage{
      position:relative;
      width:min(700px,90vw);
      height:min(460px,60vh);
      transform-style:preserve-3d;
    }
    .book-page{
      position:absolute;inset:0;
      transform-style:preserve-3d;
      transform-origin:left center;
      transition:transform 1.5s cubic-bezier(0.45,0,0.15,1),z-index 0s 0.75s,box-shadow 1.5s ease;
      cursor:pointer;
    }
    .book-page.flipped{
      transform:rotateY(-170deg);
      z-index:0;
    }
    .book-page:not(.flipped)::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(to right,transparent 85%,rgba(0,0,0,0.5));
      border-radius:18px;pointer-events:none;
      z-index:2;
    }
    .page-face{
      position:absolute;inset:0;
      backface-visibility:hidden;
      border-radius:18px;overflow:hidden;
      display:flex;flex-direction:column;
      background:rgba(18,18,22,0.95);
      border:1px solid rgba(239,76,172,0.25);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 0 0 1px rgba(239,76,172,0.08);
      padding:36px 40px;
    }
    .page-org{
      font-family:'JetBrains Mono',monospace;
      font-size:0.72rem;
      color:var(--pink);
      letter-spacing:1.5px;
      text-transform:uppercase;
      margin-bottom:6px;
    }
    .page-title{
      font-family:'Inter',sans-serif;
      font-weight:900;
      font-size:1.5rem;
      color:#fff;
      margin:0 0 8px;
      letter-spacing:0.5px;
    }
    .page-focus{
      font-family:'JetBrains Mono',monospace;
      font-size:0.82rem;
      color:rgba(255,255,255,0.6);
      margin-bottom:16px;
      line-height:1.6;
    }
    .page-result{
      margin-top:auto;
      padding-top:18px;
      border-top:1px solid rgba(239,76,172,0.15);
    }
    .page-kpi{
      font-family:'JetBrains Mono',monospace;
      font-weight:700;
      font-size:0.9rem;
      color:#00f2fe;
      text-shadow:0 0 12px rgba(0,242,254,0.4);
      animation:kpiBreath 2.2s ease-in-out infinite;
    }
    @keyframes kpiBreath{
      0%,100%{text-shadow:0 0 12px rgba(0,242,254,0.4)}
      50%{text-shadow:0 0 22px rgba(0,242,254,0.7)}
    }
    .page-desc{
      font-family:'JetBrains Mono',monospace;
      font-size:0.76rem;
      color:rgba(255,255,255,0.55);
      margin-top:4px;
      line-height:1.5;
    }
    .book-nav{
      display:flex;align-items:center;gap:16px;
      margin-top:36px;z-index:10;
    }
    .book-dot{
      width:10px;height:10px;border-radius:50%;
      background:rgba(255,255,255,0.2);
      cursor:pointer;transition:all 0.3s;
    }
    .book-dot.active{background:var(--pink);box-shadow:0 0 12px rgba(239,76,172,0.5)}
    .book-arrow{
      background:none;border:1px solid rgba(255,255,255,0.2);
      color:#fff;width:36px;height:36px;border-radius:50%;
      font-size:1rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.25s;
      font-family:'JetBrains Mono',monospace;
    }
    .book-arrow:hover{border-color:var(--pink);color:var(--pink);box-shadow:0 0 16px rgba(239,76,172,0.2)}
    .page-num{
      font-family:'JetBrains Mono',monospace;
      font-size:0.78rem;
      color:rgba(255,255,255,0.3);
    }


    @media(max-width:768px){
      .section-book{padding:100px 16px 60px}
      .book-stage{height:min(500px,65vh)}
      .page-front,.page-back{padding:24px 20px}
      .page-title{font-size:1.2rem}
    }

    /* ── SECTION 4: Campus Expandable Cards ── */
    .campus-scroll-container{position:relative;width:100%;z-index:5;min-height:100vh;padding:100px 0 80px}
    .campus-cards-deck{max-width:720px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:16px}
    .campus-card{
      background:rgba(25,25,25,0.75);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:18px;
      color:#fff;cursor:pointer;
      transition:border-color 0.3s,box-shadow 0.3s;
      overflow:hidden;
    }
    .campus-card:hover{border-color:rgba(239,76,172,0.25);box-shadow:0 0 30px rgba(239,76,172,0.06)}
    .campus-card.expanded{border-color:rgba(239,76,172,0.4);box-shadow:0 0 50px rgba(239,76,172,0.1)}
    .campus-card-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:22px 28px;
      user-select:none;
    }
    .campus-card-header .campus-left{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
    .campus-org{font-size:1.2rem;font-weight:700;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .campus-role{padding:5px 14px;background:rgba(239,76,172,0.12);border:1px solid rgba(239,76,172,0.2);border-radius:999px;font-size:0.78rem;color:var(--pink);white-space:nowrap;font-family:'JetBrains Mono',monospace}
    .campus-time{font-size:0.78rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;margin-left:12px}
    .campus-expand-icon{
      font-size:1.1rem;color:var(--text-muted);
      transition:transform 0.35s ease;margin-left:12px;flex-shrink:0;
    }
    .campus-card.expanded .campus-expand-icon{transform:rotate(180deg)}
    .campus-card-body{
      max-height:0;overflow:hidden;
      transition:max-height 0.5s cubic-bezier(0.25,1,0.5,1),padding 0.5s ease;
      padding:0 28px;
    }
    .campus-card.expanded .campus-card-body{
      max-height:600px;
      padding:0 28px 24px;
    }
    .campus-card-body ul{list-style:none;padding:0;margin:0}
    .campus-card-body li{
      font-size:0.9rem;line-height:1.8;color:#cbd5e1;
      margin-bottom:0.7rem;position:relative;padding-left:1.5rem;
    }
    .campus-card-body li::before{content:"■";position:absolute;left:0;color:#ef4cac;font-size:0.65rem;top:5px}
    .campus-card-body li:has(a){text-align:center;padding-left:0}
    .campus-card-body li:has(a)::before{display:none}
    .campus-card-body li a{display:inline-block}
    .campus-section-title{
      text-align:center;margin-bottom:36px;
    }
    /* ── Apple-style Cards Carousel ── */
    .ac-carousel-wrap{
      position:relative;width:100%;max-width:1100px;margin:0 auto;
    }
    .ac-carousel-track{
      display:flex;gap:20px;overflow-x:auto;padding:20px 10px;
      scroll-behavior:auto;
      scrollbar-width:none;-ms-overflow-style:none;
    }
    .ac-carousel-track::-webkit-scrollbar{display:none}
    .ac-card{
      flex-shrink:0;width:200px;scroll-snap-align:start;
      cursor:pointer;transition:all 0.5s cubic-bezier(0.25,1,0.5,1);
      border-radius:16px;overflow:hidden;
      background:rgba(25,25,30,0.8);
      border:1px solid rgba(255,255,255,0.06);
    }
    .ac-card:hover{transform:translateY(-4px)}
    .ac-card.active{width:420px}
    .ac-card-img{
      width:100%;height:200px;object-fit:cover;display:block;
    }
    .ac-card-info{
      padding:12px 14px;
    }
    .ac-card-category{
      font-size:0.65rem;color:var(--pink);
      font-family:'JetBrains Mono',monospace;
      text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;
    }
    .ac-card-title{
      font-size:0.85rem;color:#fff;font-weight:700;
      font-family:'Inter',sans-serif;margin:0;
    }
    /* Detail panel below carousel */
    .ac-detail-panel{

  <!-- Antigravity 3D: Three.js ring particles -->
  <script>
    (function(){
      const canvas = document.getElementById('antigravity3d');
      const renderer = new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 1, 200);
      camera.position.z = 50;

      // ── Config ──
      const CFG = {
        count: 1000,
        magnetRadius: 6,
        ringRadius: 7,
        waveSpeed: 3.2,
        waveAmplitude: 1,
        particleSize: 1.5,
        lerpSpeed: 0.05,
        color: '#EC4899',
        autoAnimate: true,
        particleVariance: 1,
        rotationSpeed: 0,
        depthFactor: 1,
        pulseSpeed: 3,
        fieldStrength: 10
      };

      const colorHex = parseInt(CFG.color.replace('#',''),16);
      const material = new THREE.MeshBasicMaterial({color: colorHex});
      const geometry = new THREE.SphereGeometry(0.2, 8, 8);
      const mesh = new THREE.InstancedMesh(geometry, material, CFG.count);
      scene.add(mesh);

      const dummy = new THREE.Object3D();
      const particles = [];
      const vpW = 100, vpH = 100;

      for(let i=0;i<CFG.count;i++){
        particles.push({
          t: Math.random()*100,
          speed: 0.01 + Math.random()/200,
          mx: (Math.random()-0.5)*vpW,
          my: (Math.random()-0.5)*vpH,
          mz: (Math.random()-0.5)*20,
          cx: (Math.random()-0.5)*vpW,
          cy: (Math.random()-0.5)*vpH,
          cz: (Math.random()-0.5)*20,
          rOff: (Math.random()-0.5)*2
        });
      }

      const mouse = {x:0, y:0, active:false, lastX:0, lastY:0, lastMove:0};
      const virtual = {x:0, y:0};
      const clock = new THREE.Clock();

      function onMouse(e){
        mouse.x = (e.clientX/window.innerWidth-0.5)*vpW;
        mouse.y = -(e.clientY/window.innerHeight-0.5)*vpH;
        mouse.lastMove = performance.now();
        mouse.active = true;
      }
      window.addEventListener('mousemove', onMouse);
      window.addEventListener('mouseleave', ()=>mouse.active=false);

      function animate(){
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(),0.1);
        const elapsed = performance.now()/1000;

        // Auto-animate when idle
        let destX = mouse.x, destY = mouse.y;
        if(CFG.autoAnimate && elapsed - mouse.lastMove/1000 > 2){
          destX = Math.sin(elapsed*0.5)*(vpW/4);
          destY = Math.cos(elapsed)*(vpH/4);
        }

        virtual.x += (destX - virtual.x)*0.05;
        virtual.y += (destY - virtual.y)*0.05;

        const tx = virtual.x, ty = virtual.y;

        for(let i=0;i<CFG.count;i++){
          const p = particles[i];
          p.t += p.speed/2;

          const proj = 1 - p.cz/50;
          const ptx = tx*proj, pty = ty*proj;

          const dx = p.mx - ptx, dy = p.my - pty;
          const dist = Math.sqrt(dx*dx+dy*dy);

          let tpx = p.mx, tpy = p.my, tpz = p.mz*CFG.depthFactor;

          if(dist < CFG.magnetRadius){
            const angle = Math.atan2(dy,dx);
            const wave = Math.sin(p.t*CFG.waveSpeed+angle)*(0.5*CFG.waveAmplitude);
            const dev = p.rOff*(5/(CFG.fieldStrength+0.1));
            const rr = CFG.ringRadius + wave + dev;
            tpx = ptx + rr*Math.cos(angle);
            tpy = pty + rr*Math.sin(angle);
            tpz = p.mz*CFG.depthFactor + Math.sin(p.t)*CFG.waveAmplitude*CFG.depthFactor;
          }

          p.cx += (tpx-p.cx)*CFG.lerpSpeed;
          p.cy += (tpy-p.cy)*CFG.lerpSpeed;
          p.cz += (tpz-p.cz)*CFG.lerpSpeed;

          dummy.position.set(p.cx, p.cy, p.cz);
          dummy.lookAt(ptx, pty, p.cz);
          dummy.rotateX(Math.PI/2);

          const cdist = Math.sqrt((p.cx-ptx)**2+(p.cy-pty)**2);
          const dRing = Math.abs(cdist-CFG.ringRadius);
          let s = Math.max(0, Math.min(1, 1-dRing/10));
          s = s*(0.8+Math.sin(p.t*CFG.pulseSpeed)*0.2*CFG.particleVariance)*CFG.particleSize;
          dummy.scale.set(s,s,s);
          dummy.updateMatrix();
          mesh.setMatrixAt(i, dummy.matrix);
        }
        mesh.instanceMatrix.needsUpdate = true;

        renderer.render(scene, camera);
      }

      window.addEventListener('resize',()=>{
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
      });

      animate();
    })();
  </script>
