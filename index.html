<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ZHANG MENG YUAN — 我的空间</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #0a0a0a;
      --pink: #ef4cac;
      --pink-glow: rgba(239,76,172,0.6);
      --cyan: #60a5fa;
      --card-bg: rgba(255,255,255,0.025);
      --card-border: rgba(255,255,255,0.07);
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.65);
      --text-muted: rgba(255,255,255,0.42);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:var(--bg);
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      color:#fff;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow-x:hidden;
    }

    /* ── Shared background canvases ── */
    canvas#starfield, canvas#antigravity3d{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      pointer-events:none;
    }
    canvas#starfield{z-index:0}
    canvas#antigravity3d{z-index:2}

    /* ── Pink edge glow ── */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      background-image:
        linear-gradient(180deg, rgba(239,76,172,0.22), rgba(239,76,172,0.05) 45%, transparent 65%),
        linear-gradient(180deg, transparent 35%, rgba(239,76,172,0.05) 55%, rgba(239,76,172,0.22)),
        linear-gradient(90deg, rgba(239,76,172,0.22), rgba(239,76,172,0.05) 45%, transparent 65%),
        linear-gradient(90deg, transparent 35%, rgba(239,76,172,0.05) 55%, rgba(239,76,172,0.22));
      background-repeat:no-repeat;
      background-size:100% 24%, 100% 24%, 24% 100%, 24% 100%;
      background-position: top, bottom, left, right;
      filter: blur(20px);
      animation: pinkFlow 7.5s ease-in-out infinite;
      mix-blend-mode: screen;
    }
    @keyframes pinkFlow{
      0%,100%{opacity:0.75; transform: scale(1);}
      50%{opacity:0.92; transform: scale(1.02);}
    }

    /* ── BubbleMenu ── */
    .bubble-menu{
      left:0;right:0;top:1em;
      display:flex;align-items:center;justify-content:space-between;
      gap:16px;padding:0 2em;
      pointer-events:none;z-index:99;
      position:fixed;
    }
    .bubble-menu .bubble{
      --bubble-size:48px;
      width:var(--bubble-size);height:var(--bubble-size);
      border-radius:50%;
      background:#fff;
      box-shadow:0 4px 16px rgba(0,0,0,0.12);
      display:inline-flex;align-items:center;justify-content:center;
      pointer-events:auto;
    }
    .bubble-menu .logo-bubble, .bubble-menu .toggle-bubble{will-change:transform}
    .bubble-menu .logo-bubble{
      width:auto;min-height:var(--bubble-size);height:var(--bubble-size);
      padding:0 16px;border-radius:calc(var(--bubble-size)/2);gap:8px;
    }
    .bubble-menu .toggle-bubble{width:var(--bubble-size);height:var(--bubble-size)}
    .bubble-menu .logo-content{
      display:inline-flex;align-items:center;justify-content:center;
      gap:8px;font-family:'SimSun','Songti SC','宋体',serif;
      font-weight:700;font-size:0.95rem;padding:0 8px;
    }
    .bubble-menu .menu-btn{
      border:none;background:#fff;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:0;
    }
    .bubble-menu .menu-line{
      width:26px;height:2px;background:#111;border-radius:2px;
      display:block;margin:0 auto;
      transition:transform 0.3s ease,opacity 0.3s ease;
      transform-origin:center;
    }
    .bubble-menu .menu-line+.menu-line{margin-top:6px}
    .bubble-menu .menu-btn.open .menu-line:first-child{transform:translateY(4px) rotate(45deg)}
    .bubble-menu .menu-btn.open .menu-line:last-child{transform:translateY(-4px) rotate(-45deg)}

    @media (min-width:768px){
      .bubble-menu .bubble{--bubble-size:56px}
      .bubble-menu .logo-bubble{padding:0 16px}
    }

    /* Pill inline — top right */
    .pill-list-inline{
      list-style:none;margin:0;padding:0;
      display:flex;flex-direction:row;flex-wrap:wrap;gap:8px;
      pointer-events:auto;
    }
    .pill-link-inline{
      --hover-bg:#f3f4f6;--hover-color:#111;
      padding:8px 20px;
      font-size:0.85rem;
      font-weight:600;
      font-family:'JetBrains Mono',monospace;
      border-radius:999px;
      background:rgba(255,255,255,0.1);
      color:#fff;
      text-decoration:none;
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      transition:background 0.25s ease,color 0.25s ease,border-color 0.25s ease,box-shadow 0.25s ease;
      white-space:nowrap;
    }
    .pill-link-inline:hover{
      background:var(--hover-bg);
      color:var(--hover-color);
      border-color:var(--hover-bg);
      box-shadow:0 0 20px rgba(239,76,172,0.2);
    }
    .pill-link-inline.active{
      background:var(--hover-bg);
      color:var(--hover-color);
      border-color:var(--hover-bg);
      box-shadow:0 0 18px var(--hover-glow,rgba(239,76,172,0.25));
    }

    @media (max-width:768px){
      .pill-list-inline{gap:4px}
      .pill-link-inline{padding:6px 14px;font-size:0.75rem}
    }

    /* Hide old nav CSS classes */
    .top-nav,.logo,.logo-icon,.nav-links{display:none}

    /* ── SECTION 1: HERO ── */
    .section-hero{
      position:relative;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:5;
    }
    .hero-inner{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:24px;
    }
    #hero-title-root{
      z-index:6;
      position:relative;
    }
    .hero-title{
      margin:0;
      font-family:'SimHei','STHeiti','Heiti SC','黑体','Microsoft YaHei',sans-serif;
      font-weight:700;
      font-size:clamp(3.2rem,10vw,9rem);
      line-height:1.15;
      letter-spacing:3px;
      position:relative;
    }
    .hero-btn{
      display:inline-block;
      padding:12px 36px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.5);
      color:#ffffff;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      text-decoration:none;
      font-family:'JetBrains Mono',monospace;
      font-weight:600;
      font-size:0.9rem;
      letter-spacing:1px;
      transition:all 0.25s ease;
      z-index:7;
      position:relative;
    }
    .hero-btn:hover{
      background:rgba(255,255,255,0.22);
      border-color:rgba(255,255,255,0.8);
      box-shadow:0 0 30px rgba(239,76,172,0.2);
      transform:translateY(-2px);
    }
    .sr-only{
      position:absolute;
      width:1px;height:1px;padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);
      white-space:nowrap;border:0;
    }
    .float-dot{
      position:absolute;
      width:14px;height:14px;
      border-radius:50%;
      background:rgba(239,76,172,0.12);
      box-shadow:0 0 18px rgba(239,76,172,0.18);
      pointer-events:none;
      animation:floatSlow 12s ease-in-out infinite;
    }
    .dot-1{top:14%;left:16%;animation-duration:14s}
    .dot-2{top:26%;right:18%;animation-duration:10s}
    .dot-3{bottom:20%;left:20%;animation-duration:16s}
    .dot-4{bottom:16%;right:16%;animation-duration:13s}
    .dot-5{top:50%;right:10%;animation-duration:11s}
    @keyframes floatSlow{
      0%,100%{transform:translateY(0) translateX(0)}
      50%{transform:translateY(-12px) translateX(6px)}
    }



    /* ── SECTION 2: ABOUT ME (React ScrollStack) ── */
    .section-about{
      position:relative;
      z-index:5;
      min-height:100vh;
      padding-left:60px;
    }
    .about-page{
      display:grid;
      grid-template-columns:360px 1fr;
      min-height:100vh;
      max-width:1100px;
      margin:0 auto;
      padding:0 40px;
      gap:48px;
    }

    /* Left sticky sidebar */
    .about-left{
      position:sticky;
      top:0;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      padding:120px 40px 60px 0;
      z-index:10;
    }
    .about-left h2{
      margin:0;
      font-family:'Inter',sans-serif;
      font-weight:900;
      font-size:clamp(2.2rem,4.5vw,3.6rem);
      background:linear-gradient(135deg,#c084fc 0%,#60a5fa 50%,#34d399 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      line-height:1.2;
      letter-spacing:2px;
    }
    .about-left .name-en{
      font-family:'JetBrains Mono',monospace;
      font-size:0.8rem;
      color:var(--text-muted);
      margin-top:4px;
      letter-spacing:2px;
    }
    .about-left .tagline-live{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:16px;
      padding:10px 20px;
      border-radius:999px;
      border:1px solid rgba(239,76,172,0.35);
      background:rgba(239,76,172,0.06);
      color:var(--pink);
      font-family:'JetBrains Mono',monospace;
      font-size:0.82rem;
    }
    .about-left .tagline-live .dot{
      width:7px;height:7px;
      border-radius:50%;
      background:var(--pink);
      box-shadow:0 0 10px var(--pink-glow);
      animation:pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:0.35;transform:scale(1.6)}
    }
    .about-left .contact-block{
      margin-top:28px;
      padding-top:24px;
      border-top:1px solid rgba(255,255,255,0.06);
    }
    .about-left .contact-item{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      font-size:0.86rem;
      color:var(--text-secondary);
      font-family:'JetBrains Mono',monospace;
    }
    .about-left .contact-item .icon{
      font-size:0.95rem;
      width:22px;
      text-align:center;
    }
    .about-left .about-scroll-hint{
      margin-top:36px;
      font-family:'JetBrains Mono',monospace;
      font-size:0.68rem;
      color:var(--text-muted);
      letter-spacing:2px;
      animation:hintPulse 2s ease-in-out infinite;
    }
    @keyframes hintPulse{
      0%,100%{opacity:0.25}
      50%{opacity:0.65}
    }

    /* Right area */
    .about-right{
      position:relative;
      padding-top:120px;
      padding-left:36px;
    }

    /* ── ScrollStack cards (rendered by React) ── */
    .scroll-stack-scroller{position:relative;overflow:visible;height:auto}
    .scroll-stack-inner{position:relative}
    .scroll-stack-card{
      position:relative;
      background:rgba(20,20,20,0.6);
      border:1px solid rgba(255,255,255,0.08);
      border-left:3px solid transparent;
      border-radius:0 18px 18px 0;
      padding:30px 34px;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      transition:box-shadow 0.4s ease, border-color 0.4s ease;
    }
    .scroll-stack-card:hover{
      box-shadow:0 0 50px rgba(239,76,172,0.1),0 8px 30px rgba(0,0,0,0.4);
      border-color:rgba(255,255,255,0.14);
    }
    /* Neon left border colors */
    .card-blue{border-left-color:rgba(96,165,250,0.7)}
    .card-blue:hover{box-shadow:0 0 60px rgba(96,165,250,0.12),0 0 30px rgba(96,165,250,0.06)}
    .card-purple{border-left-color:rgba(168,85,247,0.7)}
    .card-purple:hover{box-shadow:0 0 60px rgba(168,85,247,0.12),0 0 30px rgba(168,85,247,0.06)}
    .card-cyan{border-left-color:rgba(34,211,238,0.7)}
    .card-cyan:hover{box-shadow:0 0 60px rgba(34,211,238,0.12),0 0 30px rgba(34,211,238,0.06)}
    .card-green{border-left-color:rgba(52,211,153,0.7)}
    .card-green:hover{box-shadow:0 0 60px rgba(52,211,153,0.12),0 0 30px rgba(52,211,153,0.06)}

    .scroll-stack-card h4{
      margin:0 0 6px;
      font-family:'JetBrains Mono',monospace;
      font-size:0.74rem;
      color:var(--pink);
      letter-spacing:1.5px;
      text-transform:uppercase;
    }
    .scroll-stack-card h3{
      margin:0 0 16px;
      font-family:'Inter',sans-serif;
      font-weight:700;
      font-size:1.2rem;
      color:var(--text-primary);
    }
    .about-info-table{
      width:100%;
      border-collapse:collapse;
      margin-bottom:12px;
    }
    .about-info-table td{
      padding:5px 0;
      font-size:0.88rem;
      vertical-align:top;
      line-height:1.6;
    }
    .about-info-table td.alabel{
      color:var(--text-muted);
      white-space:nowrap;
      padding-right:14px;
      font-family:'JetBrains Mono',monospace;
      font-size:0.74rem;
      width:75px;
    }
    .about-info-table td.avalue{color:var(--text-secondary)}
    .highlight-num{
      font-family:'JetBrains Mono',monospace;
      font-weight:700;
      color:#60a5fa;
      font-size:1.02rem;
    }
    .about-tag-row{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-top:8px;
    }
    .about-tag{
      padding:5px 13px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.025);
      font-size:0.78rem;
      color:var(--text-secondary);
      transition:all 0.22s ease;
      cursor:default;
    }
    .about-tag:hover{
      border-color:var(--pink);
      background:rgba(239,76,172,0.08);
      color:#fff;
      box-shadow:0 0 16px rgba(239,76,172,0.12);
    }
    .about-honor-badge{
      padding:5px 14px;
      border-radius:6px;
      border:1px solid rgba(96,165,250,0.2);
      background:rgba(96,165,250,0.05);
      font-size:0.8rem;
      color:#60a5fa;
      font-family:'JetBrains Mono',monospace;
    }
    .scroll-stack-end{height:55vh}

    /* GooeyNav */
    .gooey-nav-container{position:relative;margin-bottom:24px}
    .gooey-nav-container nav{display:flex;position:relative;transform:translate3d(0,0,0.01px)}
    .gooey-nav-container nav ul{display:flex;gap:0.6em;list-style:none;padding:0;margin:0;position:relative;z-index:3;color:#fff;text-shadow:0 1px 1px hsla(205,30%,10%,0.2);flex-wrap:wrap}
    .gooey-nav-container nav ul li{border-radius:100vw;position:relative;cursor:pointer;transition:background-color 0.3s,color 0.3s,box-shadow 0.3s;box-shadow:0 0 0.5px 1.5px transparent;color:#fff}
    .gooey-nav-container nav ul li a{display:inline-block;padding:0.5em 1em;font-size:0.82rem;font-family:'JetBrains Mono',monospace;text-decoration:none;color:inherit}
    .gooey-nav-container nav ul li:focus-within:has(:focus-visible){box-shadow:0 0 0.5px 1.5px #fff}
    .gooey-nav-container nav ul li::after{content:'';position:absolute;inset:0;border-radius:10px;background:var(--li-bg,var(--pink));opacity:0;transform:scale(0);transition:all 0.3s ease;z-index:-1}
    .gooey-nav-container nav ul li.active{color:#fff;text-shadow:none}
    .gooey-nav-container nav ul li.active::after{opacity:1;transform:scale(1)}
    .gooey-nav-container .effect{position:absolute;left:0;top:0;width:0;height:0;opacity:1;pointer-events:none;display:grid;place-items:center;z-index:1}
    .gooey-nav-container .effect.text{display:none}
    .gooey-nav-container .effect.filter{display:none}
    .gn-particle,.gn-point{display:block;opacity:0;width:20px;height:20px;border-radius:100%;transform-origin:center}
    .gn-particle{--time:5s;position:absolute;top:calc(50% - 8px);left:calc(50% - 8px);animation:gn-particle calc(var(--time)) ease 1 -350ms}
    .gn-point{background:var(--color);opacity:1;animation:gn-point calc(var(--time)) ease 1 -350ms}
    @keyframes gn-particle{
      0%{transform:rotate(0deg) translate(calc(var(--start-x)),calc(var(--start-y)));opacity:1;animation-timing-function:cubic-bezier(0.55,0,1,0.45)}
      70%{transform:rotate(calc(var(--rotate)*0.5)) translate(calc(var(--end-x)*1.2),calc(var(--end-y)*1.2));opacity:1;animation-timing-function:ease}
      85%{transform:rotate(calc(var(--rotate)*0.66)) translate(calc(var(--end-x)),calc(var(--end-y)));opacity:1}
      100%{transform:rotate(calc(var(--rotate)*1.2)) translate(calc(var(--end-x)*0.5),calc(var(--end-y)*0.5));opacity:1}
    }
    @keyframes gn-point{
      0%{transform:scale(0);opacity:0;animation-timing-function:cubic-bezier(0.55,0,1,0.45)}
      25%{transform:scale(calc(var(--scale)*0.25))}
      38%{opacity:1}
      65%{transform:scale(var(--scale));opacity:1;animation-timing-function:ease}
      85%{transform:scale(var(--scale));opacity:1}
      100%{transform:scale(0);opacity:0}
    }

    /* CardStack */
    .cs-container{position:relative;height:240px;width:100%}
    .cs-card{
      position:absolute;inset:0;
      background:rgba(20,20,20,0.85);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;
      padding:24px 28px;
      display:flex;flex-direction:column;justify-content:space-between;
      transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .cs-card .cs-content{font-size:0.9rem;color:var(--text-primary);line-height:1.7}
    .cs-card .cs-name{font-size:0.85rem;color:var(--pink);font-weight:600;margin-top:12px}
    .cs-card .cs-desc{font-size:0.76rem;color:var(--text-muted);margin-top:2px}

    /* Tabs panel content */
    .tp-panel-wrap{position:relative;overflow:hidden;min-height:260px}
    .tp-panel{
      position:absolute;top:0;left:0;right:0;
      opacity:0;transform:translateY(20px);filter:blur(4px);
      pointer-events:none;
      transition:opacity 0.3s ease,transform 0.3s ease,filter 0.3s ease;
    }
    .tp-panel.center{opacity:1;transform:translateY(0);filter:blur(0px);pointer-events:auto;position:relative}
    .tp-panel.exit-above{opacity:0;transform:translateY(-30px);filter:blur(4px)}
    .tp-panel.exit-below{opacity:0;transform:translateY(30px);filter:blur(4px)}

    /* Job Matcher */
    .jm-box{
      margin-top:8px;
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:16px;
      padding:24px;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .jm-box h3{
      margin:0 0 6px;
      font-size:1rem;
      color:var(--text-primary);
    }
    .jm-box .jm-sub{
      font-size:0.78rem;
      color:var(--text-muted);
      margin-bottom:16px;
      font-family:'JetBrains Mono',monospace;
    }
    .jm-textarea{
      width:100%; min-height:100px;
      background:rgba(0,0,0,0.3);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:10px;
      padding:14px;color:#fff;
      font-size:0.85rem;font-family:'Inter',sans-serif;
      resize:vertical;outline:none;
      transition:border-color 0.25s;
    }
    .jm-textarea:focus{border-color:var(--pink)}
    .jm-textarea::placeholder{color:rgba(255,255,255,0.3)}
    .jm-btn{
      margin-top:12px;
      padding:10px 28px;
      border-radius:999px;
      border:1px solid var(--pink);
      background:rgba(239,76,172,0.1);
      color:var(--pink);
      font-family:'JetBrains Mono',monospace;
      font-size:0.82rem;font-weight:600;
      cursor:pointer;
      transition:all 0.25s;
    }
    .jm-btn:hover{background:var(--pink);color:#fff;box-shadow:0 0 24px rgba(239,76,172,0.3)}
    .jm-result{
      margin-top:16px;padding:16px;
      background:rgba(0,0,0,0.2);
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.06);
      display:none;
    }
    .jm-result.show{display:block}
    .jm-score{
      font-size:2.4rem;font-weight:900;
      background:linear-gradient(135deg,var(--pink),#a855f7);
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .jm-score-label{font-size:0.8rem;color:var(--text-muted);margin-left:6px}
    .jm-bar-wrap{margin-top:6px}
    .jm-bar-label{display:flex;justify-content:space-between;font-size:0.78rem;margin:8px 0 3px;color:var(--text-secondary)}
    .jm-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden}
    .jm-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;background:linear-gradient(90deg,var(--pink),#a855f7)}

    /* ── BorderGlow ── */
    .border-glow-card{
      --edge-proximity:0;--cursor-angle:45deg;
      --edge-sensitivity:30;--color-sensitivity:50;
      --border-radius:20px;--glow-padding:30px;--cone-spread:25;
      position:relative;border-radius:var(--border-radius);
      isolation:isolate;transform:translate3d(0,0,0.01px);

      background:rgba(255,255,255,0.02);

    .border-glow-card::before,.border-glow-card::after,.border-glow-card>.edge-light{
      content:"";position:absolute;inset:0;border-radius:inherit;
      transition:opacity 0.25s ease-out;z-index:-1;
    }
    .border-glow-card:not(:hover):not(.sweep-active)::before,
    .border-glow-card:not(:hover):not(.sweep-active)::after,
    .border-glow-card:not(:hover):not(.sweep-active)>.edge-light{opacity:0;transition:opacity 0.75s ease-in-out}
    .border-glow-card>.edge-light{
      inset:calc(var(--glow-padding)*-1);pointer-events:none;z-index:1;
      mask-image:conic-gradient(from var(--cursor-angle) at center,black 2.5%,transparent 10%,transparent 90%,black 97.5%);
      opacity:calc((var(--edge-proximity)-var(--edge-sensitivity))/(100-var(--edge-sensitivity)));
      mix-blend-mode:plus-lighter;
    }
    .border-glow-card>.edge-light::before{
      content:"";position:absolute;inset:var(--glow-padding);border-radius:inherit;
      box-shadow:
        inset 0 0 0 1px var(--glow-color,hsl(330deg 100% 65%/100%)),
        inset 0 0 3px 0 var(--glow-color-60,hsl(330deg 100% 65%/60%)),
        inset 0 0 6px 0 var(--glow-color-40,hsl(330deg 100% 65%/40%)),
        inset 0 0 15px 0 var(--glow-color-30,hsl(330deg 100% 65%/30%)),
        inset 0 0 25px 2px var(--glow-color-20,hsl(330deg 100% 65%/20%)),
        inset 0 0 50px 2px var(--glow-color-10,hsl(330deg 100% 65%/10%)),
        0 0 3px 0 var(--glow-color-60,hsl(330deg 100% 65%/60%)),
        0 0 6px 0 var(--glow-color-40,hsl(330deg 100% 65%/40%)),
        0 0 15px 0 var(--glow-color-30,hsl(330deg 100% 65%/30%)),
        0 0 25px 2px var(--glow-color-20,hsl(330deg 100% 65%/20%)),
        0 0 50px 2px var(--glow-color-10,hsl(330deg 100% 65%/10%));
    }

  <!-- Antigravity 3D: Three.js ring particles -->
  <script>
    (function(){
      const canvas = document.getElementById('antigravity3d');
      const renderer = new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 1, 200);
      camera.position.z = 50;

      // ── Config ──
      const CFG = {
        count: 1000,
        magnetRadius: 6,
        ringRadius: 7,
        waveSpeed: 3.2,
        waveAmplitude: 1,
        particleSize: 1.5,
        lerpSpeed: 0.05,
        color: '#EC4899',
        autoAnimate: true,
        particleVariance: 1,
        rotationSpeed: 0,
        depthFactor: 1,
        pulseSpeed: 3,
        fieldStrength: 10
      };

      const colorHex = parseInt(CFG.color.replace('#',''),16);
      const material = new THREE.MeshBasicMaterial({color: colorHex});
      const geometry = new THREE.SphereGeometry(0.2, 8, 8);
      const mesh = new THREE.InstancedMesh(geometry, material, CFG.count);
      scene.add(mesh);

      const dummy = new THREE.Object3D();
      const particles = [];
      const vpW = 100, vpH = 100;

      for(let i=0;i<CFG.count;i++){
        particles.push({
          t: Math.random()*100,
          speed: 0.01 + Math.random()/200,
          mx: (Math.random()-0.5)*vpW,
          my: (Math.random()-0.5)*vpH,
          mz: (Math.random()-0.5)*20,
          cx: (Math.random()-0.5)*vpW,
          cy: (Math.random()-0.5)*vpH,
          cz: (Math.random()-0.5)*20,
          rOff: (Math.random()-0.5)*2
        });
      }

      const mouse = {x:0, y:0, active:false, lastX:0, lastY:0, lastMove:0};
      const virtual = {x:0, y:0};
      const clock = new THREE.Clock();

      function onMouse(e){
        mouse.x = (e.clientX/window.innerWidth-0.5)*vpW;
        mouse.y = -(e.clientY/window.innerHeight-0.5)*vpH;
        mouse.lastMove = performance.now();
        mouse.active = true;
      }
      window.addEventListener('mousemove', onMouse);
      window.addEventListener('mouseleave', ()=>mouse.active=false);

      function animate(){
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(),0.1);
        const elapsed = performance.now()/1000;

        // Auto-animate when idle
        let destX = mouse.x, destY = mouse.y;
        if(CFG.autoAnimate && elapsed - mouse.lastMove/1000 > 2){
          destX = Math.sin(elapsed*0.5)*(vpW/4);
          destY = Math.cos(elapsed)*(vpH/4);
        }

        virtual.x += (destX - virtual.x)*0.05;
        virtual.y += (destY - virtual.y)*0.05;

        const tx = virtual.x, ty = virtual.y;

        for(let i=0;i<CFG.count;i++){
          const p = particles[i];
          p.t += p.speed/2;

          const proj = 1 - p.cz/50;
          const ptx = tx*proj, pty = ty*proj;

          const dx = p.mx - ptx, dy = p.my - pty;
          const dist = Math.sqrt(dx*dx+dy*dy);

          let tpx = p.mx, tpy = p.my, tpz = p.mz*CFG.depthFactor;

          if(dist < CFG.magnetRadius){
            const angle = Math.atan2(dy,dx);
            const wave = Math.sin(p.t*CFG.waveSpeed+angle)*(0.5*CFG.waveAmplitude);
            const dev = p.rOff*(5/(CFG.fieldStrength+0.1));
            const rr = CFG.ringRadius + wave + dev;
            tpx = ptx + rr*Math.cos(angle);
            tpy = pty + rr*Math.sin(angle);
            tpz = p.mz*CFG.depthFactor + Math.sin(p.t)*CFG.waveAmplitude*CFG.depthFactor;
          }

          p.cx += (tpx-p.cx)*CFG.lerpSpeed;
          p.cy += (tpy-p.cy)*CFG.lerpSpeed;
          p.cz += (tpz-p.cz)*CFG.lerpSpeed;

          dummy.position.set(p.cx, p.cy, p.cz);
          dummy.lookAt(ptx, pty, p.cz);
          dummy.rotateX(Math.PI/2);

          const cdist = Math.sqrt((p.cx-ptx)**2+(p.cy-pty)**2);
          const dRing = Math.abs(cdist-CFG.ringRadius);
          let s = Math.max(0, Math.min(1, 1-dRing/10));
          s = s*(0.8+Math.sin(p.t*CFG.pulseSpeed)*0.2*CFG.particleVariance)*CFG.particleSize;
          dummy.scale.set(s,s,s);
          dummy.updateMatrix();
          mesh.setMatrixAt(i, dummy.matrix);
        }
        mesh.instanceMatrix.needsUpdate = true;

        renderer.render(scene, camera);
      }

      window.addEventListener('resize',()=>{
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
      });

      animate();
    })();

        const isUpdatingRef = useRef(false);

        const calcP = useCallback((st, start, end) => {
          if(st<start)return 0; if(st>end)return 1;
          return (st-start)/(end-start);
        }, []);

        const parsePct = useCallback((val, ch) =>
          typeof val==='string'&&val.includes('%') ? (parseFloat(val)/100)*ch : parseFloat(val)

            const pE = endTop - ch/2;

            });
            const score = Math.min(100, Math.round(hits/skill.keywords.length*100 + hits*3));
            return {name:skill.name, score:Math.min(100,score)};
          });
          const overall = Math.round(scores.reduce((a,b)=>a+b.score,0)/scores.length);

  <script>
    (function(){
      const starCanvas = document.getElementById('starfield');
      const starCtx = starCanvas.getContext('2d');
      const STAR_COLOR = '#ef4cac';

      let w=0, h=0, DPR = Math.max(1, window.devicePixelRatio || 1);
      let stars = [];

      function rand(min,max){return Math.random()*(max-min)+min}

      function resize(){
        w = window.innerWidth;
        h = window.innerHeight;
        starCanvas.width = Math.floor(w * DPR);
        starCanvas.height = Math.floor(h * DPR);
        starCanvas.style.width = w + 'px';
        starCanvas.style.height = h + 'px';
        starCtx.setTransform(DPR,0,0,DPR,0,0);
        initStars();
      }

      function initStars(){
        stars = [];
        const count = Math.max(80, Math.round((w * h) / 2800));
        for(let i=0;i<count;i++){
          stars.push({
            x: Math.random()*w,
            y: Math.random()*h,
            r: rand(0.7,1.5),
            vx: rand(-0.06,0.06),
            vy: rand(-0.06,0.06),
            alpha: rand(0.25,0.8)
          });
        }
      }

      function drawStars(){
        starCtx.clearRect(0,0,w,h);
        const cx = w/2, cy = h/2;
        starCtx.fillStyle = STAR_COLOR;
        starCtx.shadowColor = 'rgba(239,76,172,0.5)';
        starCtx.shadowBlur = 1;
        for(const s of stars){
          const dx = s.x - cx, dy = s.y - cy;
          const pushX = Math.sign(dx)*0.0007*Math.max(0,1-Math.abs(dx)/cx);
          const pushY = Math.sign(dy)*0.0007*Math.max(0,1-Math.abs(dy)/cy);
          s.vx += pushX; s.vy += pushY;
          s.vx *= 0.993; s.vy *= 0.993;
          s.x += s.vx; s.y += s.vy;
          if(s.x<-10)s.x=w+10; if(s.x>w+10)s.x=-10;
          if(s.y<-10)s.y=h+10; if(s.y>h+10)s.y=-10;
          starCtx.globalAlpha = s.alpha * (0.55+0.45*Math.sin((s.x+s.y+performance.now()/90)/65));
          starCtx.beginPath();
          starCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
          starCtx.fill();
        }
        starCtx.globalAlpha = 1;
      }

      function animate(){
        drawStars();
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', ()=>{
        clearTimeout(resize._t);
        resize._t = setTimeout(resize, 120);
      });

      resize();
      animate();
    })();
  </script>

        card.style.zIndex = i+10;
        card.innerHTML = '<div class="campus-card-header"><span class="campus-time">'+item.time+'</span><h3 class="campus-org">'+item.org+'</h3><span class="campus-role">'+item.role+'</span></div><div class="campus-card-body"><ul>'+item.details.map(d=>'<li>'+d+'</li>').join('')+'</ul></div>';
        deck.appendChild(card);
      });

      const cards = deck.querySelectorAll('.campus-stack-card');
      const total = cards.length;
      container.style.height = (total*90)+'vh';

      function update(){
        const rect = container.getBoundingClientRect();
        const wh = window.innerHeight;
        let visible = 1;
        if(rect.top < 0){
          const progress = Math.abs(rect.top)/(rect.height - wh);
          visible = Math.min(total, Math.max(1, Math.ceil(progress*total)));
        }

        cards.forEach((card,i)=>{
          card.classList.remove('top-card');
          if(i<visible){
            card.style.transform = 'translate3d(0,'+(i*25)+'px,0)';
          } else {
            card.style.transform = 'translate3d(0,100vh,0)';
          }
        });
        if(visible>0) cards[visible-1].classList.add('top-card');
        const hint = document.getElementById('campusHint');
        if(hint) hint.style.opacity = visible>1 ? '0' : '1';
      }

      window.addEventListener('scroll',update,{passive:true});
      update();
    })();
  </script>

  <!-- Book Flip JS -->
  <script>
    (function(){
      const stage = document.getElementById('bookStage');
      const nav = document.getElementById('bookNav');
      if(!stage||!nav) return;

      const cards = [
        {org:'2025.09 - 2025.12 · 武汉丝宝集团',role:'内容策划',focus:'<b>内容策划：</b>负责洁婷百褶巾抖音品牌宣传脚本创作，深度洞察"打工人倒霉瞬间"等平台热点情绪，将流行梗与产品卖点精准结合，产出5篇高网感短视频脚本。<br><br><b>成果转化：</b>内容上线后点击率提升约10%，有效提升用户观看与互动深度，降低投放获客成本，推动项目ROI显著增长。<br><br><a href="https://my.feishu.cn/wiki/OeyPwN8Hxi9L03k33eEcQYzrnhd" target="_blank" style="display:block;text-align:center;color:#fff;text-decoration:none;font-family:JetBrains Mono,monospace;font-size:0.82rem;background:#ef4cac;padding:8px 18px;border-radius:999px;transition:all 0.25s;margin:0 auto" onmouseover="this.style.boxShadow=\'0 0 20px rgba(239,76,172,0.4)\'" onmouseout="this.style.boxShadow=\'none\'">🔗 点击查看脚本</a>',kpi:'',desc:''},
        {org:'2025.10 - 2025.12 · 秋叶集团',role:'AI 内容策划',focus:'<b>智能体策划：</b>基于 Coze 平台独立设计并上线 6 类 AI 智能体，覆盖剧情生成、人设设计、活动文案、社区互动等内容场景。<br><br><b>Prompt调试：</b>持续迭代 Prompt 策略与参数配置，沉淀可复用提示词模板体系，显著提升内容生成准确度与稳定性。<br><br><b>效果展示：</b>结合平台传播规律优化内容节奏与选题方向，最终推动短视频点击率提升 20%、ROI 提升 200%。<br><br><a href="https://www.coze.cn/store/project/7589201646908031039?entity_id=1&bid=6k2mk1ik1g1a&share=1&from=wechat" target="_blank" style="display:block;text-align:center;color:#fff;text-decoration:none;font-family:JetBrains Mono,monospace;font-size:0.82rem;background:#ef4cac;padding:8px 18px;border-radius:999px;transition:all 0.25s;margin:0 auto" onmouseover="this.style.boxShadow=\'0 0 20px rgba(239,76,172,0.4)\'" onmouseout="this.style.boxShadow=\'none\'">🔗 查看网站</a>',kpi:'',desc:''},
        {org:'2025.09 - 2025.12 · 教育部重大课题',role:'攻关项目参与',focus:'参与教育部重大攻关项目研究，协助整理海外"一带一路"相关数据2000余条，并进行信息分类与传播内容梳理；<br><br>基于海外媒体报道开展舆情分析与媒体评价研究，协助输出传播分析报告；<br><br>参与国际传播矩阵搭建及内容整理工作，积累数据分析、传播研究与跨文化内容传播经验。',kpi:'',desc:''}
      ];

      let currentPage = 0;
      const totalPages = cards.length;

      cards.forEach((card,i)=>{
        const page = document.createElement('div');
        page.className = 'book-page';
        page.style.zIndex = totalPages - i;
        page.dataset.index = i;
        page.innerHTML = '<div class="page-face"><div class="page-org">'+card.org+'</div><h2 class="page-title">'+card.role+'</h2><div class="page-focus">▸ '+card.focus+'</div>'+(card.kpi?'<div class="page-result"><div class="page-kpi">'+card.kpi+'</div><div class="page-desc">'+card.desc+'</div>'+(card.kpi2?'<div class="page-kpi" style="margin-top:10px">'+card.kpi2+'</div><div class="page-desc">'+card.desc2+'</div>':'')+'</div>':'')+'</div>';
        stage.appendChild(page);
      });

      const prevBtn = document.createElement('button');
      prevBtn.className = 'book-arrow'; prevBtn.textContent = '←';
      nav.appendChild(prevBtn);
      const dotsC = document.createElement('div');
      dotsC.style.cssText = 'display:flex;gap:10px;';
      for(let i=0;i<totalPages;i++){
        const d = document.createElement('span');
        d.className = 'book-dot'+(i===0?' active':'');
        d.addEventListener('click',()=>goToPage(i));
        dotsC.appendChild(d);
      }
      nav.appendChild(dotsC);
      const nextBtn = document.createElement('button');
      nextBtn.className = 'book-arrow'; nextBtn.textContent = '→';
      nav.appendChild(nextBtn);
      const pageNum = document.createElement('span');
      pageNum.className = 'page-num';
      pageNum.textContent = '1 / '+totalPages;
      nav.appendChild(pageNum);

      function updateUI(){
        document.querySelectorAll('.book-page').forEach((p,i)=>{
          if(i<currentPage) p.classList.add('flipped');
          else p.classList.remove('flipped');
          p.style.zIndex = i<currentPage ? 0 : totalPages-i;
        });
        document.querySelectorAll('.book-dot').forEach((d,i)=>d.classList.toggle('active',i===currentPage));
        pageNum.textContent = (currentPage+1)+' / '+totalPages;
      }

      function goToPage(idx){
        if(idx<0||idx>=totalPages) return;
        currentPage = idx;
        updateUI();
      }

      prevBtn.addEventListener('click',()=>goToPage(currentPage-1));
      nextBtn.addEventListener('click',()=>goToPage(currentPage+1));

      stage.addEventListener('click',(e)=>{
        const pageEl = e.target.closest('.book-page');
        if(!pageEl) return;
        const idx = parseInt(pageEl.dataset.index);
        if(idx===currentPage && currentPage<totalPages-1) goToPage(currentPage+1);
      });

      document.addEventListener('keydown',(e)=>{
        if(e.key==='ArrowRight') goToPage(currentPage+1);
        if(e.key==='ArrowLeft') goToPage(currentPage-1);
      });

      let tx=0;
      stage.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
      stage.addEventListener('touchend',e=>{
        const diff = tx - e.changedTouches[0].clientX;
        if(Math.abs(diff)>50){if(diff>0)goToPage(currentPage+1);else goToPage(currentPage-1);}
      });

      updateUI();
    })();
  </script>
