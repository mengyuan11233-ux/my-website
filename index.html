<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ZHANG MENG YUAN — 我的空间</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #0a0a0a;
      --pink: #ef4cac;
      --pink-glow: rgba(239,76,172,0.6);
      --cyan: #60a5fa;
      --card-bg: rgba(255,255,255,0.025);
      --card-border: rgba(255,255,255,0.07);
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.65);
      --text-muted: rgba(255,255,255,0.42);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:var(--bg);
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      color:#fff;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow-x:hidden;
    }

    /* ── Shared background canvases ── */
    canvas#starfield, canvas#antigravity3d{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      pointer-events:none;
    }
    canvas#starfield{z-index:0}
    canvas#antigravity3d{z-index:2}

    /* ── Pink edge glow ── */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      background-image:
        linear-gradient(180deg, rgba(239,76,172,0.22), rgba(239,76,172,0.05) 45%, transparent 65%),
        linear-gradient(180deg, transparent 35%, rgba(239,76,172,0.05) 55%, rgba(239,76,172,0.22)),
        linear-gradient(90deg, rgba(239,76,172,0.22), rgba(239,76,172,0.05) 45%, transparent 65%),
        linear-gradient(90deg, transparent 35%, rgba(239,76,172,0.05) 55%, rgba(239,76,172,0.22));
      background-repeat:no-repeat;
      background-size:100% 24%, 100% 24%, 24% 100%, 24% 100%;
      background-position: top, bottom, left, right;
      filter: blur(20px);
      animation: pinkFlow 7.5s ease-in-out infinite;
      mix-blend-mode: screen;
    }
    @keyframes pinkFlow{
      0%,100%{opacity:0.75; transform: scale(1);}
      50%{opacity:0.92; transform: scale(1.02);}
    }

    /* ── PillNav ── */
    .pill-nav-container{
      position:fixed;top:1em;left:0;right:0;z-index:99;
      display:flex;justify-content:center;pointer-events:none;
      padding:0 2em;
    }
    .pill-nav{
      --nav-h:44px;
      --pill-pad-x:18px;
      --pill-gap:4px;
      display:flex;align-items:center;justify-content:space-between;
      width:100%;max-width:1200px;
      pointer-events:auto;
    }
    .pill-nav-left{
      display:flex;align-items:center;gap:10px;
    }
    .pill-nav-name{
      color:#fff;font-size:1rem;
      font-family:'SimSun','Songti SC','宋体',serif;
      font-weight:700;white-space:nowrap;
    }
    .pill-nav-items{
      display:flex;align-items:center;
      height:var(--nav-h);
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:9999px;
    }
    .pill-logo{
      width:var(--nav-h);height:var(--nav-h);
      border-radius:50%;
      background:rgba(239,76,172,0.15);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(239,76,172,0.3);
      display:inline-flex;align-items:center;justify-content:center;
      font-size:1.2rem;text-decoration:none;
      pointer-events:auto;flex-shrink:0;
      transition:all 0.3s;
    }
    .pill-logo:hover{
      background:rgba(239,76,172,0.3);
      box-shadow:0 0 20px rgba(239,76,172,0.25);
    }
    .pill-list{
      list-style:none;display:flex;align-items:stretch;
      gap:var(--pill-gap);margin:0;padding:3px;height:100%;
    }
    .pill-list>li{display:flex;height:100%}
    .pill{
      display:inline-flex;align-items:center;justify-content:center;
      height:100%;padding:0 var(--pill-pad-x);
      background:var(--pill-bg,rgba(255,255,255,0.08));
      color:var(--pill-text,#fff);
      text-decoration:none;border-radius:9999px;
      font-weight:600;font-size:0.82rem;
      font-family:'JetBrains Mono',monospace;
      text-transform:uppercase;letter-spacing:0.5px;
      white-space:nowrap;cursor:pointer;
      position:relative;overflow:hidden;
      transition:color 0.2s;
    }
    .pill .hover-circle{
      position:absolute;left:50%;bottom:0;
      border-radius:50%;
      background:var(--circle-bg,var(--pink));
      z-index:1;display:block;pointer-events:none;
      will-change:transform;
    }
    .pill .label-stack{
      position:relative;display:inline-block;line-height:1;z-index:2;
    }
    .pill .pill-label{
      position:relative;z-index:2;display:inline-block;line-height:1;
      will-change:transform;
    }
    .pill .pill-label-hover{
      position:absolute;left:0;top:0;
      color:var(--hover-text,#fff);
      z-index:3;display:inline-block;
      will-change:transform,opacity;
    }
    .pill.is-active{
      background:var(--circle-bg,var(--pink)) !important;
      color:#fff !important;
      box-shadow:0 4px 18px rgba(239,76,172,0.3);
    }
    .pill.is-active::after{
      content:'';position:absolute;bottom:-5px;left:50%;
      transform:translateX(-50%);
      width:10px;height:10px;background:var(--circle-bg,var(--pink));
      border-radius:50px;z-index:4;
    }

    @media (max-width:768px){
      .pill-nav-container{top:0.5em}
      .pill-nav{--nav-h:38px;--pill-pad-x:12px;gap:8px}
      .pill{font-size:0.7rem}
    }

    /* Hide old nav CSS classes */
    .top-nav,.logo,.logo-icon,.nav-links,.bubble-menu,.pill-list-inline,.pill-link-inline{display:none}

    /* ── SECTION 1: HERO ── */
    .section-hero{
      position:relative;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:5;
    }
    .hero-inner{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:24px;
    }
    #hero-title-root{
      z-index:6;
      position:relative;
    }
    .hero-title{
      margin:0;
      font-family:'SimHei','STHeiti','Heiti SC','黑体','Microsoft YaHei',sans-serif;
      font-weight:700;
      font-size:clamp(3.2rem,10vw,9rem);
      line-height:1.15;
      letter-spacing:3px;
      position:relative;
    }
    .hero-btn{
      display:inline-block;
      padding:12px 36px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.5);
      color:#ffffff;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      text-decoration:none;
      font-family:'JetBrains Mono',monospace;
      font-weight:600;
      font-size:0.9rem;
      letter-spacing:1px;
      transition:all 0.25s ease;
      z-index:7;
      position:relative;
    }
    .hero-btn:hover{
      background:rgba(255,255,255,0.22);
      border-color:rgba(255,255,255,0.8);
      box-shadow:0 0 30px rgba(239,76,172,0.2);
      transform:translateY(-2px);
    }
    .sr-only{
      position:absolute;
      width:1px;height:1px;padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);
      white-space:nowrap;border:0;
    }
    .float-dot{
      position:absolute;
      width:14px;height:14px;
      border-radius:50%;
      background:rgba(239,76,172,0.12);
      box-shadow:0 0 18px rgba(239,76,172,0.18);
      pointer-events:none;
      animation:floatSlow 12s ease-in-out infinite;
    }
    .dot-1{top:14%;left:16%;animation-duration:14s}
    .dot-2{top:26%;right:18%;animation-duration:10s}
    .dot-3{bottom:20%;left:20%;animation-duration:16s}
    .dot-4{bottom:16%;right:16%;animation-duration:13s}
    .dot-5{top:50%;right:10%;animation-duration:11s}
    @keyframes floatSlow{
      0%,100%{transform:translateY(0) translateX(0)}
      50%{transform:translateY(-12px) translateX(6px)}
    }



    /* ── SECTION 2: ABOUT ME (React ScrollStack) ── */
    .section-about{
      position:relative;
      z-index:5;
      min-height:100vh;
      padding-left:60px;
    }
    .about-page{
      display:grid;
      grid-template-columns:340px 1fr;
      min-height:100vh;
      max-width:1200px;
      margin:0 auto;
      padding:0 40px;
      gap:56px;
    }

    /* Left sticky sidebar */
    .about-left{
      position:sticky;
      top:0;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      padding:120px 40px 60px 0;
      z-index:10;
    }
    .about-left h2{
      margin:0;
      font-family:'SimSun','Songti SC','宋体',serif;
      font-weight:900;
      font-size:clamp(2.2rem,4.5vw,3.6rem);
      background:linear-gradient(135deg,#c084fc 0%,#60a5fa 50%,#34d399 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      line-height:1.2;
      letter-spacing:2px;
    }
    .about-left .name-en{
      font-family:'SimSun','Songti SC','宋体',serif;
      font-size:0.8rem;
      color:var(--text-muted);
      margin-top:4px;
      letter-spacing:2px;
    }
    .about-left .tagline-live{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:16px;
      padding:10px 20px;
      border-radius:999px;
      border:1px solid rgba(239,76,172,0.35);
      background:rgba(239,76,172,0.06);
      color:var(--pink);
      font-family:'SimSun','Songti SC','宋体',serif;
      font-size:0.82rem;
    }
    .about-left .tagline-live .dot{
      width:7px;height:7px;
      border-radius:50%;
      background:var(--pink);
      box-shadow:0 0 10px var(--pink-glow);
      animation:pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:0.35;transform:scale(1.6)}
    }
    .about-left .contact-block{
      margin-top:24px;
      padding-top:20px;
      border-top:1px solid rgba(255,255,255,0.06);
    }
    .about-left .contact-item{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
      font-size:0.84rem;
      color:var(--text-secondary);
      font-family:'SimSun','Songti SC','宋体',serif;
    }
    .about-left .contact-item .icon{
      font-size:0.95rem;
      width:22px;
      text-align:center;
    }
    .about-left .about-scroll-hint{
      margin-top:32px;
      font-family:'SimSun','Songti SC','宋体',serif;
      font-size:0.68rem;
      color:var(--text-muted);
      letter-spacing:2px;
      animation:hintPulse 2s ease-in-out infinite;
    }
    @keyframes hintPulse{
      0%,100%{opacity:0.25}
      50%{opacity:0.65}
    }

    /* Right area */
    .about-right{
      position:relative;
      padding-top:80px;
      padding-left:36px;
    }
    .about-section-title{
      font-family:'Inter',sans-serif;font-weight:900;
      font-size:2.8rem;color:#fff;margin:0;
      letter-spacing:4px;
    }

    /* ── ScrollStack cards (rendered by React) ── */
    .scroll-stack-scroller{position:relative;overflow:visible;height:auto}
    .scroll-stack-inner{position:relative}
    .scroll-stack-card{
      position:relative;
      background:rgba(20,20,20,0.6);
      border:1px solid rgba(255,255,255,0.08);
      border-left:3px solid transparent;
      border-radius:0 18px 18px 0;
      padding:30px 34px;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      transition:box-shadow 0.4s ease, border-color 0.4s ease;
    }
    .scroll-stack-card:hover{
      box-shadow:0 0 50px rgba(239,76,172,0.1),0 8px 30px rgba(0,0,0,0.4);
      border-color:rgba(255,255,255,0.14);
    }
    /* Neon left border colors */
    .card-blue{border-left-color:rgba(96,165,250,0.7)}
    .card-blue:hover{box-shadow:0 0 60px rgba(96,165,250,0.12),0 0 30px rgba(96,165,250,0.06)}
    .card-purple{border-left-color:rgba(168,85,247,0.7)}
    .card-purple:hover{box-shadow:0 0 60px rgba(168,85,247,0.12),0 0 30px rgba(168,85,247,0.06)}
    .card-cyan{border-left-color:rgba(34,211,238,0.7)}
    .card-cyan:hover{box-shadow:0 0 60px rgba(34,211,238,0.12),0 0 30px rgba(34,211,238,0.06)}
    .card-green{border-left-color:rgba(52,211,153,0.7)}
    .card-green:hover{box-shadow:0 0 60px rgba(52,211,153,0.12),0 0 30px rgba(52,211,153,0.06)}

    .scroll-stack-card h4{
      margin:0 0 6px;
      font-family:'JetBrains Mono',monospace;
      font-size:0.74rem;
      color:var(--pink);
      letter-spacing:1.5px;
      text-transform:uppercase;
    }
    .scroll-stack-card h3{
      margin:0 0 16px;
      font-family:'Inter',sans-serif;
      font-weight:700;
      font-size:1.2rem;
      color:var(--text-primary);
    }
    .about-info-table{
      width:100%;
      border-collapse:collapse;
      margin-bottom:12px;
    }
    .about-info-table td{
      padding:5px 0;
      font-size:0.88rem;
      vertical-align:top;
      line-height:1.6;
    }
    .about-info-table td.alabel{
      color:#fff;
      white-space:nowrap;
      padding-right:14px;
      font-family:'SimSun','Songti SC','宋体',serif;
      font-size:0.8rem;
      width:75px;
    }
    .about-info-table td.avalue{color:#fff;font-family:'SimSun','Songti SC','宋体',serif;font-size:0.85rem}
    .highlight-num{
      font-family:'SimSun','Songti SC','宋体',serif;
      font-weight:700;
      color:#fff;
      font-size:1.02rem;
    }
    .about-tag-row{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-top:8px;
    }
    .about-tag{
      padding:5px 13px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.04);
      font-size:0.78rem;
      color:#fff;
      transition:all 0.22s ease;
      cursor:default;
      font-family:'SimSun','Songti SC','宋体',serif;
    }
    .about-tag:hover{
      border-color:var(--pink);
      background:rgba(239,76,172,0.12);
      color:#fff;
      box-shadow:0 0 16px rgba(239,76,172,0.15);
    }
    .about-honor-badge{
      padding:5px 14px;
      border-radius:6px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.04);
      font-size:0.8rem;
      color:#fff;
      font-family:'SimSun','Songti SC','宋体',serif;
    }
    .scroll-stack-end{height:55vh}

    /* FloatingDock Nav */
    .gooey-nav-container{
      position:relative;margin-bottom:28px;
      display:flex;justify-content:center;
    }
    .gooey-nav-container nav{
      display:flex;align-items:center;
      background:rgba(255,255,255,0.04);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:999px;
      padding:6px 8px;
      gap:4px;
    }
    .gooey-nav-container nav ul{
      display:flex;gap:4px;list-style:none;padding:0;margin:0;
      position:relative;z-index:3;
    }
    .gooey-nav-container nav ul li{
      border-radius:999px;position:relative;cursor:pointer;
      transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);color:rgba(255,255,255,0.6);
      display:flex;align-items:center;
    }
    .gooey-nav-container nav ul li a{
      display:flex;align-items:center;gap:7px;
      padding:10px 18px;
      font-size:0.82rem;font-family:'SimSun','Songti SC','宋体',serif;
      text-decoration:none;color:inherit;white-space:nowrap;
      border-radius:999px;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .gooey-nav-container nav ul li:hover{
      color:#fff;
      background:rgba(255,255,255,0.06);
      transform:translateY(-4px);
      box-shadow:0 8px 24px rgba(0,0,0,0.3);
    }
    .gooey-nav-container nav ul li.active{
      color:#fff;text-shadow:none;
      background:var(--li-bg,var(--pink));
      box-shadow:0 4px 20px rgba(239,76,172,0.25);
      transform:translateY(0);
    }
    .gooey-nav-container nav ul li .dock-icon{
      font-size:1.1rem;line-height:1;
    }
    .gooey-nav-container .effect{display:none}

    /* CardStack */
    .cs-container{position:relative;height:240px;width:100%}
    .cs-card{
      position:absolute;inset:0;
      background:rgba(20,20,20,0.85);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;
      padding:24px 28px;
      display:flex;flex-direction:column;justify-content:space-between;
      transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .cs-card .cs-content{font-size:0.9rem;color:var(--text-primary);line-height:1.7}
    .cs-card .cs-name{font-size:0.85rem;color:var(--pink);font-weight:600;margin-top:12px}
    .cs-card .cs-desc{font-size:0.76rem;color:var(--text-muted);margin-top:2px}

    /* Tabs panel content */
    .tp-panel-wrap{position:relative;overflow:hidden;min-height:260px}
    .tp-panel{
      position:absolute;top:0;left:0;right:0;
      opacity:0;transform:translateY(20px);filter:blur(4px);
      pointer-events:none;
      transition:opacity 0.3s ease,transform 0.3s ease,filter 0.3s ease;
    }
    .tp-panel.center{opacity:1;transform:translateY(0);filter:blur(0px);pointer-events:auto;position:relative}
    .tp-panel.exit-above{opacity:0;transform:translateY(-30px);filter:blur(4px)}
    .tp-panel.exit-below{opacity:0;transform:translateY(30px);filter:blur(4px)}

    /* Job Matcher */
    /* ── JobMatcher: Form (View 1) ── */
    .jm-box{
      margin-top:8px;
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:16px;
      padding:24px 28px;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .jm-box h3{margin:0 0 4px;font-size:1.05rem;color:#fff}
    .jm-box .jm-sub{font-size:0.75rem;color:var(--text-muted);margin-bottom:18px;font-family:'JetBrains Mono',monospace}
    .jm-textarea{
      width:100%;min-height:110px;
      background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
      border-radius:10px;padding:14px;color:#fff;
      font-size:0.85rem;font-family:'Inter',sans-serif;
      resize:vertical;outline:none;margin-bottom:14px;
      transition:border-color 0.25s;
    }
    .jm-textarea:focus{border-color:var(--pink)}
    .jm-textarea::placeholder{color:rgba(255,255,255,0.25)}
    .jm-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;margin-bottom:14px}
    .jm-field{display:flex;flex-direction:column;gap:4px}
    .jm-field label{font-size:0.72rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
    .jm-field input,.jm-field textarea{
      background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
      border-radius:8px;padding:10px 12px;color:#fff;
      font-size:0.84rem;font-family:'Inter',sans-serif;outline:none;
      transition:border-color 0.25s;resize:vertical;
    }
    .jm-field input:focus,.jm-field textarea:focus{border-color:var(--pink)}
    .jm-field input::placeholder,.jm-field textarea::placeholder{color:rgba(255,255,255,0.25)}
    .jm-field textarea{min-height:80px}
    .jm-field-full{grid-column:1/-1}
    .jm-btn{
      display:inline-flex;align-items:center;gap:8px;
      padding:12px 32px;border-radius:999px;
      border:1px solid var(--pink);
      background:rgba(239,76,172,0.12);
      color:var(--pink);font-family:'JetBrains Mono',monospace;
      font-size:0.85rem;font-weight:600;cursor:pointer;
      transition:all 0.3s;width:100%;justify-content:center;
    }
    .jm-btn:hover:not(:disabled){background:var(--pink);color:#fff;box-shadow:0 0 28px rgba(239,76,172,0.35)}
    .jm-btn:disabled{opacity:0.6;cursor:not-allowed}
    .jm-spinner{
      width:18px;height:18px;border:2px solid rgba(239,76,172,0.2);
      border-top-color:var(--pink);border-radius:50%;
      animation:jmSpin 0.7s linear infinite;
    }
    @keyframes jmSpin{to{transform:rotate(360deg)}}

    /* ── JobMatcher: Full-Page Overlay (View 2) ── */
    .jm-overlay{
      position:fixed;inset:0;z-index:999;
      background:#0a0a10;
      display:none;flex-direction:column;
      overflow-y:auto;overflow-x:hidden;
    }
    .jm-overlay.open{display:flex}
    .jm-modal-topbar{

      padding:18px 28px;flex-shrink:0;
      border-bottom:1px solid rgba(255,255,255,0.05);

    }
    .jm-back-btn:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.2)}
    .jm-topbar-title{font-family:'Inter',sans-serif;font-weight:900;font-size:1.2rem;color:#fff}
    .jm-topbar-tag{
      padding:6px 16px;border-radius:999px;

    }
    .jm-modal-scroll{

    .jm-modal-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px}
    .jm-modal-inner{width:100%;max-width:1300px;margin:0 auto}

    /* Staggered reveal */
    .jm-block{
      opacity:0;transform:translateY(30px);
      transition:opacity 0.5s ease,transform 0.5s cubic-bezier(0.25,1,0.5,1);
    }
    .jm-block.visible{opacity:1;transform:translateY(0)}

    /* ② Overall score ring */
    .jm-score-section{text-align:center;margin-bottom:40px}
    .jm-score-ring{position:relative;display:inline-block}
    .jm-score-ring svg{display:block}
    .jm-score-text{

    .jm-score-label{font-size:0.75rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
    .jm-score-summary{

    /* ③ Radar */

      font-size:1.2rem;color:#fff;
    }

    /* ④ Dimension cards */

    .jm-dim-list2{display:flex;flex-direction:column;gap:14px;max-height:420px;overflow-y:auto;padding-right:6px}
    .jm-dim-list2::-webkit-scrollbar{width:4px}
    .jm-dim-list2::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px}
    .jm-dim-row{
      display:grid;grid-template-columns:160px 1fr 80px;
      align-items:center;gap:20px;
      background:rgba(255,255,255,0.016);

    .jm-dim-bar-wrap{position:relative;height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden}
    .jm-dim-bar-fill2{height:100%;border-radius:5px;transition:width 1s ease 0.3s}
    .jm-dim-score2{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1rem;text-align:right}
    .jm-dim-comment{grid-column:1/-1;font-size:0.8rem;color:var(--text-secondary);line-height:1.6;margin-top:2px}

    /* ⑤ Highlights & Suggestions */
    .jm-hl-section{margin-bottom:20px}

    .jm-hl-card{

      border:1px solid rgba(255,255,255,0.04);

      color:var(--pink);letter-spacing:1px;

    .jm-hl-card li{
      font-size:0.85rem;color:var(--text-secondary);

      margin-bottom:6px;
    }
    .jm-hl-card li::before{content:'▸';position:absolute;left:0;color:var(--pink);font-size:0.7rem;top:1px}

    @media(max-width:768px){
      .jm-form-grid{grid-template-columns:1fr}
      .jm-modal-scroll{padding:24px 18px 40px}
      .jm-dim-row{grid-template-columns:100px 1fr 50px;gap:10px;padding:14px 16px}
      .jm-dim-name2{font-size:0.78rem}

      .jm-score-num{font-size:2rem}
      .jm-modal-topbar{padding:14px 16px}
      .jm-topbar-title{font-size:1rem}
    }
    /* ── BorderGlow ── */
    .border-glow-card{
      --edge-proximity:0;--cursor-angle:45deg;
      --edge-sensitivity:30;--color-sensitivity:50;
      --border-radius:20px;--glow-padding:30px;--cone-spread:25;
      position:relative;border-radius:var(--border-radius);
      isolation:isolate;transform:translate3d(0,0,0.01px);
      display:grid;overflow:visible;padding:28px;
      background:rgba(255,255,255,0.02);
    }
    .border-glow-card::before,.border-glow-card::after,.border-glow-card>.edge-light{
      content:"";position:absolute;inset:0;border-radius:inherit;
      transition:opacity 0.25s ease-out;z-index:-1;
    }
    .border-glow-card:not(:hover):not(.sweep-active)::before,
    .border-glow-card:not(:hover):not(.sweep-active)::after,
    .border-glow-card:not(:hover):not(.sweep-active)>.edge-light{opacity:0;transition:opacity 0.75s ease-in-out}
    .border-glow-card>.edge-light{
      inset:calc(var(--glow-padding)*-1);pointer-events:none;z-index:1;
      mask-image:conic-gradient(from var(--cursor-angle) at center,black 2.5%,transparent 10%,transparent 90%,black 97.5%);
      opacity:calc((var(--edge-proximity)-var(--edge-sensitivity))/(100-var(--edge-sensitivity)));
      mix-blend-mode:plus-lighter;
    }
    .border-glow-card>.edge-light::before{
      content:"";position:absolute;inset:var(--glow-padding);border-radius:inherit;
      box-shadow:
        inset 0 0 0 1px var(--glow-color,hsl(330deg 100% 65%/100%)),
        inset 0 0 3px 0 var(--glow-color-60,hsl(330deg 100% 65%/60%)),
        inset 0 0 6px 0 var(--glow-color-40,hsl(330deg 100% 65%/40%)),
        inset 0 0 15px 0 var(--glow-color-30,hsl(330deg 100% 65%/30%)),
        inset 0 0 25px 2px var(--glow-color-20,hsl(330deg 100% 65%/20%)),
        inset 0 0 50px 2px var(--glow-color-10,hsl(330deg 100% 65%/10%)),
        0 0 3px 0 var(--glow-color-60,hsl(330deg 100% 65%/60%)),
        0 0 6px 0 var(--glow-color-40,hsl(330deg 100% 65%/40%)),
        0 0 15px 0 var(--glow-color-30,hsl(330deg 100% 65%/30%)),
        0 0 25px 2px var(--glow-color-20,hsl(330deg 100% 65%/20%)),
        0 0 50px 2px var(--glow-color-10,hsl(330deg 100% 65%/10%));
    }
    .border-glow-inner{display:flex;flex-direction:column;position:relative;z-index:1}
    .border-glow-inner h3{
      color:#fff;
    }
    .border-glow-inner .about-tag,
    .border-glow-inner .about-honor-badge,
    .border-glow-inner .highlight-num,
    .border-glow-inner .avalue,
    .border-glow-inner .alabel,
    .border-glow-inner p{
      color:#fff;
    }
    .border-glow-inner .about-tag{
      border-color:rgba(244,114,182,0.2);
    }
    .border-glow-inner .about-tag:hover{
      border-color:#f472b6;
      box-shadow:0 0 14px rgba(244,114,182,0.2);
    }
    .border-glow-inner .about-honor-badge{
      border-color:rgba(192,132,252,0.3);
    }

    /* Fallback static (hidden) */
    .about-static-fallback{display:none}

    /* ── ProfileCard ── */
    .pc-card-wrapper{
      perspective:500px;
      transform:translate3d(0,0,0.1px);
      position:relative;
      touch-action:none;
      width:100%;
      max-width:380px;
      --card-opacity:0;
    }
    .pc-card-wrapper:hover, .pc-card-wrapper.active{--card-opacity:1}
    .pc-behind{
      position:absolute;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(circle at var(--pointer-x,50%) var(--pointer-y,50%), rgba(239,76,172,0.5) 0%, transparent 40%);
      filter:blur(50px);
      opacity:calc(0.8*var(--card-opacity));
      transition:opacity 0.2s;
    }
    .pc-card-shell{position:relative;z-index:1}
    .pc-card{
      aspect-ratio:0.718;
      border-radius:30px;
      position:relative;
      background:rgba(0,0,0,0.9);
      overflow:hidden;
      transition:transform 1s ease;
      transform:translateZ(0) rotateX(0) rotateY(0);
      box-shadow:0 8px 40px rgba(0,0,0,0.5);
      height:auto;
      min-height:420px;
    }
    .pc-card:hover, .pc-card.active{transition:none;transform:translateZ(0) rotateX(var(--rotate-y,0deg)) rotateY(var(--rotate-x,0deg))}
    .pc-card-shell.entering .pc-card{transition:transform 180ms ease-out}
    .pc-inside{inset:0;position:absolute;background:linear-gradient(145deg,rgba(96,73,110,0.35) 0%,rgba(113,196,255,0.15) 100%);background-color:rgba(0,0,0,0.85)}
    .pc-shine{
      mask-image:none;position:absolute;inset:0;z-index:3;
      background:radial-gradient(farthest-corner circle at var(--pointer-x,50%) var(--pointer-y,50%), hsla(0,0%,0%,0.1) 12%,hsla(0,0%,0%,0.15) 20%,hsla(0,0%,0%,0.25) 120%);
      mix-blend-mode:color-dodge;pointer-events:none;
    }
    .pc-glare{
      position:absolute;inset:0;z-index:4;pointer-events:none;
      background:radial-gradient(farthest-corner circle at var(--pointer-x,50%) var(--pointer-y,50%), hsla(248,25%,80%,0.6) 12%,hsla(207,40%,30%,0.4) 90%);
      mix-blend-mode:overlay;
    }
    .pc-avatar-area{
      position:absolute;bottom:0;left:0;right:0;top:0;z-index:5;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;border-radius:30px 30px 0 0;
    }
    .pc-avatar-area img{
      width:100%;height:100%;object-fit:cover;
      transform:translateX(calc((var(--pointer-from-left,0.5)-0.5)*6px)) scale(calc(1+(var(--pointer-from-top,0.5)-0.5)*0.02));
      transition:transform 120ms ease-out;
    }

    .pc-name-area{
      position:absolute;bottom:24px;left:20px;right:20px;z-index:6;
      text-align:left;pointer-events:none;
    }
    .pc-name-area h3{
      font-weight:700;font-size:1.6rem;margin:0;
      background:linear-gradient(to bottom,#fff,#c084fc);
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .pc-name-area p{font-size:0.9rem;margin:2px 0 0;color:rgba(255,255,255,0.7)}

    @media(max-width:768px){
      .pc-card-wrapper{max-width:300px;margin:0 auto}
      .pc-card{min-height:360px}
    }

    /* ── Section reveal animation ── */
    .section-hero .hero-inner,
    .section-about,
    .section-book,
    .campus-scroll-container,
    .section-contact .contact-card{
      opacity:0;transform:translateY(40px);
      transition:opacity 0.8s ease,transform 0.8s cubic-bezier(0.25,1,0.5,1);
    }
    .section-hero .hero-inner.revealed,
    .section-about.revealed,
    .section-book.revealed,
    .campus-scroll-container.revealed,
    .section-contact .contact-card.revealed{
      opacity:1;transform:translateY(0);
    }

    /* ── ShinyText animation ── */
    @keyframes shinySweep{
      0%{background-position:200% center}
      100%{background-position:-200% center}
    }
    .shiny-text{
      display:inline-block;
      background-size:200% auto;
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      animation-name:shinySweep;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
    }

    /* ── SECTION 3: Book Flip ── */
    .section-book{
      position:relative;z-index:5;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;
      padding:120px 40px 80px;
      perspective:1200px;
      perspective-origin:left center;
    }
    .project-section-title{
      font-family:'Inter',sans-serif;font-weight:900;
      font-size:2.8rem;color:#fff;margin:0 0 48px;
      letter-spacing:4px;text-align:center;
    }
    .project-section-title .split-char{
      display:inline-block;
    }
    .book-stage{
      position:relative;
      width:min(700px,90vw);
      height:min(460px,60vh);
      transform-style:preserve-3d;
    }
    .book-page{
      position:absolute;inset:0;
      transform-style:preserve-3d;
      transform-origin:left center;
      transition:transform 1.5s cubic-bezier(0.45,0,0.15,1),z-index 0s 0.75s,box-shadow 1.5s ease;
      cursor:pointer;
    }
    .book-page.flipped{
      transform:rotateY(-170deg);

    .book-page:not(.flipped)::after{

      z-index:2;

      padding:36px 40px;

    .page-org{

    .page-num{

    /* ── SECTION 4: Campus Expandable Cards ── */

  <!-- Antigravity 3D: Three.js ring particles -->
  <script>
    (function(){
      const canvas = document.getElementById('antigravity3d');
      const renderer = new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 1, 200);
      camera.position.z = 50;

      // ── Config ──
      const CFG = {
        count: 1000,
        magnetRadius: 6,
        ringRadius: 7,
        waveSpeed: 3.2,
        waveAmplitude: 1,
        particleSize: 1.5,
        lerpSpeed: 0.05,
        color: '#EC4899',
        autoAnimate: true,
        particleVariance: 1,
        rotationSpeed: 0,
        depthFactor: 1,
        pulseSpeed: 3,
        fieldStrength: 10
      };

      const colorHex = parseInt(CFG.color.replace('#',''),16);
      const material = new THREE.MeshBasicMaterial({color: colorHex});
      const geometry = new THREE.SphereGeometry(0.2, 8, 8);
      const mesh = new THREE.InstancedMesh(geometry, material, CFG.count);
      scene.add(mesh);

      const dummy = new THREE.Object3D();
      const particles = [];
      const vpW = 100, vpH = 100;

      for(let i=0;i<CFG.count;i++){
        particles.push({
          t: Math.random()*100,
          speed: 0.01 + Math.random()/200,
          mx: (Math.random()-0.5)*vpW,
          my: (Math.random()-0.5)*vpH,
          mz: (Math.random()-0.5)*20,
          cx: (Math.random()-0.5)*vpW,
          cy: (Math.random()-0.5)*vpH,
          cz: (Math.random()-0.5)*20,
          rOff: (Math.random()-0.5)*2
        });
      }

      const mouse = {x:0, y:0, active:false, lastX:0, lastY:0, lastMove:0};
      const virtual = {x:0, y:0};
      const clock = new THREE.Clock();

      function onMouse(e){
        mouse.x = (e.clientX/window.innerWidth-0.5)*vpW;
        mouse.y = -(e.clientY/window.innerHeight-0.5)*vpH;
        mouse.lastMove = performance.now();
        mouse.active = true;
      }
      window.addEventListener('mousemove', onMouse);
      window.addEventListener('mouseleave', ()=>mouse.active=false);

      function animate(){
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(),0.1);
        const elapsed = performance.now()/1000;

        // Auto-animate when idle
        let destX = mouse.x, destY = mouse.y;
        if(CFG.autoAnimate && elapsed - mouse.lastMove/1000 > 2){
          destX = Math.sin(elapsed*0.5)*(vpW/4);
          destY = Math.cos(elapsed)*(vpH/4);
        }

        virtual.x += (destX - virtual.x)*0.05;
        virtual.y += (destY - virtual.y)*0.05;

        const tx = virtual.x, ty = virtual.y;

        for(let i=0;i<CFG.count;i++){
          const p = particles[i];
          p.t += p.speed/2;

          const proj = 1 - p.cz/50;
          const ptx = tx*proj, pty = ty*proj;

          const dx = p.mx - ptx, dy = p.my - pty;
          const dist = Math.sqrt(dx*dx+dy*dy);

          let tpx = p.mx, tpy = p.my, tpz = p.mz*CFG.depthFactor;

          if(dist < CFG.magnetRadius){
            const angle = Math.atan2(dy,dx);
            const wave = Math.sin(p.t*CFG.waveSpeed+angle)*(0.5*CFG.waveAmplitude);
            const dev = p.rOff*(5/(CFG.fieldStrength+0.1));
            const rr = CFG.ringRadius + wave + dev;
            tpx = ptx + rr*Math.cos(angle);
            tpy = pty + rr*Math.sin(angle);
            tpz = p.mz*CFG.depthFactor + Math.sin(p.t)*CFG.waveAmplitude*CFG.depthFactor;
          }

          p.cx += (tpx-p.cx)*CFG.lerpSpeed;
          p.cy += (tpy-p.cy)*CFG.lerpSpeed;
          p.cz += (tpz-p.cz)*CFG.lerpSpeed;

          dummy.position.set(p.cx, p.cy, p.cz);
          dummy.lookAt(ptx, pty, p.cz);
          dummy.rotateX(Math.PI/2);

          const cdist = Math.sqrt((p.cx-ptx)**2+(p.cy-pty)**2);
          const dRing = Math.abs(cdist-CFG.ringRadius);
          let s = Math.max(0, Math.min(1, 1-dRing/10));
          s = s*(0.8+Math.sin(p.t*CFG.pulseSpeed)*0.2*CFG.particleVariance)*CFG.particleSize;
          dummy.scale.set(s,s,s);
          dummy.updateMatrix();
          mesh.setMatrixAt(i, dummy.matrix);
        }
        mesh.instanceMatrix.needsUpdate = true;

        renderer.render(scene, camera);
      }

      window.addEventListener('resize',()=>{
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
      });

      animate();
    })();

          const st = window.scrollY + window.innerHeight*0.5;
          const ch = window.innerHeight;
          const sp = parsePct(stackPosition, ch);
          const se = parsePct(scaleEndPosition, ch);
          const endEl = document.querySelector('.scroll-stack-end');
          const endTop = endEl ? getElTop(endEl) : 0;

          cardsRef.current.forEach((card,i)=>{
            if(!card) return;
            const ct = getElTop(card);
            const tS = ct - sp - itemStackDistance*i;
            const tE = ct - se;
            const pS = ct - sp - itemStackDistance*i;
            const pE = endTop - ch/2;

            const sp2 = calcP(st, tS, tE);
            const ts = baseScale + i*itemScale;
            const scale = 1 - sp2*(1-ts);
            const rot = rotationAmount ? i*rotationAmount*sp2 : 0;

            let blur = 0;
            if(blurAmount){
              let topIdx = 0;
              for(let j=0;j<cardsRef.current.length;j++){
                if(st >= (getElTop(cardsRef.current[j])-sp-itemStackDistance*j)) topIdx=j;
              }
              if(i<topIdx) blur = Math.max(0,(topIdx-i)*blurAmount);
            }

            let ty = 0;
            if(st>=pS && st<=pE) ty = st - ct + sp + itemStackDistance*i;
            else if(st>pE) ty = pE - ct + sp + itemStackDistance*i;

            const nt = {
              ty:Math.round(ty*100)/100,
              sc:Math.round(scale*1000)/1000,
              rt:Math.round(rot*100)/100,
              bl:Math.round(blur*100)/100
            };
            const lt = lastTransformsRef.current.get(i);
            if(!lt || Math.abs(lt.ty-nt.ty)>0.05 || Math.abs(lt.sc-nt.sc)>0.0005){
              card.style.transform = `translate3d(0,${nt.ty}px,0) scale(${nt.sc}) rotate(${nt.rt}deg)`;
              card.style.filter = nt.bl>0.01 ? `blur(${nt.bl}px)` : '';
              lastTransformsRef.current.set(i,nt);
            }
          });
          isUpdatingRef.current = false;
        },[itemScale,itemStackDistance,stackPosition,scaleEndPosition,baseScale,rotationAmount,blurAmount,calcP,parsePct,getElTop]);

        useLayoutEffect(()=>{
          const cards = Array.from(document.querySelectorAll('.scroll-stack-card'));
          cardsRef.current = cards;
          cards.forEach((card,i)=>{
            if(i<cards.length-1) card.style.marginBottom = `${itemDistance}px`;
            card.style.willChange = 'transform,filter';
            card.style.transformOrigin = 'top center';
          });
          const onScroll = () => update();
          window.addEventListener('scroll', onScroll, {passive:true});
          let raf;
          const loop = () => { update(); raf = requestAnimationFrame(loop); };
          raf = requestAnimationFrame(loop);
          return () => {
            cancelAnimationFrame(raf);
            window.removeEventListener('scroll', onScroll);
          };
        },[itemDistance,update]);

        return (
          <div className={`scroll-stack-scroller ${className}`.trim()}>
            <div className="scroll-stack-inner">
              {children}
              <div className="scroll-stack-end" />
            </div>
          </div>
        );
      };

      // ──── JobMatcher ────
      const JobMatcher = () => {
        // ── View 1: Form state ──
        const [jd, setJd] = useState('');
        const [loading, setLoading] = useState(false);
        const [showModal, setShowModal] = useState(false);
        const [analysis, setAnalysis] = useState(null);
        const [blocksVisible, setBlocksVisible] = useState(false);

        const modalScrollRef = useRef(null);

        // ── AI mock analysis ──
        const resumeBaseline = '张梦媛 华中科技大学 广告学 加权92.25 前15% CET6 CET4 立刻入职 新媒体运营 广告策划 市场营销 市场调研 数据分析 传播学研究方法 国家三等奖 大创省级 Python SPSS Excel VLOOKUP SnowNLP 文本情感分析 Photoshop AE 剪映 可画 秀米 Coze智能体6类 AI工作流 Prompt优化 Midjourney 即梦 可灵Kling Vibecoding 短视频剪辑 热点脚本 二创制作 抖音 小红书 B站 微博 爆款机制 微信公众号 推文100篇 粉丝增长20% 策划部部长 AIGC全链路 播放量1万 点赞破千 问卷调研 网络文本挖掘 2500条评论 分层抽样 EFA Kmeans聚类 PROCESS中介效应 口袋公园 537份样本 品牌整合营销 竞品分析 用户研究 AD钙奶 娃哈哈 一带一路 舆情分析 国际传播 跨文化 媒介投放 SPSS数据复盘 达人筛选 投放效率提升15% ROI增长200%';
        const runAnalysis = () => {
          if(!jd.trim()) return;
          setLoading(true);

          setTimeout(() => {
            const allText = (jd + ' ' + resumeBaseline).toLowerCase();
            const jdText = jd.toLowerCase();

            // Scoring helpers
            const countKw = (text, kws) => {
              let hits = 0;
              kws.forEach(k => {
                try { if(new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi').test(text)) hits++; }
                catch(e){}
              });
              return hits;
            };

            // 5 dimensions — scores in 75-100 range
            const dimDefs = [
              { name:'技能匹配度',   kws:['Python','SPSS','Excel','PS','AE','剪辑','AI','AIGC','Coze','Prompt','Midjourney','即梦','可灵','设计','数据分析','运营','新媒体','抖音','小红书','写作','文案','PPT','Office'] },
              { name:'经验匹配度',   kws:['实习','项目','公众号','推文','短视频','品牌','营销','策划','市场调研','比赛','获奖','课题','ROI','粉丝','播放量','达人','投放','社群','直播','电商'] },
              { name:'教育背景',     kws:['本科','硕士','博士','985','211','广告','新闻','传播','市场营销','新媒体','计算机','设计','统计','心理学','加权','GPA','排名'] },
              { name:'软实力匹配',   kws:['沟通','团队','领导','学习','创意','执行','抗压','逻辑','表达','管理','统筹','自驱','责任心','协作','用户思维','网感','数据驱动'] },
              { name:'发展潜力',     kws:['AI','AIGC','大模型','智能体','自动化','Vibecoding','创新','趋势','增长','突破','数字化','跨界','Prompt','低代码'] },
            ];

            const dimResults = dimDefs.map(def => {
              const jdHits = countKw(jdText, def.kws);
              const allHits = countKw(allText, def.kws);
              const coverage = jdHits > 0 ? Math.min(1, allHits / Math.max(1, jdHits * 1.5)) : 0.6;
              const score = Math.round(75 + coverage * 23 + Math.random() * 3);
              const clamped = Math.min(99, Math.max(75, score));

              let comment;
              if(clamped >= 90) comment = '该维度高度匹配，候选人在此领域具备突出优势，完全胜任岗位要求。';
              else if(clamped >= 85) comment = '匹配良好，核心能力覆盖充分，可快速适应岗位需要。';
              else if(clamped >= 80) comment = '基本匹配，主要能力达标，部分细节可通过短期学习补齐。';
              else comment = '达到基准线，具备基础能力框架，建议入职后重点培养此维度。';

              return { name:def.name, score:clamped, comment };
            });

            const totalScore = Math.round(dimResults.reduce((a,b)=>a+b.score,0) / dimResults.length);
            const summary = totalScore >= 90
              ? '候选人与岗位高度匹配，核心维度表现优异，建议优先录用。'
              : totalScore >= 85
                ? '候选人综合能力良好，主要维度均达到较高水平，可作为重点考虑人选。'
                : '候选人达到岗位基本要求，具备发展潜力，建议结合面试进一步评估。';

            const highlights = [
              dimResults.sort((a,b)=>b.score-a.score)[0].name + '表现突出（' + dimResults.sort((a,b)=>b.score-a.score)[0].score + '%），是该候选人的核心竞争优势。',
              dimResults.filter(d=>d.score>=85).length >= 3
                ? '多项能力维度超过85%，综合素质均衡，无明显短板。'
                : '关键维度达到岗位要求，具备快速成长的潜力基础。',
              '候选人具备' + (allText.includes('ai')||allText.includes('AI')?'AI工具应用与数据驱动思维，适应行业数字化转型趋势。':'较强的学习意愿与成长潜力，可在实践中快速提升。'),
            ];

            const suggestions = [
              dimResults.sort((a,b)=>a.score-b.score)[0].name + '为相对薄弱环节（' + dimResults.sort((a,b)=>a.score-b.score)[0].score + '%），建议入职后通过培训或有针对性的项目实践重点提升。',
              '可在面试环节进一步考察候选人在实际场景中的问题解决能力与团队协作方式。',
            ];

            const result = {
              overall: totalScore,
              summary,
              dimensions: dimResults,
              highlights,
              suggestions: suggestions.slice(0,2),
              position: '目标岗位',
            };

            setAnalysis(result);
            setLoading(false);
            setShowModal(true);
            setBlocksVisible(false);

            // Trigger stagger after modal slides up
            setTimeout(() => setBlocksVisible(true), 500);
          }, 1500 + Math.random() * 800);
        };

        const closeModal = () => {
          setShowModal(false);
          setAnalysis(null);
          document.body.style.overflow = '';
        };

        // ── Escape key + scroll lock ──
        useEffect(() => {
          const onKey = e => { if(e.key==='Escape' && showModal) closeModal(); };
          if(showModal){ document.body.style.overflow='hidden'; window.addEventListener('keydown',onKey); }
          return ()=>{ document.body.style.overflow=''; window.removeEventListener('keydown',onKey); };
        }, [showModal]);

        // ── Sub-components ──

        // Circular progress ring
        const ScoreRing = ({ pct, size=160 }) => {
          const r = (size/2) - 10;
          const circumference = 2 * Math.PI * r;
          const offset = circumference - (pct/100) * circumference;
          const gradientId = 'jm-ring-grad-' + (pct||0);
          const color = pct>=90?'#34d399':pct>=85?'#f59e0b':'#ef4cac';
          return React.createElement('div',{className:'jm-score-ring',style:{width:size,height:size}},
            React.createElement('svg',{viewBox:'0 0 '+size+' '+size,width:size,height:size},
              React.createElement('defs',null,
                React.createElement('linearGradient',{id:gradientId,x1:'0%',y1:'0%',x2:'100%',y2:'100%'},
                  React.createElement('stop',{offset:'0%',stopColor:color}),
                  React.createElement('stop',{offset:'100%',stopColor:'#c084fc'})
                )
              ),
              React.createElement('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:'rgba(255,255,255,0.06)',strokeWidth:8}),
              React.createElement('circle',{
                cx:size/2,cy:size/2,r,fill:'none',
                stroke:'url(#'+gradientId+')',strokeWidth:8,
                strokeDasharray:circumference,
                strokeDashoffset:offset,
                strokeLinecap:'round',
                transform:'rotate(-90 '+size/2+' '+size/2+')',
                style:{transition:'stroke-dashoffset 1.2s ease'}
              })
            ),
            React.createElement('div',{className:'jm-score-text'},
              React.createElement('span',{className:'jm-score-num'},pct+'%'),
              React.createElement('span',{className:'jm-score-label'},'综合适配度')
            )
          );
        };

        // 5-axis Radar
        const Radar5 = ({ data, size=400 }) => {
          const canvasRef = useRef(null);
          useEffect(()=>{
            const c=canvasRef.current; if(!c||!data||data.length!==5) return;
            const dpr=Math.min(window.devicePixelRatio||1,2);
            const w=size,h=size; c.width=Math.floor(w*dpr); c.height=Math.floor(h*dpr);
            c.style.width=w+'px'; c.style.height=h+'px';
            const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
            const cx=w/2, cy=h/2, radius=w*0.32, levels=5;
            ctx.clearRect(0,0,w,h);
            // Grid
            for(let l=1;l<=levels;l++){
              const r=(radius/levels)*l;
              ctx.beginPath();
              for(let i=0;i<5;i++){const a=-Math.PI/2+(Math.PI*2/5)*i; const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
              ctx.closePath(); ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1; ctx.stroke();
              ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.font='9px "JetBrains Mono",monospace'; ctx.textAlign='left';
              ctx.fillText(Math.round(l*(100/levels)),cx+5,cy-r-2);
            }
            // Axes
            for(let i=0;i<5;i++){const a=-Math.PI/2+(Math.PI*2/5)*i; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+radius*Math.cos(a),cy+radius*Math.sin(a)); ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.stroke();}
            // Data polygon
            ctx.beginPath();
            for(let i=0;i<5;i++){const a=-Math.PI/2+(Math.PI*2/5)*i; const r=Math.max(2,(data[i].score/100)*radius); const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
            ctx.closePath(); ctx.fillStyle='rgba(239,76,172,0.1)'; ctx.fill(); ctx.strokeStyle='rgba(239,76,172,0.45)'; ctx.lineWidth=2.2; ctx.stroke();
            // Points
            for(let i=0;i<5;i++){
              const a=-Math.PI/2+(Math.PI*2/5)*i; const r=Math.max(2,(data[i].score/100)*radius);
              const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); const sc=data[i].score;
              let cl='#34d399'; if(sc<=80)cl='#f59e0b'; if(sc<=75)cl='#ef4444';
              ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fillStyle=cl; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1.8; ctx.stroke();
              ctx.fillStyle=cl; ctx.font='bold 10px "JetBrains Mono",monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
              ctx.fillText(sc,(cx+(r+15)*Math.cos(a)),(cy+(r+15)*Math.sin(a)));
              ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='11px "Inter","PingFang SC","Microsoft YaHei",sans-serif';
              ctx.fillText(data[i].name,(cx+(radius+30)*Math.cos(a)),(cy+(radius+30)*Math.sin(a)));
            }
            ctx.beginPath(); ctx.arc(cx,cy,2.5,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fill();
          },[data,size]);
          return React.createElement('canvas',{ref:canvasRef});
        };

        // ── Modal ──
        const modal = showModal ? (
          <div className="jm-overlay open">
            {/* ① Top bar */}
            <div className="jm-modal-topbar">
              <button className="jm-back-btn" onClick={closeModal}>← 返回</button>
              <span className="jm-topbar-title">适配度分析报告</span>
              <span className="jm-topbar-tag">{analysis?.position || '目标岗位'}</span>
            </div>

            {/* Scrollable body */}
            <div className="jm-modal-scroll" ref={modalScrollRef}>
              <div className="jm-modal-inner">

                {/* ② Score */}
                <div className={'jm-block'+(blocksVisible?' visible':'')} style={{transitionDelay:'0.05s'}}>
                  <div className="jm-score-section">
                    {analysis && React.createElement(ScoreRing,{pct:analysis.overall,size:190})}
                    <div className="jm-score-summary">{analysis?.summary}</div>
                  </div>
                </div>

                {/* ③ Radar */}
                <div className={'jm-block'+(blocksVisible?' visible':'')} style={{transitionDelay:'0.15s'}}>
                  <div className="jm-radar-section">
                    <h3>能力维度分析</h3>
                    <div className="jm-radar-wrap2">
                      {analysis && React.createElement(Radar5,{data:analysis.dimensions.map(d=>({name:d.name,score:d.score})),size:400})}
                    </div>
                  </div>
                </div>

                {/* ④ Dimension details */}
                <div className={'jm-block'+(blocksVisible?' visible':'')} style={{transitionDelay:'0.25s'}}>
                  <div className="jm-detail-section">
                    <h3>各维度详情</h3>
                    <div className="jm-dim-list2">
                      {analysis?.dimensions.map((d,i)=>(
                        <div className="jm-dim-row" key={i}>
                          <div className="jm-dim-name2">{d.name}</div>
                          <div className="jm-dim-bar-wrap">
                            <div className="jm-dim-bar-fill2" style={{
                              width:blocksVisible?d.score+'%':'0%',
                              background:d.score>=90?'linear-gradient(90deg,#34d399,#22d3ee)':d.score>=85?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,var(--pink),#c084fc)'
                            }}/>
                          </div>
                          <div className="jm-dim-score2" style={{color:d.score>=90?'#34d399':d.score>=85?'#f59e0b':'#ef4cac'}}>{d.score}%</div>
                          <div className="jm-dim-comment">{d.comment}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* ⑤ Highlights & Suggestions */}
                <div className={'jm-block'+(blocksVisible?' visible':'')} style={{transitionDelay:'0.35s'}}>
                  <div className="jm-hl-section">
                    <h3>亮点与建议</h3>
                    <div className="jm-hl-grid">
                      <div className="jm-hl-card">
                        <h4>💪 我的亮点</h4>
                        <ul>
                          {analysis?.highlights.map((h,i)=>React.createElement('li',{key:i},h))}
                        </ul>
                      </div>
                      <div className="jm-hl-card">
                        <h4>📈 提升建议</h4>
                        <ul>
                          {analysis?.suggestions.map((s,i)=>React.createElement('li',{key:i},s))}
                        </ul>
                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        ) : null;

        // ── View 1: Form ──
        return (
          <div className="jm-box border-glow-card">
            <h3>🔍 岗位适配器</h3>
            <div className="jm-sub">粘贴 JD，AI 智能评估岗位匹配度</div>

            <textarea
              className="jm-textarea"
              placeholder="在此粘贴岗位描述（JD）…&#10;例如：负责品牌新媒体账号运营，要求熟悉抖音、小红书平台规则…"
              value={jd}
              onChange={e=>setJd(e.target.value)}
            />

            <button className="jm-btn" onClick={runAnalysis} disabled={loading}>
              {loading ? (
                <React.Fragment>
                  <span className="jm-spinner"/>
                  分析中...
                </React.Fragment>
              ) : '查看适配度'}
            </button>

            {modal}
          </div>
        );
      };

      // ──── GooeyNav ────
      const GooeyNav = ({ items, activeIndex, onSelect, activeColors=['#60a5fa','#a855f7','#22d3ee','#34d399'], animationTime=600, particleCount=15, particleDistances=[90,10], particleR=100, timeVariance=300 }) => {
        const containerRef = useRef(null);
        const navRef = useRef(null);
        const filterRef = useRef(null);
        const textRef = useRef(null);

        const noise = (n=1) => n/2 - Math.random()*n;
        const getXY = (distance, pointIndex, totalPoints) => {
          const angle = ((360+noise(8))/totalPoints)*pointIndex*(Math.PI/180);
          return [distance*Math.cos(angle), distance*Math.sin(angle)];
        };
        const createParticle = (i,t,d,r) => {
          let rotate = noise(r/10);
          return {start:getXY(d[0],particleCount-i,particleCount),end:getXY(d[1]+noise(7),particleCount-i,particleCount),time:t,scale:1+noise(0.2),color:colors[Math.floor(Math.random()*colors.length)],rotate:rotate>0?(rotate+r/20)*10:(rotate-r/20)*10};
        };

        const makeParticles = (element) => {
          const d=particleDistances, r=particleR;
          const bt = animationTime*2+timeVariance;
          element.style.setProperty('--time',`${bt}ms`);
          for(let i=0;i<particleCount;i++){
            const t=animationTime*2+noise(timeVariance*2);
            const p=createParticle(i,t,d,r);
            element.classList.remove('active');
            setTimeout(()=>{
              const particle=document.createElement('span');
              const point=document.createElement('span');
              particle.classList.add('gn-particle');
              particle.style.setProperty('--start-x',`${p.start[0]}px`);
              particle.style.setProperty('--start-y',`${p.start[1]}px`);
              particle.style.setProperty('--end-x',`${p.end[0]}px`);
              particle.style.setProperty('--end-y',`${p.end[1]}px`);
              particle.style.setProperty('--time',`${p.time}ms`);
              particle.style.setProperty('--scale',`${p.scale}`);
              particle.style.setProperty('--color',`var(--pink)`);
              particle.style.setProperty('--rotate',`${p.rotate}deg`);
              point.classList.add('gn-point');
              point.style.setProperty('--color',`var(--pink)`);
              particle.appendChild(point);
              element.appendChild(particle);
              requestAnimationFrame(()=>element.classList.add('active'));
              setTimeout(()=>{try{element.removeChild(particle)}catch{}},t);
            },30);
          }
        };

        const updateEffectPosition = (element) => {
          if(!containerRef.current||!filterRef.current||!textRef.current) return;
          const cr = containerRef.current.getBoundingClientRect();
          const pos = element.getBoundingClientRect();
          Object.assign(filterRef.current.style,{left:`${pos.x-cr.x}px`,top:`${pos.y-cr.y}px`,width:`${pos.width}px`,height:`${pos.height}px`});
          Object.assign(textRef.current.style,{left:`${pos.x-cr.x}px`,top:`${pos.y-cr.y}px`,width:`${pos.width}px`,height:`${pos.height}px`});
          textRef.current.innerText = element.innerText;
        };

        const handleClick = (e, index) => {
          if(activeIndex===index) return;
          onSelect(index);
          const liEl = e.currentTarget;
          updateEffectPosition(liEl);
          if(filterRef.current){
            filterRef.current.querySelectorAll('.gn-particle').forEach(p=>filterRef.current.removeChild(p));
          }
          if(textRef.current){
            textRef.current.classList.remove('active');
            void textRef.current.offsetWidth;
            textRef.current.classList.add('active');
          }
          if(filterRef.current) makeParticles(filterRef.current);
        };

        useEffect(()=>{
          if(!navRef.current) return;
          const activeLi = navRef.current.querySelectorAll('li')[activeIndex];

  <script>
    (function(){
      const starCanvas = document.getElementById('starfield');
      const starCtx = starCanvas.getContext('2d');
      const STAR_COLOR = '#ef4cac';

      let w=0, h=0, DPR = Math.max(1, window.devicePixelRatio || 1);
      let stars = [];

      function rand(min,max){return Math.random()*(max-min)+min}

      function resize(){
        w = window.innerWidth;
        h = window.innerHeight;
        starCanvas.width = Math.floor(w * DPR);
        starCanvas.height = Math.floor(h * DPR);
        starCanvas.style.width = w + 'px';
        starCanvas.style.height = h + 'px';
        starCtx.setTransform(DPR,0,0,DPR,0,0);
        initStars();
      }

      function initStars(){
        stars = [];
        const count = Math.max(80, Math.round((w * h) / 2800));
        for(let i=0;i<count;i++){
          stars.push({
            x: Math.random()*w,
            y: Math.random()*h,
            r: rand(0.7,1.5),
            vx: rand(-0.06,0.06),
            vy: rand(-0.06,0.06),
            alpha: rand(0.25,0.8)
          });
        }
      }

      function drawStars(){
        starCtx.clearRect(0,0,w,h);
        const cx = w/2, cy = h/2;
        starCtx.fillStyle = STAR_COLOR;
        starCtx.shadowColor = 'rgba(239,76,172,0.5)';
        starCtx.shadowBlur = 1;
        for(const s of stars){
          const dx = s.x - cx, dy = s.y - cy;
          const pushX = Math.sign(dx)*0.0007*Math.max(0,1-Math.abs(dx)/cx);
          const pushY = Math.sign(dy)*0.0007*Math.max(0,1-Math.abs(dy)/cy);
          s.vx += pushX; s.vy += pushY;
          s.vx *= 0.993; s.vy *= 0.993;
          s.x += s.vx; s.y += s.vy;
          if(s.x<-10)s.x=w+10; if(s.x>w+10)s.x=-10;
          if(s.y<-10)s.y=h+10; if(s.y>h+10)s.y=-10;
          starCtx.globalAlpha = s.alpha * (0.55+0.45*Math.sin((s.x+s.y+performance.now()/90)/65));
          starCtx.beginPath();
          starCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
          starCtx.fill();
        }
        starCtx.globalAlpha = 1;
      }

      function animate(){
        drawStars();
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', ()=>{
        clearTimeout(resize._t);
        resize._t = setTimeout(resize, 120);
      });

      resize();
      animate();
    })();
  </script>

  <!-- PDF Thumbnail Renderer (global) -->
  <script>
    window.renderPDFThumb = function(pdfUrl, container) {
      if (typeof pdfjsLib === 'undefined' || !pdfUrl || !container) return;
      var canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:absolute;inset:0;z-index:1;display:block;';
      if (!container.style.position || container.style.position === 'static') {
        container.style.position = 'relative';
      }
      container.appendChild(canvas);
      var tryRender = function() {
        var rect = container.getBoundingClientRect();
        var w = rect.width, h = rect.height;
        if (w === 0 || h === 0) { requestAnimationFrame(tryRender); return; }
        pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
          return pdf.getPage(1);
        }).then(function(page) {
          var vp1 = page.getViewport({scale: 1});
          var scale = Math.min(w / vp1.width, h / vp1.height);
          var viewport = page.getViewport({scale: scale});
          var dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = Math.floor(viewport.width * dpr);
          canvas.height = Math.floor(viewport.height * dpr);
          canvas.style.width = viewport.width + 'px';
          canvas.style.height = viewport.height + 'px';
          canvas.style.position = 'absolute';
          canvas.style.left = '50%';
          canvas.style.top = '50%';
          canvas.style.transform = 'translate(-50%, -50%)';
          canvas.style.inset = 'auto';
          var ctx = canvas.getContext('2d');
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          page.render({canvasContext: ctx, viewport: viewport});
        }).catch(function() { /* keep placeholder */ });
      };
      requestAnimationFrame(tryRender);
    };
  </script>

      function autoScroll(){
        if(!scrollPaused){
          tracks.forEach(function(t){
            if(!t.el) return;
            t.el.scrollLeft += t.speed;
            // Loop: reset when reaching end
            if(t.speed > 0 && t.el.scrollLeft >= t.el.scrollWidth - t.el.clientWidth - 10){
              t.el.scrollLeft = 0;
            }
            if(t.speed < 0 && t.el.scrollLeft <= 10){
              t.el.scrollLeft = t.el.scrollWidth - t.el.clientWidth;
            }
          });
        }
        requestAnimationFrame(autoScroll);
      }

      tracks.forEach(function(t){

      var pdfDoc = null;

      // ── PDF Rendering ──
      function renderCurrentPage(){
        if(!pdfDoc || !pdfCanvas) return;
        pdfDoc.getPage(pdfCurrentPage).then(function(page){
          var viewport = page.getViewport({scale: pdfScale});
          var dpr = Math.min(window.devicePixelRatio || 1, 2);
          pdfCanvas.height = Math.floor(viewport.height * dpr);
          pdfCanvas.width = Math.floor(viewport.width * dpr);
          pdfCanvas.style.height = viewport.height + 'px';
          pdfCanvas.style.width = viewport.width + 'px';
          var ctx = pdfCanvas.getContext('2d');
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          page.render({canvasContext: ctx, viewport: viewport});
          pdfPageInfo.textContent = pdfCurrentPage + ' / ' + pdfTotalPages;
          pdfZoomLevel.textContent = Math.round(pdfScale * 100) + '%';
          pdfPrev.disabled = pdfCurrentPage <= 1;
          pdfNext.disabled = pdfCurrentPage >= pdfTotalPages;
          pdfCanvas.style.display = 'block';
          if(pdfLoading) pdfLoading.style.display = 'none';
        }).catch(function(err){
          console.error('PDF render error:', err);
          if(pdfLoading) pdfLoading.textContent = '⚠️ 加载失败';
        });
      }

      function loadAndOpenPDF(url){
        if(!pdfjsLib){
          window.open(url, '_blank');
          return;
        }
        pdfCurrentPage = 1;
        pdfScale = 1.5;
        pdfDoc = null;
        pdfCanvas.style.display = 'none';
        if(pdfLoading){ pdfLoading.style.display = 'block'; pdfLoading.textContent = '📄 加载中...'; }
        pdfViewer.classList.add('open');
        document.body.style.overflow = 'hidden';
        if(pdfDownload) pdfDownload.href = url;

        pdfjsLib.getDocument(url).promise.then(function(pdf){
          pdfDoc = pdf;
          pdfTotalPages = pdf.numPages;
          renderCurrentPage();
        }).catch(function(err){
          console.error('PDF load error:', err);
          if(pdfLoading) pdfLoading.textContent = '⚠️ 加载失败，请尝试下载';
        });
      }

      function closePdfViewer(){
        pdfViewer.classList.remove('open');
        pdfDoc = null;
        pdfCanvas.style.display = 'none';
        document.body.style.overflow = '';
      }

      // ── Toolbar events ──
      if(pdfPrev) pdfPrev.addEventListener('click', function(){
        if(pdfCurrentPage > 1){ pdfCurrentPage--; renderCurrentPage(); }
      });
      if(pdfNext) pdfNext.addEventListener('click', function(){
        if(pdfCurrentPage < pdfTotalPages){ pdfCurrentPage++; renderCurrentPage(); }
      });
      if(pdfZoomOut) pdfZoomOut.addEventListener('click', function(){
        pdfScale = Math.max(0.5, pdfScale - 0.25);
        renderCurrentPage();
      });
      if(pdfZoomIn) pdfZoomIn.addEventListener('click', function(){
        pdfScale = Math.min(3, pdfScale + 0.25);
        renderCurrentPage();
      });
      // Mouse wheel zoom
      if(pdfViewer){
        pdfViewer.addEventListener('wheel', function(e){
          if(!pdfViewer.classList.contains('open')) return;
          if(e.ctrlKey || e.metaKey){
            e.preventDefault();
            pdfScale = e.deltaY < 0 ? Math.min(3, pdfScale + 0.1) : Math.max(0.5, pdfScale - 0.1);
            renderCurrentPage();
          }
        }, {passive: false});
      }

      // ── Folder config ──
      var folderConfig = {
        '作品集': Array.from({length:18},function(_,i){return '作品集/'+(i+1)+'.pdf';}),
        '正大杯': ['正大杯/正大杯-口袋公园研究报告.pdf']
      };

      function buildPortfolioGrid(folder){
        grid.innerHTML = '';
        var files = folderConfig[folder] || [];
        files.forEach(function(pdfSrc){
          var name = pdfSrc.split('/').pop().replace('.pdf','');
          var item = document.createElement('div');
          item.className = 'portfolio-item border-glow-card';
          item.setAttribute('data-pdf', pdfSrc);
          item.innerHTML =
            '<div class="portfolio-preview">'+
              '<button class="portfolio-expand-btn" title="放大查看">⛶</button>'+
              '<div class="portfolio-preview-placeholder">📄<span>PDF</span></div>'+
            '</div>'+
            '<div class="portfolio-label">'+name+'</div>';
          grid.appendChild(item);
          window.renderPDFThumb(pdfSrc, item.querySelector('.portfolio-preview'));
        });
        bindExpandButtons();
      }

      window.openPortfolioFolder = function(folder){
        buildPortfolioGrid(folder);
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      };
      window.openPdfDirect = function(pdfSrc){
        loadAndOpenPDF(pdfSrc);
      };

      function closePortfolio(){
        overlay.classList.remove('open');
        document.body.style.overflow = '';
      }

      if(closeBtn) closeBtn.addEventListener('click', closePortfolio);
      if(overlay){
        overlay.addEventListener('click', function(e){
          if(e.target === overlay) closePortfolio();
        });
      }

      function bindExpandButtons(){
        document.querySelectorAll('.portfolio-expand-btn').forEach(function(btn){
          btn.addEventListener('click', function(e){
            e.stopPropagation();
            var item = this.closest('.portfolio-item');
            var pdfSrc = item ? item.getAttribute('data-pdf') : null;
            if(pdfSrc){ loadAndOpenPDF(pdfSrc); }
          });
        });
      }

      // Click portfolio item to open viewer
      if(grid){
        grid.addEventListener('click', function(e){
          var item = e.target.closest('.portfolio-item');
          if(!item) return;
          if(e.target.closest('.portfolio-expand-btn')) return;
          var pdfSrc = item.getAttribute('data-pdf');
          if(pdfSrc){ loadAndOpenPDF(pdfSrc); }
        });
      }

      if(pdfClose) pdfClose.addEventListener('click', closePdfViewer);
      if(pdfViewer){
        pdfViewer.addEventListener('click', function(e){
          if(e.target === pdfViewer) closePdfViewer();
        });
      }

      // Keyboard: Escape + Arrow keys for PDF nav
      document.addEventListener('keydown', function(e){
        if(pdfViewer && pdfViewer.classList.contains('open')){
          if(e.key === 'Escape'){ closePdfViewer(); }
          else if(e.key === 'ArrowLeft'){ if(pdfCurrentPage > 1){ pdfCurrentPage--; renderCurrentPage(); } }
          else if(e.key === 'ArrowRight'){ if(pdfCurrentPage < pdfTotalPages){ pdfCurrentPage++; renderCurrentPage(); } }
        } else if(overlay && overlay.classList.contains('open')){
          if(e.key === 'Escape'){ closePortfolio(); }
        }
      });
    })();
  </script>

  <!-- Particle Heart -->
  <script>
    (function(){
      function createHeartCanvas(containerId, zIdx, cyRatio){
        var container = document.getElementById(containerId);
        if(!container) return;
        container.style.position = 'relative';
        var canvas = document.createElement('canvas');
        canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:'+(zIdx||1);
        container.insertBefore(canvas, container.firstChild);
        var heartCy = cyRatio || 0.58;

        var ctx = canvas.getContext('2d');
        var w=0, h=0, dpr=Math.min(window.devicePixelRatio||1,2);
        var mouse = {x:-9999,y:-9999,active:false};
        var particles = [];
        var COUNT = 900;

        function resize(){
          var rect = container.getBoundingClientRect();
          w = rect.width; h = rect.height;
          canvas.width = Math.floor(w*dpr); canvas.height = Math.floor(h*dpr);
          canvas.style.width = w+'px'; canvas.style.height = h+'px';
          ctx.setTransform(dpr,0,0,dpr,0,0);
        }

        function heartX(t){ return 16*Math.pow(Math.sin(t),3); }
        function heartY(t){ return 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t); }

        function initParticles(){
          particles = [];
          var scale = Math.min(w,h)*0.055;
          var COUNT = 700;
          for(var i=0; i<COUNT; i++){
            var t = Math.random()*Math.PI*2;
            // Only edge particles: r close to 1
            var r = 0.82 + Math.random()*0.18;
            var px=heartX(t)*scale*r, py=-heartY(t)*scale*r;
            var spread = 3 + (1-r)*20;
            px += (Math.random()-0.5)*spread;
            py += (Math.random()-0.5)*spread;
            px += (Math.random()-0.5)*scale*0.8;
            py += (Math.random()-0.5)*scale*0.8;
            particles.push({
              homeX: px, homeY: py,
              x: px, y: py,
              vx:0, vy:0,
              size: 1.5+Math.random()*2,
              phase: Math.random()*Math.PI*2,
              speed: 0.5+Math.random()*1.5
            });
          }
        }

        function animate(timestamp){
          ctx.clearRect(0,0,w,h);
          var time = timestamp*0.001;
          var cx = w/2, cy = h*heartCy;

          particles.forEach(function(p){
            // Wave oscillation
            var waveX = Math.sin(time*p.speed+p.phase)*2;
            var waveY = Math.cos(time*p.speed*1.3+p.phase)*2;
            var targetX = p.homeX + cx + waveX;
            var targetY = p.homeY + cy + waveY;

            // Mouse scatter
            if(mouse.active){
              var dx = (p.x+cx) - mouse.x;
              var dy = (p.y+cy) - mouse.y;
              var dist = Math.sqrt(dx*dx+dy*dy);
              if(dist < 250){
                var force = (250-dist)/250;
                targetX += (dx/dist)*force*160;
                targetY += (dy/dist)*force*160;
              }
            }

            // Spring physics
            p.vx += (targetX - p.x - cx)*0.04;
            p.vy += (targetY - p.y - cy)*0.04;
            p.vx *= 0.9;
            p.vy *= 0.9;
            p.x += p.vx;
            p.y += p.vy;

            // Draw
            var alpha = 0.45+0.25*Math.sin(time*p.speed+p.phase);
            ctx.fillStyle = 'rgba(255,182,193,'+alpha+')';
            ctx.shadowColor = 'rgba(255,150,180,0.4)';
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.arc(p.x+cx, p.y+cy, p.size, 0, Math.PI*2);
            ctx.fill();
          });
          ctx.shadowBlur = 0;
          requestAnimationFrame(animate);
        }

        container.addEventListener('mousemove',function(e){
          var r=container.getBoundingClientRect();
          mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
          mouse.active=true;
        });
        container.addEventListener('mouseleave',function(){mouse.active=false;});

        resize();
        initParticles();
        requestAnimationFrame(animate);

        window.addEventListener('resize',function(){
          resize(); initParticles();
        });
      }

      createHeartCanvas('hero', 4, 0.52);
    })();
  </script>

  <!-- Global BorderGlow tracker -->
  <script>
    (function(){
      function updateGlow(e){
        document.querySelectorAll('.border-glow-card').forEach(function(card){
          var r = card.getBoundingClientRect();
          var x = e.clientX - r.left, y = e.clientY - r.top;
          var cx = r.width/2, cy = r.height/2;
          var dx = x - cx, dy = y - cy;
          var kx = dx !== 0 ? cx / Math.abs(dx) : Infinity;
          var ky = dy !== 0 ? cy / Math.abs(dy) : Infinity;
          var edge = Math.min(Math.max(1 / Math.min(kx, ky), 0), 1);
          var angle = Math.atan2(dy, dx) * (180/Math.PI) + 90;
          if(angle < 0) angle += 360;
          card.style.setProperty('--edge-proximity', (edge*100).toFixed(3));
          card.style.setProperty('--cursor-angle', angle.toFixed(3)+'deg');
        });
      }
      document.addEventListener('mousemove', updateGlow);
    })();
  </script>
