  <!-- Portfolio & PDF viewer handlers -->
  <script>
    (function(){
      // ── PDF.js worker config ──
      if(typeof pdfjsLib !== 'undefined'){
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }

      var overlay = document.getElementById('portfolioOverlay');
      var closeBtn = document.getElementById('portfolioClose');
      var pdfViewer = document.getElementById('pdfViewer');
      var pdfClose = document.getElementById('pdfViewerClose');
      var pdfCanvas = document.getElementById('pdfCanvas');
      var pdfLoading = document.getElementById('pdfLoading');
      var grid = document.getElementById('portfolioGrid');

      // Toolbar elements
      var pdfPrev = document.getElementById('pdfPrev');
      var pdfNext = document.getElementById('pdfNext');
      var pdfPageInfo = document.getElementById('pdfPageInfo');
      var pdfZoomOut = document.getElementById('pdfZoomOut');
      var pdfZoomIn = document.getElementById('pdfZoomIn');
      var pdfZoomLevel = document.getElementById('pdfZoomLevel');
      var pdfDownload = document.getElementById('pdfDownloadBtn');

      // PDF state
      var pdfDoc = null;
      var pdfCurrentPage = 1;
      var pdfTotalPages = 0;
      var pdfScale = 1.5;

      // ── PDF Rendering ──
      function renderCurrentPage(){
        if(!pdfDoc || !pdfCanvas) return;
        pdfDoc.getPage(pdfCurrentPage).then(function(page){
          var viewport = page.getViewport({scale: pdfScale});
          var dpr = Math.min(window.devicePixelRatio || 1, 2);
          pdfCanvas.height = Math.floor(viewport.height * dpr);
          pdfCanvas.width = Math.floor(viewport.width * dpr);
          pdfCanvas.style.height = viewport.height + 'px';
          pdfCanvas.style.width = viewport.width + 'px';
          var ctx = pdfCanvas.getContext('2d');
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          page.render({canvasContext: ctx, viewport: viewport});
          pdfPageInfo.textContent = pdfCurrentPage + ' / ' + pdfTotalPages;
          pdfZoomLevel.textContent = Math.round(pdfScale * 100) + '%';
          pdfPrev.disabled = pdfCurrentPage <= 1;
          pdfNext.disabled = pdfCurrentPage >= pdfTotalPages;
          pdfCanvas.style.display = 'block';
          if(pdfLoading) pdfLoading.style.display = 'none';
        }).catch(function(err){
          console.error('PDF render error:', err);
          if(pdfLoading) pdfLoading.textContent = '⚠️ 加载失败';
        });
      }

      function loadAndOpenPDF(url){
        if(!pdfjsLib){
          window.open(url, '_blank');
          return;
        }
        pdfCurrentPage = 1;
        pdfScale = 1.5;
        pdfDoc = null;
        pdfCanvas.style.display = 'none';
        if(pdfLoading){ pdfLoading.style.display = 'block'; pdfLoading.textContent = '📄 加载中...'; }
        pdfViewer.classList.add('open');
        document.body.style.overflow = 'hidden';
        if(pdfDownload) pdfDownload.href = url;

        pdfjsLib.getDocument(url).promise.then(function(pdf){
          pdfDoc = pdf;
          pdfTotalPages = pdf.numPages;
          renderCurrentPage();
        }).catch(function(err){
          console.error('PDF load error:', err);
          if(pdfLoading) pdfLoading.textContent = '⚠️ 加载失败，请尝试下载';
        });
      }

      function closePdfViewer(){
        pdfViewer.classList.remove('open');
        pdfDoc = null;
        pdfCanvas.style.display = 'none';
        document.body.style.overflow = '';
      }

      // ── Toolbar events ──
      if(pdfPrev) pdfPrev.addEventListener('click', function(){
        if(pdfCurrentPage > 1){ pdfCurrentPage--; renderCurrentPage(); }
      });
      if(pdfNext) pdfNext.addEventListener('click', function(){
        if(pdfCurrentPage < pdfTotalPages){ pdfCurrentPage++; renderCurrentPage(); }
      });
      if(pdfZoomOut) pdfZoomOut.addEventListener('click', function(){
        pdfScale = Math.max(0.5, pdfScale - 0.25);
        renderCurrentPage();
      });
      if(pdfZoomIn) pdfZoomIn.addEventListener('click', function(){
        pdfScale = Math.min(3, pdfScale + 0.25);
        renderCurrentPage();
      });
      // Mouse wheel zoom
      if(pdfViewer){
        pdfViewer.addEventListener('wheel', function(e){
          if(!pdfViewer.classList.contains('open')) return;
          if(e.ctrlKey || e.metaKey){
            e.preventDefault();
            pdfScale = e.deltaY < 0 ? Math.min(3, pdfScale + 0.1) : Math.max(0.5, pdfScale - 0.1);
            renderCurrentPage();
          }
        }, {passive: false});
      }

      // ── Folder config ──
      var folderConfig = {
        '作品集': Array.from({length:18},function(_,i){return '作品集/'+(i+1)+'.pdf';}),
        '正大杯': ['正大杯/正大杯-口袋公园研究报告.pdf']
      };

      function buildPortfolioGrid(folder){
        grid.innerHTML = '';
        var files = folderConfig[folder] || [];
        files.forEach(function(pdfSrc){
          var name = pdfSrc.split('/').pop().replace('.pdf','');
          var item = document.createElement('div');
          item.className = 'portfolio-item border-glow-card';
          item.setAttribute('data-pdf', pdfSrc);
          item.innerHTML =
            '<div class="portfolio-preview">'+
              '<button class="portfolio-expand-btn" title="放大查看">⛶</button>'+
              '<div class="portfolio-preview-placeholder">📄<span>PDF</span></div>'+
            '</div>'+
            '<div class="portfolio-label">'+name+'</div>';
          grid.appendChild(item);
          window.renderPDFThumb(pdfSrc, item.querySelector('.portfolio-preview'));
        });
        bindExpandButtons();
      }

      window.openPortfolioFolder = function(folder){
        buildPortfolioGrid(folder);
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      };
      window.openPdfDirect = function(pdfSrc){
        loadAndOpenPDF(pdfSrc);
      };

      function closePortfolio(){
        overlay.classList.remove('open');
        document.body.style.overflow = '';
      }

      if(closeBtn) closeBtn.addEventListener('click', closePortfolio);
      if(overlay){
        overlay.addEventListener('click', function(e){
          if(e.target === overlay) closePortfolio();
        });
      }

      function bindExpandButtons(){
        document.querySelectorAll('.portfolio-expand-btn').forEach(function(btn){
          btn.addEventListener('click', function(e){
            e.stopPropagation();
            var item = this.closest('.portfolio-item');
            var pdfSrc = item ? item.getAttribute('data-pdf') : null;
            if(pdfSrc){ loadAndOpenPDF(pdfSrc); }
          });
        });
      }

      // Click portfolio item to open viewer
      if(grid){
        grid.addEventListener('click', function(e){
          var item = e.target.closest('.portfolio-item');
          if(!item) return;
          if(e.target.closest('.portfolio-expand-btn')) return;
          var pdfSrc = item.getAttribute('data-pdf');
          if(pdfSrc){ loadAndOpenPDF(pdfSrc); }
        });
      }

      if(pdfClose) pdfClose.addEventListener('click', closePdfViewer);
      if(pdfViewer){
        pdfViewer.addEventListener('click', function(e){
          if(e.target === pdfViewer) closePdfViewer();
        });
      }

      // Keyboard: Escape + Arrow keys for PDF nav
      document.addEventListener('keydown', function(e){
        if(pdfViewer && pdfViewer.classList.contains('open')){
          if(e.key === 'Escape'){ closePdfViewer(); }
          else if(e.key === 'ArrowLeft'){ if(pdfCurrentPage > 1){ pdfCurrentPage--; renderCurrentPage(); } }
          else if(e.key === 'ArrowRight'){ if(pdfCurrentPage < pdfTotalPages){ pdfCurrentPage++; renderCurrentPage(); } }
        } else if(overlay && overlay.classList.contains('open')){
          if(e.key === 'Escape'){ closePortfolio(); }
        }
      });
    })();
  </script>

  <!-- Particle Heart -->
  <script>
    (function(){
      function createHeartCanvas(containerId, zIdx, cyRatio){
        var container = document.getElementById(containerId);
        if(!container) return;
        container.style.position = 'relative';
        var canvas = document.createElement('canvas');
        canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:'+(zIdx||1);
        container.insertBefore(canvas, container.firstChild);
        var heartCy = cyRatio || 0.58;

        var ctx = canvas.getContext('2d');
        var w=0, h=0, dpr=Math.min(window.devicePixelRatio||1,2);
        var mouse = {x:-9999,y:-9999,active:false};
        var particles = [];
        var COUNT = 900;

        function resize(){
          var rect = container.getBoundingClientRect();
          w = rect.width; h = rect.height;
          canvas.width = Math.floor(w*dpr); canvas.height = Math.floor(h*dpr);
          canvas.style.width = w+'px'; canvas.style.height = h+'px';
          ctx.setTransform(dpr,0,0,dpr,0,0);
        }

        function heartX(t){ return 16*Math.pow(Math.sin(t),3); }
        function heartY(t){ return 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t); }

        function initParticles(){
          particles = [];
          var scale = Math.min(w,h)*0.055;
          var COUNT = 700;
          for(var i=0; i<COUNT; i++){
            var t = Math.random()*Math.PI*2;
            // Only edge particles: r close to 1
            var r = 0.82 + Math.random()*0.18;
            var px=heartX(t)*scale*r, py=-heartY(t)*scale*r;
            var spread = 3 + (1-r)*20;
            px += (Math.random()-0.5)*spread;
            py += (Math.random()-0.5)*spread;
            px += (Math.random()-0.5)*scale*0.8;
            py += (Math.random()-0.5)*scale*0.8;
            particles.push({
              homeX: px, homeY: py,
              x: px, y: py,
              vx:0, vy:0,
              size: 1.5+Math.random()*2,
              phase: Math.random()*Math.PI*2,
              speed: 0.5+Math.random()*1.5
            });
          }
        }

        function animate(timestamp){
          ctx.clearRect(0,0,w,h);
          var time = timestamp*0.001;
          var cx = w/2, cy = h*heartCy;

          particles.forEach(function(p){
            // Wave oscillation
            var waveX = Math.sin(time*p.speed+p.phase)*2;
            var waveY = Math.cos(time*p.speed*1.3+p.phase)*2;
            var targetX = p.homeX + cx + waveX;
            var targetY = p.homeY + cy + waveY;

            // Mouse scatter
            if(mouse.active){
              var dx = (p.x+cx) - mouse.x;
              var dy = (p.y+cy) - mouse.y;
              var dist = Math.sqrt(dx*dx+dy*dy);
              if(dist < 250){
                var force = (250-dist)/250;
                targetX += (dx/dist)*force*160;
                targetY += (dy/dist)*force*160;
              }
            }

            // Spring physics
            p.vx += (targetX - p.x - cx)*0.04;
            p.vy += (targetY - p.y - cy)*0.04;
            p.vx *= 0.9;
            p.vy *= 0.9;
            p.x += p.vx;
            p.y += p.vy;

            // Draw
            var alpha = 0.45+0.25*Math.sin(time*p.speed+p.phase);
            ctx.fillStyle = 'rgba(255,182,193,'+alpha+')';
            ctx.shadowColor = 'rgba(255,150,180,0.4)';
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.arc(p.x+cx, p.y+cy, p.size, 0, Math.PI*2);
            ctx.fill();
          });
          ctx.shadowBlur = 0;
          requestAnimationFrame(animate);
        }

        container.addEventListener('mousemove',function(e){
          var r=container.getBoundingClientRect();
          mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
          mouse.active=true;
        });
        container.addEventListener('mouseleave',function(){mouse.active=false;});

        resize();
        initParticles();
        requestAnimationFrame(animate);

        window.addEventListener('resize',function(){
          resize(); initParticles();
        });
      }

      createHeartCanvas('hero', 4, 0.52);
    })();
  </script>

  <!-- Global BorderGlow tracker -->
  <script>
    (function(){
      function updateGlow(e){
        document.querySelectorAll('.border-glow-card').forEach(function(card){
          var r = card.getBoundingClientRect();
          var x = e.clientX - r.left, y = e.clientY - r.top;
          var cx = r.width/2, cy = r.height/2;
          var dx = x - cx, dy = y - cy;
          var kx = dx !== 0 ? cx / Math.abs(dx) : Infinity;
          var ky = dy !== 0 ? cy / Math.abs(dy) : Infinity;
          var edge = Math.min(Math.max(1 / Math.min(kx, ky), 0), 1);
          var angle = Math.atan2(dy, dx) * (180/Math.PI) + 90;
          if(angle < 0) angle += 360;
          card.style.setProperty('--edge-proximity', (edge*100).toFixed(3));
          card.style.setProperty('--cursor-angle', angle.toFixed(3)+'deg');
        });
      }
      document.addEventListener('mousemove', updateGlow);
    })();
  </script>
