  <!-- ShinyText + About Me: React components -->
  <script type="text/babel">
    (function(){
      const { useLayoutEffect, useRef, useCallback, useState, useEffect } = React;

      // ──── useClickOutside hook ────
      const useClickOutside = (ref, handler) => {
        useEffect(() => {
          const handleClickOutside = (event) => {
            if (!ref || !ref.current || ref.current.contains(event.target)) return;
            handler(event);
          };
          document.addEventListener('mousedown', handleClickOutside);
          document.addEventListener('touchstart', handleClickOutside);
          return () => {
            document.removeEventListener('mousedown', handleClickOutside);
            document.removeEventListener('touchstart', handleClickOutside);
          };
        }, [ref, handler]);
      };

      // ──── SplitText (char-by-char GSAP animation) ────
      const SplitText = ({ text, tag='p', className='', delay=50, duration=1.25, ease='power3.out', from={opacity:0,y:40}, to={opacity:1,y:0} }) => {
        const containerRef = useRef(null);
        useEffect(()=>{
          if(!containerRef.current || !text) return;
          const el = containerRef.current;
          el.innerHTML = '';
          const chars = [...text];
          chars.forEach(ch => {
            const span = document.createElement('span');
            span.textContent = ch;
            span.style.display = 'inline-block';
            span.style.whiteSpace = ch===' '?'pre':'normal';
            el.appendChild(span);
          });
          if(window.gsap && window.ScrollTrigger){
            window.gsap.registerPlugin(window.ScrollTrigger);
            window.gsap.fromTo(el.children, from, { ...to, duration, ease, stagger: delay/1000,
              scrollTrigger: { trigger: el, start: 'top 85%', once: true }
            });
          }
        }, [text]);
        const Tag = tag;
        const style = { textAlign:'center', overflow:'hidden', display:'inline-block', whiteSpace:'normal', wordWrap:'break-word' };
        return React.createElement(Tag, { ref:containerRef, className:'split-parent '+className, style }, text);
      };

      // ──── PillNav (with GSAP hover circle) ────
      const PillNav = ({ items, activeHref, className='' }) => {
        const [activeIdx, setActiveIdx] = useState(0);
        const circleRefs = useRef([]);
        const tlRefs = useRef([]);
        const activeTweenRefs = useRef([]);
        const ease = 'power3.easeOut';

        useEffect(()=>{
          const onScroll = ()=>{
            let best=0, bestDist=Infinity;
            items.forEach((item,i)=>{
              const el = document.querySelector(item.href);
              if(el){
                const top = el.getBoundingClientRect().top;
                if(top<window.innerHeight*0.4 && Math.abs(top)<bestDist){
                  bestDist=Math.abs(top); best=i;
                }
              }
            });
            setActiveIdx(best);
          };
          window.addEventListener('scroll',onScroll,{passive:true});
          onScroll();
          return ()=>window.removeEventListener('scroll',onScroll);
        },[]);

        useEffect(()=>{
          const layout = ()=>{
            circleRefs.current.forEach((circle,i)=>{
              if(!circle?.parentElement) return;
              const pill = circle.parentElement;
              const rect = pill.getBoundingClientRect();
              const w = rect.width, h = rect.height;
              const R = ((w*w)/4 + h*h)/(2*h);
              const D = Math.ceil(2*R)+2;
              const delta = Math.ceil(R - Math.sqrt(Math.max(0,R*R - (w*w)/4)))+1;
              const originY = D - delta;
              circle.style.width = D+'px';
              circle.style.height = D+'px';
              circle.style.bottom = '-'+delta+'px';
              if(window.gsap){
                window.gsap.set(circle, {xPercent:-50, scale:0, transformOrigin:'50% '+originY+'px'});
                const label = pill.querySelector('.pill-label');
                const hover = pill.querySelector('.pill-label-hover');
                if(label) window.gsap.set(label, {y:0});
                if(hover) window.gsap.set(hover, {y:h+12, opacity:0});
                tlRefs.current[i]?.kill();
                const tl = window.gsap.timeline({paused:true});
                tl.to(circle, {scale:1.2, xPercent:-50, duration:2, ease, overwrite:'auto'}, 0);
                if(label) tl.to(label, {y:-(h+8), duration:2, ease, overwrite:'auto'}, 0);
                if(hover) tl.to(hover, {y:0, opacity:1, duration:2, ease, overwrite:'auto'}, 0);
                tlRefs.current[i] = tl;
              }
            });
          };
          layout();
          const onResize = ()=>layout();
          window.addEventListener('resize',onResize);
          if(document.fonts?.ready) document.fonts.ready.then(layout).catch(()=>{});
          return ()=>window.removeEventListener('resize',onResize);
        },[items]);

        const handleEnter = (i)=>{
          const tl = tlRefs.current[i];
          if(!tl) return;
          activeTweenRefs.current[i]?.kill();
          activeTweenRefs.current[i] = tl.tweenTo(tl.duration(), {duration:0.35, ease, overwrite:'auto'});
        };
        const handleLeave = (i)=>{
          const tl = tlRefs.current[i];
          if(!tl) return;
          activeTweenRefs.current[i]?.kill();
          activeTweenRefs.current[i] = tl.tweenTo(0, {duration:0.25, ease, overwrite:'auto'});
        };

        const circleColors = ['#ef4cac','#60a5fa','#34d399','#a855f7','#f59e0b','#06b6d4'];

        return React.createElement('div',{className:'pill-nav-container'},
          React.createElement('nav',{className:'pill-nav '+className, 'aria-label':'Main'},
            React.createElement('div',{className:'pill-nav-left'},
              React.createElement('a',{href:'#hero', className:'pill-logo', onClick:(e)=>{e.preventDefault();document.querySelector('#hero')?.scrollIntoView({behavior:'smooth',block:'start'});}},
                React.createElement('span',{style:{fontSize:'1.1rem',color:'#fff',filter:'grayscale(1) brightness(2)'}},'❤')
              ),
              React.createElement('span',{className:'pill-nav-name'},'张梦媛')
            ),
            React.createElement('div',{className:'pill-nav-items'},
              React.createElement('ul',{className:'pill-list',role:'menubar'},
                items.map((item,i)=>React.createElement('li',{key:i,role:'none'},
                  React.createElement('a',{
                    role:'menuitem',href:item.href,
                    className:'pill'+(i===activeIdx?' is-active':''),
                    onMouseEnter:()=>handleEnter(i),
                    onMouseLeave:()=>handleLeave(i),
                    onClick:(e)=>{
                      e.preventDefault();
                      const t = document.querySelector(item.href);
                      if(t) t.scrollIntoView({behavior:'smooth',block:'start'});
                    },
                    style:{
                      '--pill-bg':'rgba(255,255,255,0.06)',
                      '--pill-text':'#fff',
                      '--circle-bg':circleColors[i]||'#ef4cac',
                      '--hover-text':'#fff'
                    }
                  },
                    React.createElement('span',{className:'hover-circle','aria-hidden':true,ref:el=>{circleRefs.current[i]=el;}}),
                    React.createElement('span',{className:'label-stack'},
                      React.createElement('span',{className:'pill-label'},item.label),
                      React.createElement('span',{className:'pill-label-hover','aria-hidden':true},item.label)
                    )
                  )
                ))
              )
            )
          )
        );
      };

      // ──── Nav items ────
      const navItems = [
        {label:'HOME', href:'#hero', rotation:-6, hoverStyles:{bgColor:'#ef4cac', textColor:'#ffffff'}},
        {label:'ABOUT ME', href:'#about', rotation:4, hoverStyles:{bgColor:'#60a5fa', textColor:'#ffffff'}},
        {label:'PROJECT', href:'#project', rotation:-4, hoverStyles:{bgColor:'#34d399', textColor:'#ffffff'}},
        {label:'CAMPUS', href:'#campus', rotation:6, hoverStyles:{bgColor:'#a855f7', textColor:'#ffffff'}},
        {label:'PORTFOLIO', href:'#portfolio', rotation:-6, hoverStyles:{bgColor:'#f59e0b', textColor:'#ffffff'}},
        {label:'CONTACT', href:'#contact', rotation:4, hoverStyles:{bgColor:'#06b6d4', textColor:'#ffffff'}}
      ];

      // ──── TextPressure ────
      const dist = (a,b) => Math.sqrt((b.x-a.x)**2+(b.y-a.y)**2);
      const getAttr = (distance, maxDist, minVal, maxVal) => Math.max(minVal, maxVal-Math.abs((maxVal*distance)/maxDist)+minVal);

      const TextPressure = ({ text='CONTACT', textColor='#ffffff', strokeColor='#ef4cac', minFontSize=24, width=true, weight=true, italic=true, alpha=false, flex=true, stroke=false }) => {
        const containerRef = useRef(null);
        const titleRef = useRef(null);
        const spansRef = useRef([]);
        const mouseRef = useRef({x:0,y:0});
        const cursorRef = useRef({x:0,y:0});
        const [fontSize, setFontSize] = useState(minFontSize);
        const chars = text.split('');

        useEffect(()=>{
          const onMove = e => { cursorRef.current.x = e.clientX; cursorRef.current.y = e.clientY; };
          window.addEventListener('mousemove', onMove);
          if(containerRef.current){
            const r = containerRef.current.getBoundingClientRect();
            mouseRef.current.x = r.left+r.width/2;
            mouseRef.current.y = r.top+r.height/2;
            cursorRef.current.x = mouseRef.current.x;
            cursorRef.current.y = mouseRef.current.y;
          }
          return ()=>window.removeEventListener('mousemove', onMove);
        },[]);

        useEffect(()=>{
          if(!containerRef.current) return;
          const {width: cw} = containerRef.current.getBoundingClientRect();
          setFontSize(Math.max(cw/(chars.length/1.8), minFontSize));
        },[chars.length,minFontSize]);

        useEffect(()=>{
          let raf;
          const loop = () => {
            mouseRef.current.x += (cursorRef.current.x - mouseRef.current.x)/15;
            mouseRef.current.y += (cursorRef.current.y - mouseRef.current.y)/15;
            if(!titleRef.current){raf=requestAnimationFrame(loop);return;}
            const maxDist = titleRef.current.getBoundingClientRect().width/2;
            spansRef.current.forEach(span => {
              if(!span) return;
              const r = span.getBoundingClientRect();
              const d = dist(mouseRef.current,{x:r.x+r.width/2,y:r.y+r.height/2});
              const wdth = width ? Math.floor(getAttr(d,maxDist,5,200)) : 100;
              const wght = weight ? Math.floor(getAttr(d,maxDist,100,900)) : 400;
              const it = italic ? getAttr(d,maxDist,0,1).toFixed(2) : 0;
              const a = alpha ? getAttr(d,maxDist,0,1).toFixed(2) : 1;
              span.style.fontVariationSettings = `'wght' ${wght}, 'wdth' ${wdth}, 'ital' ${it}`;
              if(alpha) span.style.opacity = a;
            });
            raf = requestAnimationFrame(loop);
          };
          raf = requestAnimationFrame(loop);
          return ()=>cancelAnimationFrame(raf);
        },[width,weight,italic,alpha]);

        return React.createElement('div',{ref:containerRef,style:{position:'relative',width:'100%',height:'100%'}},
          React.createElement('style',null,`@font-face{font-family:'CompressaVF';src:url('https://res.cloudinary.com/dr6lvwubh/raw/upload/v1529908256/CompressaPRO-GX.woff2')}{.flex{display:flex;justify-content:center;gap:0.08em}`),
          React.createElement('h1',{
            ref:titleRef,
            className: flex?'flex':'',
            style:{fontFamily:'CompressaVF,Inter,sans-serif',textTransform:'uppercase',fontSize,margin:0,textAlign:'center',userSelect:'none',whiteSpace:'nowrap',width:'100%',fontWeight:100}
          },
            chars.map((char,i)=>React.createElement('span',{
              key:i,ref:el=>spansRef.current[i]=el,
              style:{display:'inline-block',color:textColor,minWidth:char===' '?'0.4em':'auto'}
            },char))
          )
        );
      };

      // Mount contact title
      const ctRoot = document.getElementById('contact-title-root');
      if(ctRoot) ReactDOM.createRoot(ctRoot).render(
        React.createElement(TextPressure,{text:'CONTACT ME',textColor:'#ffffff',minFontSize:32,flex:true,weight:true,width:true,italic:true,alpha:false,stroke:false})
      );

      // Mount nav
      const navRoot = document.getElementById('nav-root');
      if(navRoot) ReactDOM.createRoot(navRoot).render(
        React.createElement(PillNav, { items: navItems })
      );

      // ──── ProfileCard ────
      const ProfileCard = ({ avatarUrl, name, title, handle, status, contactText, onContactClick, behindGlowEnabled=true }) => {
        const wrapRef = useRef(null);
        const shellRef = useRef(null);
        const tiltRef = useRef({tx:0,ty:0,cx:0,cy:0,running:false,raf:null});
        const leaveRef = useRef(null);

        const setVars = useCallback((px,py)=>{
          const w = wrapRef.current;
          if(!w) return;
          const rect = w.getBoundingClientRect();
          const x = ((px-rect.left)/rect.width)*100;
          const y = ((py-rect.top)/rect.height)*100;
          const cx = x-50, cy = y-50;
          w.style.setProperty('--pointer-x',`${x}%`);
          w.style.setProperty('--pointer-y',`${y}%`);
          w.style.setProperty('--pointer-from-left',`${x/100}`);
          w.style.setProperty('--pointer-from-top',`${y/100}`);
          w.style.setProperty('--rotate-x',`${-(cx/5)}deg`);
          w.style.setProperty('--rotate-y',`${cy/4}deg`);
        },[]);

        const step = useCallback((ts)=>{
          const t = tiltRef.current;
          if(!t.running) return;
          const dt = t.lastTs ? (ts-t.lastTs)/1000 : 0.016;
          t.lastTs = ts;
          const k = 1-Math.exp(-dt/0.14);
          t.cx += (t.tx-t.cx)*k;
          t.cy += (t.ty-t.cy)*k;
          setVars(t.cx, t.cy);
          if(Math.abs(t.tx-t.cx)>0.05||Math.abs(t.ty-t.cy)>0.05){
            t.raf = requestAnimationFrame(step);
          } else { t.running = false; t.lastTs = 0; }
        },[setVars]);

        const startTilt = useCallback(()=>{
          const t = tiltRef.current;
          if(t.running) return;
          t.running = true; t.lastTs = 0;
          t.raf = requestAnimationFrame(step);
        },[step]);

        const onMove = useCallback((e)=>{
          const t = tiltRef.current;
          t.tx = e.clientX; t.ty = e.clientY;
          startTilt();
        },[startTilt]);

        const onEnter = useCallback(()=>{
          shellRef.current?.classList.add('active','entering');
          setTimeout(()=>shellRef.current?.classList.remove('entering'),180);
        },[]);

        const onLeave = useCallback(()=>{
          const shell = shellRef.current;
          const w = wrapRef.current;
          if(!shell||!w) return;
          const rect = w.getBoundingClientRect();
          const t = tiltRef.current;
          t.tx = rect.left+rect.width/2;
          t.ty = rect.top+rect.height/2;
          startTilt();
          const check=()=>{
            if(Math.abs(t.tx-t.cx)<0.6&&Math.abs(t.ty-t.cy)<0.6){
              shell.classList.remove('active');
              leaveRef.current=null;
            } else leaveRef.current=requestAnimationFrame(check);
          };
          leaveRef.current=requestAnimationFrame(check);
        },[startTilt]);

        useEffect(()=>{
          const shell = shellRef.current;
          if(!shell) return;
          shell.addEventListener('pointermove',onMove);
          shell.addEventListener('pointerenter',onEnter);
          shell.addEventListener('pointerleave',onLeave);
          // initial animation
          const rect = wrapRef.current?.getBoundingClientRect();
          if(rect){
            const t = tiltRef.current;
            t.cx = rect.left+rect.width-70; t.cy = rect.top+60;
            setVars(t.cx, t.cy);
            t.tx = rect.left+rect.width/2; t.ty = rect.top+rect.height/2;
            startTilt();
          }
          return ()=>{
            shell.removeEventListener('pointermove',onMove);
            shell.removeEventListener('pointerenter',onEnter);
            shell.removeEventListener('pointerleave',onLeave);
            if(tiltRef.current.raf) cancelAnimationFrame(tiltRef.current.raf);
            if(leaveRef.current) cancelAnimationFrame(leaveRef.current);
          };
        },[onMove,onEnter,onLeave,startTilt,setVars]);

        return React.createElement('div', {ref:wrapRef, className:'pc-card-wrapper'},
          behindGlowEnabled && React.createElement('div',{className:'pc-behind'}),
          React.createElement('div',{ref:shellRef, className:'pc-card-shell'},
            React.createElement('section',{className:'pc-card'},
              React.createElement('div',{className:'pc-inside'}),
              React.createElement('div',{className:'pc-shine'}),
              React.createElement('div',{className:'pc-glare'}),
              React.createElement('div',{className:'pc-avatar-area'},
                React.createElement('img',{src:avatarUrl, alt:name})
              ),
              React.createElement('div',{className:'pc-name-area'},
                React.createElement('h3',null,name),
                React.createElement('p',null,title)
              ),


            )
          )
        );
      };

      // ──── ShinyText ────
      const ShinyText = ({
        text, disabled=false, speed=2, className='', color='#b5b5b5',
        shineColor='#ffffff', spread=120, yoyo=false, pauseOnHover=false,
        direction='left', delay=0
      }) => {
        const [paused, setPaused] = useState(false);

        const angle = spread;
        const gradient = `linear-gradient(${angle}deg, ${color} 0%, ${color} 35%, ${shineColor} 50%, ${color} 65%, ${color} 100%)`;
        const duration = speed;
        const animDelay = delay;
        const dir = direction === 'left' ? 'normal' : 'reverse';

        return React.createElement('span', {
          className: `shiny-text ${className}`.trim(),
          style: {
            backgroundImage: gradient,
            animationDuration: `${duration}s`,
            animationDelay: `${animDelay}s`,
            animationDirection: yoyo ? 'alternate' : dir,
            animationPlayState: paused ? 'paused' : 'running'
          },
          onMouseEnter: () => pauseOnHover && setPaused(true),
          onMouseLeave: () => pauseOnHover && setPaused(false)
        }, text);
      };

      // ──── HeroTitle ────
      const HeroTitle = () =>
        React.createElement('h1', {className:'hero-title'},
          React.createElement(ShinyText, {
            text: '欢迎来到',
            speed: 2.5,
            delay: 0,
            color: '#ff1997',
            shineColor: '#ffffff',
            spread: 110,
            direction: 'left',
            yoyo: false,
            pauseOnHover: false
          }),
          React.createElement('br'),
          React.createElement(ShinyText, {
            text: '我的空间',
            speed: 2.5,
            delay: 0.6,
            color: '#FF9FFC',
            shineColor: '#ffffff',
            spread: 110,
            direction: 'left',
            yoyo: false,
            pauseOnHover: false
          })
        );

      // Mount hero title
      const heroRoot = document.getElementById('hero-title-root');
      if(heroRoot) ReactDOM.createRoot(heroRoot).render(React.createElement(HeroTitle));

      // ──── ScrollStackItem ────

      // ──── ScrollStackItem ────
      const ScrollStackItem = ({ children, itemClassName = '' }) => (
        <div className={`scroll-stack-card ${itemClassName}`.trim()}>{children}</div>
      );

      // ──── ScrollStack (window scroll based) ────
      const ScrollStack = ({
        children, className = '', itemDistance = 160, itemScale = 0.025,
        itemStackDistance = 28, stackPosition = '30%', scaleEndPosition = '10%',
        baseScale = 0.9, rotationAmount = 0, blurAmount = 0
      }) => {
        const cardsRef = useRef([]);
        const lastTransformsRef = useRef(new Map());
        const isUpdatingRef = useRef(false);

        const calcP = useCallback((st, start, end) => {
          if(st<start)return 0; if(st>end)return 1;
          return (st-start)/(end-start);
        }, []);

        const parsePct = useCallback((val, ch) =>
          typeof val==='string'&&val.includes('%') ? (parseFloat(val)/100)*ch : parseFloat(val)
        , []);

        const getElTop = useCallback(el => el.getBoundingClientRect().top + window.scrollY, []);

        const update = useCallback(() => {
          if(!cardsRef.current.length || isUpdatingRef.current) return;
          isUpdatingRef.current = true;
          const st = window.scrollY + window.innerHeight*0.5;
          const ch = window.innerHeight;
          const sp = parsePct(stackPosition, ch);
          const se = parsePct(scaleEndPosition, ch);
          const endEl = document.querySelector('.scroll-stack-end');
          const endTop = endEl ? getElTop(endEl) : 0;

          cardsRef.current.forEach((card,i)=>{
            if(!card) return;
            const ct = getElTop(card);
            const tS = ct - sp - itemStackDistance*i;
            const tE = ct - se;
            const pS = ct - sp - itemStackDistance*i;
            const pE = endTop - ch/2;

            const sp2 = calcP(st, tS, tE);
            const ts = baseScale + i*itemScale;
            const scale = 1 - sp2*(1-ts);
            const rot = rotationAmount ? i*rotationAmount*sp2 : 0;

            let blur = 0;
            if(blurAmount){
              let topIdx = 0;
              for(let j=0;j<cardsRef.current.length;j++){
                if(st >= (getElTop(cardsRef.current[j])-sp-itemStackDistance*j)) topIdx=j;
              }
              if(i<topIdx) blur = Math.max(0,(topIdx-i)*blurAmount);
            }

            let ty = 0;
            if(st>=pS && st<=pE) ty = st - ct + sp + itemStackDistance*i;
            else if(st>pE) ty = pE - ct + sp + itemStackDistance*i;

            const nt = {
              ty:Math.round(ty*100)/100,
              sc:Math.round(scale*1000)/1000,
              rt:Math.round(rot*100)/100,
              bl:Math.round(blur*100)/100
            };
            const lt = lastTransformsRef.current.get(i);
            if(!lt || Math.abs(lt.ty-nt.ty)>0.05 || Math.abs(lt.sc-nt.sc)>0.0005){
              card.style.transform = `translate3d(0,${nt.ty}px,0) scale(${nt.sc}) rotate(${nt.rt}deg)`;
              card.style.filter = nt.bl>0.01 ? `blur(${nt.bl}px)` : '';
              lastTransformsRef.current.set(i,nt);
            }
          });
          isUpdatingRef.current = false;
        },[itemScale,itemStackDistance,stackPosition,scaleEndPosition,baseScale,rotationAmount,blurAmount,calcP,parsePct,getElTop]);

        useLayoutEffect(()=>{
          const cards = Array.from(document.querySelectorAll('.scroll-stack-card'));
          cardsRef.current = cards;
          cards.forEach((card,i)=>{
            if(i<cards.length-1) card.style.marginBottom = `${itemDistance}px`;
            card.style.willChange = 'transform,filter';
            card.style.transformOrigin = 'top center';
          });
          const onScroll = () => update();
          window.addEventListener('scroll', onScroll, {passive:true});
          let raf;
          const loop = () => { update(); raf = requestAnimationFrame(loop); };
          raf = requestAnimationFrame(loop);
          return () => {
            cancelAnimationFrame(raf);
            window.removeEventListener('scroll', onScroll);
          };
        },[itemDistance,update]);

        return (
          <div className={`scroll-stack-scroller ${className}`.trim()}>
            <div className="scroll-stack-inner">
              {children}
              <div className="scroll-stack-end" />
            </div>
          </div>
        );
      };

      // ──── JobMatcher ────
      const JobMatcher = () => {
        // ── View 1: Form state ──
        const [jd, setJd] = useState('');
        const [loading, setLoading] = useState(false);
        const [showModal, setShowModal] = useState(false);
        const [analysis, setAnalysis] = useState(null);
        const [blocksVisible, setBlocksVisible] = useState(false);

        const modalScrollRef = useRef(null);

        // ── AI mock analysis ──
        const resumeBaseline = '张梦媛 华中科技大学 广告学 加权92.25 前15% CET6 CET4 立刻入职 新媒体运营 广告策划 市场营销 市场调研 数据分析 传播学研究方法 国家三等奖 大创省级 Python SPSS Excel VLOOKUP SnowNLP 文本情感分析 Photoshop AE 剪映 可画 秀米 Coze智能体6类 AI工作流 Prompt优化 Midjourney 即梦 可灵Kling Vibecoding 短视频剪辑 热点脚本 二创制作 抖音 小红书 B站 微博 爆款机制 微信公众号 推文100篇 粉丝增长20% 策划部部长 AIGC全链路 播放量1万 点赞破千 问卷调研 网络文本挖掘 2500条评论 分层抽样 EFA Kmeans聚类 PROCESS中介效应 口袋公园 537份样本 品牌整合营销 竞品分析 用户研究 AD钙奶 娃哈哈 一带一路 舆情分析 国际传播 跨文化 媒介投放 SPSS数据复盘 达人筛选 投放效率提升15% ROI增长200%';
        const runAnalysis = () => {
          if(!jd.trim()) return;
          setLoading(true);

          setTimeout(() => {
            const allText = (jd + ' ' + resumeBaseline).toLowerCase();
            const jdText = jd.toLowerCase();

            // Scoring helpers
            const countKw = (text, kws) => {
              let hits = 0;
              kws.forEach(k => {
                try { if(new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi').test(text)) hits++; }
                catch(e){}
              });
              return hits;
            };

            // 5 dimensions — scores in 75-100 range
            const dimDefs = [
              { name:'技能匹配度',   kws:['Python','SPSS','Excel','PS','AE','剪辑','AI','AIGC','Coze','Prompt','Midjourney','即梦','可灵','设计','数据分析','运营','新媒体','抖音','小红书','写作','文案','PPT','Office'] },
              { name:'经验匹配度',   kws:['实习','项目','公众号','推文','短视频','品牌','营销','策划','市场调研','比赛','获奖','课题','ROI','粉丝','播放量','达人','投放','社群','直播','电商'] },
              { name:'教育背景',     kws:['本科','硕士','博士','985','211','广告','新闻','传播','市场营销','新媒体','计算机','设计','统计','心理学','加权','GPA','排名'] },
              { name:'软实力匹配',   kws:['沟通','团队','领导','学习','创意','执行','抗压','逻辑','表达','管理','统筹','自驱','责任心','协作','用户思维','网感','数据驱动'] },
              { name:'发展潜力',     kws:['AI','AIGC','大模型','智能体','自动化','Vibecoding','创新','趋势','增长','突破','数字化','跨界','Prompt','低代码'] },
            ];

            const dimResults = dimDefs.map(def => {
              const jdHits = countKw(jdText, def.kws);
              const allHits = countKw(allText, def.kws);
              const coverage = jdHits > 0 ? Math.min(1, allHits / Math.max(1, jdHits * 1.5)) : 0.6;
              const score = Math.round(75 + coverage * 23 + Math.random() * 3);
              const clamped = Math.min(99, Math.max(75, score));

              let comment;
              if(clamped >= 90) comment = '该维度高度匹配，候选人在此领域具备突出优势，完全胜任岗位要求。';
              else if(clamped >= 85) comment = '匹配良好，核心能力覆盖充分，可快速适应岗位需要。';
              else if(clamped >= 80) comment = '基本匹配，主要能力达标，部分细节可通过短期学习补齐。';
              else comment = '达到基准线，具备基础能力框架，建议入职后重点培养此维度。';

              return { name:def.name, score:clamped, comment };
            });

            const totalScore = Math.round(dimResults.reduce((a,b)=>a+b.score,0) / dimResults.length);
            const summary = totalScore >= 90
              ? '候选人与岗位高度匹配，核心维度表现优异，建议优先录用。'
              : totalScore >= 85
                ? '候选人综合能力良好，主要维度均达到较高水平，可作为重点考虑人选。'
                : '候选人达到岗位基本要求，具备发展潜力，建议结合面试进一步评估。';

            const highlights = [
              dimResults.sort((a,b)=>b.score-a.score)[0].name + '表现突出（' + dimResults.sort((a,b)=>b.score-a.score)[0].score + '%），是该候选人的核心竞争优势。',
              dimResults.filter(d=>d.score>=85).length >= 3
                ? '多项能力维度超过85%，综合素质均衡，无明显短板。'
                : '关键维度达到岗位要求，具备快速成长的潜力基础。',
              '候选人具备' + (allText.includes('ai')||allText.includes('AI')?'AI工具应用与数据驱动思维，适应行业数字化转型趋势。':'较强的学习意愿与成长潜力，可在实践中快速提升。'),
            ];

            const suggestions = [
              dimResults.sort((a,b)=>a.score-b.score)[0].name + '为相对薄弱环节（' + dimResults.sort((a,b)=>a.score-b.score)[0].score + '%），建议入职后通过培训或有针对性的项目实践重点提升。',
              '可在面试环节进一步考察候选人在实际场景中的问题解决能力与团队协作方式。',
            ];

            const result = {
              overall: totalScore,
              summary,
              dimensions: dimResults,
              highlights,
              suggestions: suggestions.slice(0,2),
              position: '目标岗位',
            };

            setAnalysis(result);
            setLoading(false);
            setShowModal(true);
            setBlocksVisible(false);

            // Trigger stagger after modal slides up
            setTimeout(() => setBlocksVisible(true), 500);
          }, 1500 + Math.random() * 800);
        };

        const closeModal = () => {
          setShowModal(false);
          setAnalysis(null);
          document.body.style.overflow = '';
        };

        // ── Escape key + scroll lock ──
        useEffect(() => {
          const onKey = e => { if(e.key==='Escape' && showModal) closeModal(); };
          if(showModal){ document.body.style.overflow='hidden'; window.addEventListener('keydown',onKey); }
          return ()=>{ document.body.style.overflow=''; window.removeEventListener('keydown',onKey); };
        }, [showModal]);

        // ── Sub-components ──

        // Circular progress ring
        const ScoreRing = ({ pct, size=160 }) => {
          const r = (size/2) - 10;
          const circumference = 2 * Math.PI * r;
          const offset = circumference - (pct/100) * circumference;
          const gradientId = 'jm-ring-grad-' + (pct||0);
          const color = pct>=90?'#34d399':pct>=85?'#f59e0b':'#ef4cac';
          return React.createElement('div',{className:'jm-score-ring',style:{width:size,height:size}},
            React.createElement('svg',{viewBox:'0 0 '+size+' '+size,width:size,height:size},
              React.createElement('defs',null,
                React.createElement('linearGradient',{id:gradientId,x1:'0%',y1:'0%',x2:'100%',y2:'100%'},
                  React.createElement('stop',{offset:'0%',stopColor:color}),
                  React.createElement('stop',{offset:'100%',stopColor:'#c084fc'})
                )
              ),
              React.createElement('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:'rgba(255,255,255,0.06)',strokeWidth:8}),
              React.createElement('circle',{
                cx:size/2,cy:size/2,r,fill:'none',
                stroke:'url(#'+gradientId+')',strokeWidth:8,
                strokeDasharray:circumference,
                strokeDashoffset:offset,
                strokeLinecap:'round',
                transform:'rotate(-90 '+size/2+' '+size/2+')',
                style:{transition:'stroke-dashoffset 1.2s ease'}
              })
            ),
            React.createElement('div',{className:'jm-score-text'},
              React.createElement('span',{className:'jm-score-num'},pct+'%'),
              React.createElement('span',{className:'jm-score-label'},'综合适配度')
            )
          );
        };

        // 5-axis Radar
        const Radar5 = ({ data, size=400 }) => {
          const canvasRef = useRef(null);
          useEffect(()=>{
            const c=canvasRef.current; if(!c||!data||data.length!==5) return;
            const dpr=Math.min(window.devicePixelRatio||1,2);
            const w=size,h=size; c.width=Math.floor(w*dpr); c.height=Math.floor(h*dpr);
            c.style.width=w+'px'; c.style.height=h+'px';
            const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
            const cx=w/2, cy=h/2, radius=w*0.32, levels=5;
            ctx.clearRect(0,0,w,h);
            // Grid
            for(let l=1;l<=levels;l++){
              const r=(radius/levels)*l;
              ctx.beginPath();
              for(let i=0;i<5;i++){const a=-Math.PI/2+(Math.PI*2/5)*i; const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
              ctx.closePath(); ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1; ctx.stroke();
              ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.font='9px "JetBrains Mono",monospace'; ctx.textAlign='left';
              ctx.fillText(Math.round(l*(100/levels)),cx+5,cy-r-2);
            }
            // Axes
            for(let i=0;i<5;i++){const a=-Math.PI/2+(Math.PI*2/5)*i; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+radius*Math.cos(a),cy+radius*Math.sin(a)); ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.stroke();}
            // Data polygon
            ctx.beginPath();
            for(let i=0;i<5;i++){const a=-Math.PI/2+(Math.PI*2/5)*i; const r=Math.max(2,(data[i].score/100)*radius); const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
            ctx.closePath(); ctx.fillStyle='rgba(239,76,172,0.1)'; ctx.fill(); ctx.strokeStyle='rgba(239,76,172,0.45)'; ctx.lineWidth=2.2; ctx.stroke();
            // Points
            for(let i=0;i<5;i++){
              const a=-Math.PI/2+(Math.PI*2/5)*i; const r=Math.max(2,(data[i].score/100)*radius);
              const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); const sc=data[i].score;
              let cl='#34d399'; if(sc<=80)cl='#f59e0b'; if(sc<=75)cl='#ef4444';
              ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fillStyle=cl; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1.8; ctx.stroke();
              ctx.fillStyle=cl; ctx.font='bold 10px "JetBrains Mono",monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
              ctx.fillText(sc,(cx+(r+15)*Math.cos(a)),(cy+(r+15)*Math.sin(a)));
              ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='11px "Inter","PingFang SC","Microsoft YaHei",sans-serif';
              ctx.fillText(data[i].name,(cx+(radius+30)*Math.cos(a)),(cy+(radius+30)*Math.sin(a)));
            }
            ctx.beginPath(); ctx.arc(cx,cy,2.5,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fill();
          },[data,size]);
          return React.createElement('canvas',{ref:canvasRef});
        };

        // ── Modal ──
        const modal = showModal ? (
          <div className="jm-overlay open">
            {/* ① Top bar */}
            <div className="jm-modal-topbar">
              <button className="jm-back-btn" onClick={closeModal}>← 返回</button>
              <span className="jm-topbar-title">适配度分析报告</span>
              <span className="jm-topbar-tag">{analysis?.position || '目标岗位'}</span>
            </div>

            {/* Scrollable body */}
            <div className="jm-modal-scroll" ref={modalScrollRef}>
              <div className="jm-modal-inner">

                {/* ② Score */}
                <div className={'jm-block'+(blocksVisible?' visible':'')} style={{transitionDelay:'0.05s'}}>
                  <div className="jm-score-section">
                    {analysis && React.createElement(ScoreRing,{pct:analysis.overall,size:190})}
                    <div className="jm-score-summary">{analysis?.summary}</div>
                  </div>
                </div>

                {/* ③ Radar */}
                <div className={'jm-block'+(blocksVisible?' visible':'')} style={{transitionDelay:'0.15s'}}>
                  <div className="jm-radar-section">
                    <h3>能力维度分析</h3>
                    <div className="jm-radar-wrap2">
                      {analysis && React.createElement(Radar5,{data:analysis.dimensions.map(d=>({name:d.name,score:d.score})),size:400})}
                    </div>
                  </div>
                </div>

                {/* ④ Dimension details */}
                <div className={'jm-block'+(blocksVisible?' visible':'')} style={{transitionDelay:'0.25s'}}>
                  <div className="jm-detail-section">
                    <h3>各维度详情</h3>
                    <div className="jm-dim-list2">
                      {analysis?.dimensions.map((d,i)=>(
                        <div className="jm-dim-row" key={i}>
                          <div className="jm-dim-name2">{d.name}</div>
                          <div className="jm-dim-bar-wrap">
                            <div className="jm-dim-bar-fill2" style={{
                              width:blocksVisible?d.score+'%':'0%',
                              background:d.score>=90?'linear-gradient(90deg,#34d399,#22d3ee)':d.score>=85?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,var(--pink),#c084fc)'
                            }}/>
                          </div>
                          <div className="jm-dim-score2" style={{color:d.score>=90?'#34d399':d.score>=85?'#f59e0b':'#ef4cac'}}>{d.score}%</div>
                          <div className="jm-dim-comment">{d.comment}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* ⑤ Highlights & Suggestions */}
                <div className={'jm-block'+(blocksVisible?' visible':'')} style={{transitionDelay:'0.35s'}}>
                  <div className="jm-hl-section">
                    <h3>亮点与建议</h3>
                    <div className="jm-hl-grid">
                      <div className="jm-hl-card">
                        <h4>💪 我的亮点</h4>
                        <ul>
                          {analysis?.highlights.map((h,i)=>React.createElement('li',{key:i},h))}
                        </ul>
                      </div>
                      <div className="jm-hl-card">
                        <h4>📈 提升建议</h4>
                        <ul>
                          {analysis?.suggestions.map((s,i)=>React.createElement('li',{key:i},s))}
                        </ul>
                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        ) : null;

        // ── View 1: Form ──
        return (
          <div className="jm-box border-glow-card">
            <h3>🔍 岗位适配器</h3>
            <div className="jm-sub">粘贴 JD，AI 智能评估岗位匹配度</div>

            <textarea
              className="jm-textarea"
              placeholder="在此粘贴岗位描述（JD）…&#10;例如：负责品牌新媒体账号运营，要求熟悉抖音、小红书平台规则…"
              value={jd}
              onChange={e=>setJd(e.target.value)}
            />

            <button className="jm-btn" onClick={runAnalysis} disabled={loading}>
              {loading ? (
                <React.Fragment>
                  <span className="jm-spinner"/>
                  分析中...
                </React.Fragment>
              ) : '查看适配度'}
            </button>

            {modal}
          </div>
        );
      };

      // ──── GooeyNav ────
      const GooeyNav = ({ items, activeIndex, onSelect, activeColors=['#60a5fa','#a855f7','#22d3ee','#34d399'], animationTime=600, particleCount=15, particleDistances=[90,10], particleR=100, timeVariance=300 }) => {
        const containerRef = useRef(null);
        const navRef = useRef(null);
        const filterRef = useRef(null);
        const textRef = useRef(null);

        const noise = (n=1) => n/2 - Math.random()*n;
        const getXY = (distance, pointIndex, totalPoints) => {
          const angle = ((360+noise(8))/totalPoints)*pointIndex*(Math.PI/180);
          return [distance*Math.cos(angle), distance*Math.sin(angle)];
        };
        const createParticle = (i,t,d,r) => {
          let rotate = noise(r/10);
          return {start:getXY(d[0],particleCount-i,particleCount),end:getXY(d[1]+noise(7),particleCount-i,particleCount),time:t,scale:1+noise(0.2),color:colors[Math.floor(Math.random()*colors.length)],rotate:rotate>0?(rotate+r/20)*10:(rotate-r/20)*10};
        };

        const makeParticles = (element) => {
          const d=particleDistances, r=particleR;
          const bt = animationTime*2+timeVariance;
          element.style.setProperty('--time',`${bt}ms`);
          for(let i=0;i<particleCount;i++){
            const t=animationTime*2+noise(timeVariance*2);
            const p=createParticle(i,t,d,r);
            element.classList.remove('active');
            setTimeout(()=>{
              const particle=document.createElement('span');
              const point=document.createElement('span');
              particle.classList.add('gn-particle');
              particle.style.setProperty('--start-x',`${p.start[0]}px`);
              particle.style.setProperty('--start-y',`${p.start[1]}px`);
              particle.style.setProperty('--end-x',`${p.end[0]}px`);
              particle.style.setProperty('--end-y',`${p.end[1]}px`);
              particle.style.setProperty('--time',`${p.time}ms`);
              particle.style.setProperty('--scale',`${p.scale}`);
              particle.style.setProperty('--color',`var(--pink)`);
              particle.style.setProperty('--rotate',`${p.rotate}deg`);
              point.classList.add('gn-point');
              point.style.setProperty('--color',`var(--pink)`);
              particle.appendChild(point);
              element.appendChild(particle);
              requestAnimationFrame(()=>element.classList.add('active'));

  <script>
    (function(){
      const starCanvas = document.getElementById('starfield');
      const starCtx = starCanvas.getContext('2d');
      const STAR_COLOR = '#ef4cac';

      let w=0, h=0, DPR = Math.max(1, window.devicePixelRatio || 1);
      let stars = [];

      function rand(min,max){return Math.random()*(max-min)+min}

      function resize(){
        w = window.innerWidth;
        h = window.innerHeight;
        starCanvas.width = Math.floor(w * DPR);
        starCanvas.height = Math.floor(h * DPR);
        starCanvas.style.width = w + 'px';
        starCanvas.style.height = h + 'px';
        starCtx.setTransform(DPR,0,0,DPR,0,0);
        initStars();
      }

      function initStars(){
        stars = [];
        const count = Math.max(80, Math.round((w * h) / 2800));
        for(let i=0;i<count;i++){
          stars.push({
            x: Math.random()*w,
            y: Math.random()*h,
            r: rand(0.7,1.5),
            vx: rand(-0.06,0.06),
            vy: rand(-0.06,0.06),
            alpha: rand(0.25,0.8)
          });
        }
      }

      function drawStars(){
        starCtx.clearRect(0,0,w,h);
        const cx = w/2, cy = h/2;
        starCtx.fillStyle = STAR_COLOR;
        starCtx.shadowColor = 'rgba(239,76,172,0.5)';
        starCtx.shadowBlur = 1;
        for(const s of stars){
          const dx = s.x - cx, dy = s.y - cy;
          const pushX = Math.sign(dx)*0.0007*Math.max(0,1-Math.abs(dx)/cx);
          const pushY = Math.sign(dy)*0.0007*Math.max(0,1-Math.abs(dy)/cy);
          s.vx += pushX; s.vy += pushY;
          s.vx *= 0.993; s.vy *= 0.993;
          s.x += s.vx; s.y += s.vy;
          if(s.x<-10)s.x=w+10; if(s.x>w+10)s.x=-10;
          if(s.y<-10)s.y=h+10; if(s.y>h+10)s.y=-10;
          starCtx.globalAlpha = s.alpha * (0.55+0.45*Math.sin((s.x+s.y+performance.now()/90)/65));
          starCtx.beginPath();
          starCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
          starCtx.fill();
        }
        starCtx.globalAlpha = 1;
      }

      function animate(){
        drawStars();
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', ()=>{
        clearTimeout(resize._t);
        resize._t = setTimeout(resize, 120);
      });

      resize();
      animate();
    })();
  </script>

  <!-- PDF Thumbnail Renderer (global) -->
  <script>
    window.renderPDFThumb = function(pdfUrl, container) {
      if (typeof pdfjsLib === 'undefined' || !pdfUrl || !container) return;
      var canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:absolute;inset:0;z-index:1;display:block;';
      if (!container.style.position || container.style.position === 'static') {
        container.style.position = 'relative';
      }
      container.appendChild(canvas);
      var tryRender = function() {
        var rect = container.getBoundingClientRect();
        var w = rect.width, h = rect.height;
        if (w === 0 || h === 0) { requestAnimationFrame(tryRender); return; }
        pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
          return pdf.getPage(1);
        }).then(function(page) {
          var vp1 = page.getViewport({scale: 1});
          var scale = Math.min(w / vp1.width, h / vp1.height);
          var viewport = page.getViewport({scale: scale});
          var dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = Math.floor(viewport.width * dpr);
          canvas.height = Math.floor(viewport.height * dpr);
          canvas.style.width = viewport.width + 'px';
          canvas.style.height = viewport.height + 'px';
          canvas.style.position = 'absolute';
          canvas.style.left = '50%';
          canvas.style.top = '50%';
          canvas.style.transform = 'translate(-50%, -50%)';
          canvas.style.inset = 'auto';
          var ctx = canvas.getContext('2d');
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          page.render({canvasContext: ctx, viewport: viewport});
        }).catch(function() { /* keep placeholder */ });
      };
      requestAnimationFrame(tryRender);
    };
  </script>

            // Smooth scroll to card
            card.scrollIntoView({behavior:'smooth',block:'nearest'});

      // Click outside collapses

          expandedCard.classList.remove('expanded');

      // ── AppleCards Carousel (Two Sections) ──
      function openCardDetail(item){
        var overlay = document.getElementById('acDetailOverlay');
        var innerEl = document.getElementById('acDetailInner');
        if(!overlay || !innerEl) return;
        innerEl.innerHTML =
          '<div class="ac-detail-text">'+(item.desc || '')+'</div>'+
          '<div class="ac-detail-toolbar">'+
            '<button class="pdf-toolbar-btn" id="acDetailPrev" title="上一页">◀</button>'+
            '<span class="pdf-page-info" id="acDetailPageInfo">- / -</span>'+
            '<button class="pdf-toolbar-btn" id="acDetailNext" title="下一页">▶</button>'+
            '<div class="pdf-toolbar-spacer"></div>'+
            '<a class="pdf-download-btn" id="acDetailDownload" href="'+encodeURI(item.file)+'" download title="下载PDF">⬇</a>'+
          '</div>'+
          '<div class="ac-detail-window"><canvas id="acDetailCanvas" style="display:none;"></canvas><div class="pdf-loading" id="acDetailLoading">📄 加载中...</div></div>';
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';

        if(typeof pdfjsLib !== 'undefined'){
          var acCanvas = document.getElementById('acDetailCanvas');
          var acLoading = document.getElementById('acDetailLoading');
          var acPrev = document.getElementById('acDetailPrev');
          var acNext = document.getElementById('acDetailNext');
          var acPageInfo = document.getElementById('acDetailPageInfo');
          var acScale = 1.2;
          var acDoc = null;
          var acPage = 1;
          var acTotal = 0;

          function renderAcPage(){
            if(!acDoc) return;
            acDoc.getPage(acPage).then(function(page){
              var viewport = page.getViewport({scale: acScale});
              var dpr = Math.min(window.devicePixelRatio || 1, 2);
              acCanvas.height = Math.floor(viewport.height * dpr);
              acCanvas.width = Math.floor(viewport.width * dpr);
              acCanvas.style.height = viewport.height + 'px';
              acCanvas.style.width = '100%';
              acCanvas.style.maxWidth = viewport.width + 'px';
              var ctx = acCanvas.getContext('2d');
              ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
              page.render({canvasContext: ctx, viewport: viewport});
              acPageInfo.textContent = acPage + ' / ' + acTotal;
              acPrev.disabled = acPage <= 1;
              acNext.disabled = acPage >= acTotal;
              acCanvas.style.display = 'block';
              if(acLoading) acLoading.style.display = 'none';
            });
          }

          pdfjsLib.getDocument(item.file).promise.then(function(pdf){
            acDoc = pdf;
            acTotal = pdf.numPages;
            renderAcPage();
            if(acPrev) acPrev.addEventListener('click', function(){ if(acPage > 1){ acPage--; renderAcPage(); } });
            if(acNext) acNext.addEventListener('click', function(){ if(acPage < acTotal){ acPage++; renderAcPage(); } });
          }).catch(function(err){
            console.error('PDF load error:', err);
            if(acLoading) acLoading.textContent = '⚠️ 加载失败';
            acCanvas.style.display = 'none';
            var fb = document.createElement('a');
            fb.href = item.file; fb.target = '_blank';
            fb.textContent = '📄 点击在新标签页中查看 PDF';
            fb.style.cssText = 'color:var(--pink);text-decoration:none;font-family:JetBrains Mono,monospace;font-size:0.85rem;';
            acCanvas.parentNode.appendChild(fb);
          });
        } else {
          var acCanvas2 = document.getElementById('acDetailCanvas');
          if(acCanvas2) acCanvas2.style.display = 'none';
          var acLoading2 = document.getElementById('acDetailLoading');
          if(acLoading2) acLoading2.innerHTML = '<a href="'+encodeURI(item.file)+'" target="_blank" style="color:var(--pink);text-decoration:none;">📄 点击在新标签页中查看 PDF</a>';
        }
      }

      function closeCardDetail(){
        var overlay = document.getElementById('acDetailOverlay');
        if(overlay){ overlay.classList.remove('open'); }
        document.body.style.overflow = '';
      }

      // Bind overlay close after DOM ready
      window.addEventListener('DOMContentLoaded', function(){
        var overlay = document.getElementById('acDetailOverlay');
        var closeBtn = document.getElementById('acDetailClose');
        if(closeBtn) closeBtn.addEventListener('click', closeCardDetail);
        if(overlay) overlay.addEventListener('click', function(e){ if(e.target === overlay) closeCardDetail(); });
        document.addEventListener('keydown', function(e){ if(e.key === 'Escape' && overlay && overlay.classList.contains('open')) closeCardDetail(); });
      });

        {name:'西贝公关策略', file:'其他作品/研究与策划/西贝公关策略.pdf', desc:'<b>餐饮品牌公关策略</b> | 技能：公关策划、舆情分析、危机管理、品牌传播<br><br><b>项目概述</b>：以西贝餐饮品牌为研究对象，结合行业环境、品牌过往公关事件、全网舆论、消费者评价，分析品牌公关现状、现存风险与传播问题，运用公关理论设计危机公关、日常传播、用户沟通、品牌形象塑造全流程策略。<br><br><b>职责</b>：品牌背景梳理；公关事件复盘；舆情监测；消费者态度分析；公关问题诊断；公关策略与执行方案撰写。<br><br><b>核心动作</b>：①品牌与事件复盘——梳理西贝发展历程、经典公关案例、过往危机事件，复盘公关动作的效果与不足；②舆情与用户调研——收集消费者评价、网络舆论，分析大众对品牌菜品、服务、定价、企业文化、公关行为的态度。覆盖：到店顾客、线上消费者、网络网民、餐饮行业观察者；③公关问题诊断——总结品牌在危机应对、形象传播、用户沟通、舆论引导上的现存短板与潜在风险；④公关策略设计——分为日常品牌传播、突发危机公关、用户关系维护、企业文化传播四大模块设计落地策略。<br><br><b>发现</b>：西贝大众知名度高，服务形象是品牌核心标签，但近年菜品、定价争议增多；部分公关话题易引发舆论争议，危机响应速度与话术仍有优化空间；消费者对菜品口味、性价比关注度持续提升，服务优势逐渐弱化；亲子、家常菜等细分标签可作为品牌差异化传播方向。<br><br><b>分析方法</b>：案例分析法、舆情分析、消费者态度调研、公关理论应用、竞品对标分析。<br><br><b>解决方案</b>：从品牌公关部、门店端、新媒体运营、品牌IP打造四个层面，制定日常传播、危机应对、客情维护、品牌升级策略。<br><br>🏷️ 成果：西贝公关策略全案 · 过往公关案例复盘 · 品牌公关风险识别 · 长效公关体系与应急处理方案'}
      ];

      function buildCarousel(trackId, prevId, nextId, items){
        var track = document.getElementById(trackId);
        var prev = document.getElementById(prevId);
        var next = document.getElementById(nextId);
        if(!track) return;

        items.forEach(function(item, i){
          var card = document.createElement('div');
          card.className = 'ac-card border-glow-card';
          card.innerHTML =
            '<div class="ac-card-thumb" style="width:100%;height:200px;position:relative;overflow:hidden;background:#fff;">'+
              '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);z-index:0;">'+
                '<div style="text-align:center;">'+
                  '<div style="font-size:40px;margin-bottom:6px;">📄</div>'+
                  '<div style="font-size:12px;color:rgba(255,255,255,0.5);">'+item.name+'</div>'+
                '</div>'+
              '</div>'+
            '</div>'+
            '<div class="ac-card-info"><div class="ac-card-category">📄 文档 · PDF</div><h3 class="ac-card-title">'+item.name+'</h3></div>';
          card.addEventListener('click', function(){ openCardDetail(item); });
          track.appendChild(card);
          window.renderPDFThumb(item.file, card.querySelector('.ac-card-thumb'));
        });

        prev.addEventListener('click', function(){ scrollPaused=true; track.scrollBy({left:-250,behavior:'smooth'}); setTimeout(function(){scrollPaused=false;},1500); });
        next.addEventListener('click', function(){ scrollPaused=true; track.scrollBy({left:250,behavior:'smooth'}); setTimeout(function(){scrollPaused=false;},1500); });
      }

      buildCarousel('acTrack', 'acPrev', 'acNext', docFiles);

      // ── Video works ──
      var videoWorks = [
        {name:'AIGC短视频创作', cover:'封面/智能传播-时代少年团-封面.jpg', link:'https://pan.quark.cn/s/90bb6d3adc6d', desc:'<b>AIGC创意MV</b> | 技能：AIGC生图、AI视频生成、智能剪辑、特效合成<br><br><b>项目概述</b>：依托AIGC人工智能创作技术，独立完成创意MV全流程制作。结合音乐曲风、主题内涵与艺术表达需求，运用AI生图、AI视频生成、智能剪辑、特效合成等工具，完成MV视觉构思、画面产出、镜头编排、后期包装等工作，打造风格统一、富有艺术感与创意的音乐视觉作品，探索AIGC在音视频艺术领域的落地应用。<br><br><b>职责</b>：创意主题策划；视觉风格定位；分镜脚本创作；AIGC素材生成；镜头剪辑；特效与动效制作；音画同步调校；整体成片优化与输出。<br><br><b>核心动作</b>：①创意与脚本规划——结合歌曲旋律、歌词意境与曲风，确定MV核心主题、叙事脉络与整体视觉风格，规划完整镜头序列、场景转换与情绪递进逻辑，撰写标准化分镜脚本。覆盖：曲风适配视觉设计、故事线搭建、镜头节奏规划、画面情绪匹配；②AIGC视觉素材创作——根据分镜要求，使用AI图像、AI视频生成工具，批量制作场景、人物、动态画面、氛围镜头等原创素材，调整画面构图、色彩、光影、动态效果，匹配歌曲情绪。覆盖：主视觉画面、动态镜头、转场素材、氛围特效、虚拟场景搭建；③视频剪辑与音画匹配——对AIGC生成的各类素材进行筛选、拼接与剪辑，严格按照音乐鼓点、旋律起伏切换镜头，把控画面节奏，实现音频与视觉画面高度同步；④后期包装与特效优化——添加动态特效、滤镜、调色、字幕、光影效果，统一全片视觉色调，优化画面衔接与转场，强化艺术氛围感，打磨细节直至成片达标。<br><br><b>发现</b>：AIGC可高效产出海量原创视觉素材，大幅缩短MV前期拍摄、实景置景的周期，灵活实现现实中难以搭建的奇幻、抽象、赛博等创意场景；AI生成画面存在动态连贯性不足、细节瑕疵等问题，需通过剪辑、补帧、特效修饰进行优化；不同曲风适配的视觉风格差异极大，抒情曲风侧重慢镜头与氛围感，潮流、电子曲风更适合快切镜头与动感视觉；音画同步是MV核心要点，镜头切换、画面动态必须贴合音乐节奏，才能提升整体观感与沉浸感。<br><br><b>创作&制作方法</b>：主题创意策划、分镜脚本设计、AIGC图像/视频生成、智能剪辑、动态特效制作、画面调色、音画同步调校、视频后期包装。<br><br><b>解决方案</b>：前期细化分镜与关键词描述，精准向AIGC工具下达创作指令，提升原生画面匹配度，减少后期修改量；针对AI画面动态缺陷，采用补帧、慢放、转场特效、多层画面叠加等方式优化连贯性；根据歌曲情绪分段调色，区分前奏、主歌、副歌、桥段的视觉氛围，用色彩烘托情感；严格卡点剪辑，依据节拍设计镜头切换速度与运动方式，强化MV节奏感；精简多余画面，保留核心创意镜头，保证整体叙事流畅、主题突出。<br><br>🏷️ 成果：完整版AIGC创意MV成片 · 全套分镜脚本 · AI创作关键词文档 · 原始视觉素材 · 掌握AIGC全流程视频创作技巧'},
        {name:'纪录片创作', cover:'封面/屏幕截图 2026-06-07 195847.png', link:'https://pan.quark.cn/s/de892aa7347f', desc:'<b>纪实纪录片《烟火收藏家》</b> | 技能：纪录片策划、纪实拍摄、叙事剪辑、情绪包装<br><br><b>项目概述</b>：打造纪实类纪录片《烟火收藏家》，以街头邀约陌生人书写明信片为主线进行全程跟拍记录。影片聚焦人间烟火与平凡温情，深度捕捉不同陌生人的故事、情绪与心声，兼具纪实质感与浓厚情绪价值，完整呈现从前期筹备、街头寻访、互动交流到收集明信片的全过程，用镜头定格普通人的细碎美好与内心独白，打造一部治愈且富有温度的纪实作品。<br><br><b>职责</b>：纪录片整体策划；拍摄脚本撰写；现场跟拍；画面录制；人物访谈抓拍；素材整理剪辑；情绪镜头筛选；字幕与配乐搭配；成片叙事梳理；整体调色与成片输出。<br><br><b>核心动作</b>：①前期策划与脚本筹备——明确纪录片主题、叙事主线与情绪基调，规划拍摄路线、寻访场景、采访话术，划分开篇、寻访、互动、收尾等叙事段落，梳理镜头拍摄清单，确定镜头风格与情绪表达方向。覆盖：城市街头、社区、商圈、公园等多元户外场景，不同年龄、职业、生活背景的普通人群；②全程纪实拍摄——实地开展跟拍工作，记录行走寻访的全过程，自然抓拍邀约陌生人、沟通交流、对方书写明信片的真实画面，同步录制同期声、简短访谈与人物神态，保留最真实的现场状态。覆盖：路人偶遇、主动沟通、提笔书写、分享心事、挥手道别等全流程画面，人物微表情、环境氛围、城市烟火场景；③素材筛选与叙事剪辑——梳理海量原始拍摄素材，围绕"温情、治愈、人间烟火"的核心情绪筛选镜头，按照时间线与故事逻辑剪辑成片，串联起一段段陌生人的小故事，强化叙事连贯性与情绪递进；④后期情绪包装——搭配贴合影片调性的背景音乐、环境音，添加走心字幕与旁白，对画面进行调色优化，烘托温暖治愈的氛围，放大镜头背后的情绪价值，打磨细节完成最终成片。<br><br><b>发现</b>：不同身份、年龄的陌生人，在明信片上留下的文字风格、内心想法截然不同，每一段内容都是独属于个人的生活感悟与情绪表达；街头互动过程充满随机性，多数陌生人友善且愿意参与，短暂交流中能感受到人与人之间的善意与温暖；城市街头的市井场景、路人的自然神态，是烘托"烟火气"的核心元素，能极大提升纪录片的真实感与感染力；碎片化的互动故事串联后，整体情绪层层递进，平凡的小事最容易引发观众情感共鸣。<br><br><b>创作&制作方法</b>：纪实拍摄、人物抓拍、同期声收录、叙事剪辑、旁白撰写、配乐搭配、画面调色、字幕制作、情绪氛围营造。<br><br><b>解决方案</b>：保留大量原生态现场画面与同期声，减少刻意摆拍，最大化还原街头互动的真实感，夯实纪实内核；按照"寻访—交流—书写—道别"的叙事节奏编排镜头，穿插不同人物的明信片内容，让故事层次更丰富；选用轻柔、治愈系背景音乐，搭配城市环境白噪音，动静结合烘托烟火氛围与温情情绪；精简冗余镜头，重点突出人物神态、书写细节与走心文字，强化影片情绪价值；搭配简短走心旁白串联全篇，点明"收集烟火、收藏温柔"的影片主题。<br><br>🏷️ 成果：纪录片《烟火收藏家》完整成片 · 全套拍摄脚本与原始音视频素材 · 数十份陌生人明信片与暖心故事'},
        {name:'宣传片创作', cover:'封面/屏幕截图 2026-06-07 200149.png', link:'https://pan.quark.cn/s/8b7279c62108', desc:'<b>岳州扇非遗主题宣传片</b> | 技能：宣传片策划、纪实拍摄、叙事剪辑、非遗传播<br><br><b>项目概述</b>：本次制作岳州扇非遗主题宣传片，以岳州扇非遗传承人为核心叙事主线，通过纪实镜头结合品牌宣传手法，真实记录传承人的日常劳作、制扇技艺、坚守历程与心路历程。影片融合非遗文化底蕴、匠人精神与品牌内涵，全方位展现岳州扇的工艺魅力、历史价值以及当代传承现状，打造兼具文化质感、故事性与传播力的非遗宣传片，助力岳州扇传统文化推广与非遗活化。<br><br><b>职责</b>：宣传片整体策划；叙事脚本与分镜设计；实地取景拍摄；人物纪实跟拍；采访录制；素材筛选剪辑；文案与旁白撰写；配乐、字幕、包装制作；画面调色与成片优化输出。<br><br><b>核心动作</b>：①前期策划与脚本创作——深挖岳州扇历史渊源、制作工艺、非遗价值以及传承人的个人经历，确定宣传片叙事结构与整体风格，划分故事篇章，撰写拍摄脚本、采访提纲与旁白文案，规划室内工坊、户外古街等拍摄场景。覆盖：制扇全工序场景、传承人生活场景、岳州扇历史展示区、民俗文化场景；②纪实拍摄与人物采访——深入非遗工坊及相关场地，全程跟拍传承人裁料、造型、裱糊、绘画等全套制扇工序，抓拍手部细节、神态动作；面对面进行深度访谈，记录传承人对于技艺传承、行业现状、未来发展的所思所想，同步收录现场环境音；③素材整合与叙事剪辑——梳理拍摄的影像、音频素材，按照"匠人故事+工艺展示+文化传承"的逻辑剪辑成片，串联起人物经历、制扇技艺、非遗困境与坚守故事，把控影片叙事节奏；④后期包装与氛围营造——匹配古风、雅致的背景音乐，添加字幕、片名、非遗标识，对画面进行调色处理，强化传统国风质感；优化采访片段、转场效果，搭配解说旁白升华主题，完成全片包装。<br><br><b>发现</b>：岳州扇制作工序繁复，每一道工序都考验匠人耐心与手艺，手工技艺蕴含着独有的传统匠心；非遗传承人常年坚守传统手艺，在时代发展下面临人才断层、市场狭小等现实困境，同时也始终保有传承技艺的初心；岳州扇兼具实用价值与艺术美学，扇面书画、造型设计都是地域民俗文化的载体；以人物故事为切入点的叙事形式，更易打动观众，让大众理解非遗、走近非遗。<br><br><b>创作&制作方法</b>：纪实拍摄、特写镜头运用、人物访谈、叙事剪辑、旁白创作、古风配乐搭配、画面调色、视觉包装、非遗内容呈现。<br><br><b>解决方案</b>：多用特写镜头聚焦制扇手部动作、扇面纹样等细节，直观展现岳州扇精湛工艺，突出技艺之美；以传承人的人生故事作为主线，穿插工艺展示、历史介绍，做到故事与文化相融，增强影片感染力；整体采用素雅国风调色，搭配古典民乐与工坊环境音，营造古朴沉静的氛围，贴合非遗调性；结合采访内容提炼核心观点，用旁白升华传承精神，传递守护传统文化的主题；控制影片节奏，快慢镜头结合，劳作镜头沉稳舒缓、人物故事段落富有情感起伏，兼顾观赏性与文化深度。<br><br>🏷️ 成果：岳州扇非遗宣传片正片 · 拍摄脚本与分镜图 · 采访素材与旁白文案 · 可用于线下展播与线上传播的视觉物料'},
        {name:'深度访谈报告', cover:'封面/屏幕截图 2026-06-07 200639.png', link:'https://pan.quark.cn/s/857a192bde89', desc:'<b>国际援助主题采访视频</b> | 技能：采访策划、深度访谈、素材整合、叙事剪辑<br><br><b>项目概述</b>：本次负责国际援助主题采访视频全流程制作工作，以一线国际援助者为核心采访对象，通过面对面深度访谈挖掘援助经历、工作感悟与心路历程，同时搜集整合海内外相关影像、纪实素材，将人物口述与实景画面相结合，打造内容真实、立意深刻的主题视频。视频全方位展现国际援助工作的日常、价值与奉献精神，传递人道主义理念，兼具纪实性、感染力与传播价值。<br><br><b>职责</b>：视频整体策划；采访提纲设计；现场采访录制；相关素材搜集与筛选；音视频素材整理；视频剪辑；字幕、配乐与后期包装；成片校对与输出。<br><br><b>核心动作</b>：①前期策划与采访筹备——明确视频主题、叙事框架与整体基调，结合国际援助工作背景设计结构化采访提纲，涵盖工作经历、现场故事、困难挑战、个人感悟、行业看法等板块；同时梳理素材方向，规划画面内容清单。覆盖：不同地区、不同援助领域的援助者，援助工作纪实画面、公益影像、新闻片段、环境场景等素材；②现场采访录制——对接采访对象，开展一对一深度访谈，全程录制画面与同期声，灵活引导受访者分享真实故事与内心想法，同步捕捉人物神态、表情，保证采访内容完整、情绪自然；③全网素材搜集整理——依据视频内容需求，检索国内外公开纪实视频、新闻报道、现场影像、公益短片等相关素材，完成下载、分类、去重与初筛，剔除无效、模糊画面，留存适配镜头；④视频剪辑与内容融合——以采访音频、画面为主线，穿插补充搜集的外部素材，按照叙事逻辑剪辑拼接，合理切换采访镜头与实景画面，把控整体叙事节奏，让口述内容与影像画面相互呼应；⑤后期优化包装——搭配庄重、温情的背景音乐，添加中英双语字幕、标题与图文注解，调整画面色调，优化转场效果，校对音画同步问题，完成全片最终包装。<br><br><b>发现</b>：国际援助工作环境复杂，援助者普遍经历过艰苦条件、突发状况等挑战，但始终秉持人道主义初心；受访者的亲身故事细节饱满，真实经历远比文字描述更具感染力，是视频核心情感亮点；外部素材类型丰富，但存在分辨率、画幅、风格不统一的问题，需要后期统一调校；不同援助领域、不同地域的工作场景差异较大，合理搭配素材能让观众更直观理解工作全貌。<br><br><b>创作&制作方法</b>：访谈录制、影像素材搜集、素材分类筛选、叙事剪辑、音画同步、字幕制作、配乐搭配、画面调色、视频后期包装。<br><br><b>解决方案</b>：采访环节多采用中近景与特写镜头，捕捉人物情绪，保留原汁原味的口述内容，不刻意修饰台词；对搜集的外部素材进行画幅、分辨率统一处理，根据采访内容精准匹配对应场景画面，做到声画合一；区分段落节奏：故事讲述部分放缓节奏、搭配温情配乐，工作纪实部分节奏紧凑，强化现场氛围感；增设简短文字注解，补充背景信息，帮助观众理解国际援助相关背景；统一全片画面色调，整体采用沉稳大气的视觉风格，贴合主题调性。<br><br>🏷️ 成果：国际援助主题采访视频成片 · 完整采访素材与外部影像资料库 · 采访提纲 · 内容详实、情感真挚的主题视频'},
        {name:'自制故事', cover:'封面/屏幕截图 2026-06-07 200838.png', link:'https://pan.quark.cn/s/1e51ee678153', desc:'<b>职业病主题创意短视频</b> | 技能：原创脚本、多镜头拍摄、特效包装、剪辑<br><br><b>项目概述</b>：独立创作并拍摄制作职业病主题创意短视频，自主完成全套脚本撰写工作，围绕职场职业病相关现象、体验与感悟搭建内容框架。拍摄阶段运用多镜头切换、远景与近景结合的运镜手法丰富画面层次，剪辑过程中搭配多元化视频特效进行包装美化，打造内容风趣、画面富有视觉冲击力的原创短视频，生动演绎职场人常见职业病，增强内容趣味性与观赏性。<br><br><b>职责</b>：原创脚本撰写；内容构思与情节设计；分镜规划；现场拍摄执行；镜头调度；素材粗剪与精剪；特效添加与调试；画面整体优化；成片审核输出。<br><br><b>核心动作</b>：①脚本原创创作——结合职场日常、典型职业病表现进行内容构思，设计台词、情节、画面桥段与叙事节奏，完成完整视频脚本，明确每段内容的表达重点、情绪风格与镜头要求。覆盖：职场常见行为、职业病具象表现、趣味互动、内心独白等内容板块；②分镜与拍摄规划——根据脚本内容划分镜头段落，规划多机位、多景别的拍摄方案，确定远景、中景、近景、特写的使用场景，设计镜头切换逻辑，明确拍摄顺序与画面风格；③实景拍摄执行——按照分镜方案完成拍摄工作，灵活切换镜头角度与景别，远景展现整体场景与状态，近景、特写捕捉人物神态、肢体细节，全程把控画面稳定性与表演效果，收集充足原始拍摄素材；④多镜头剪辑处理——对拍摄素材进行筛选、排序与剪辑，依据情节节奏频繁切换不同镜头，将远景、近景、特写镜头穿插组合，优化转场衔接，让画面节奏贴合内容表达；⑤多元特效包装——根据视频风格与段落氛围，添加动态转场、滤镜、动态贴纸、光影特效、文字动效、变速效果等多种视频特效，区分不同桥段的视觉风格，提升整体视觉表现力。<br><br><b>发现</b>：远近景搭配能形成视觉反差，远景交代环境与整体状态，近景和特写放大细节与情绪，让内容表达更立体；多镜头切换可以有效避免画面单调，配合情节快慢调整切换频率，能很好地把控视频节奏；不同特效适配的场景不同，趣味特效适合搞笑桥段，光影、氛围特效适合情绪片段，滥用特效会打乱整体观感；脚本逻辑是视频核心，镜头、特效都需要围绕脚本内容服务，才能保证作品主题清晰。<br><br><b>创作&制作方法</b>：原创脚本创作、分镜设计、多景别拍摄、多镜头剪辑、镜头转场设计、各类视频特效应用、画面调色、动态字幕制作、成片整体调校。<br><br><b>解决方案</b>：脚本上结合生活化场景与趣味演绎，贴合大众职场共鸣点，同时划分不同情节段落，适配差异化镜头与特效设计；拍摄阶段做到景别互补：用远景展示办公整体环境，近景聚焦人物动作、面部表情，特写突出职业病典型肢体细节；剪辑时根据情节节奏调整镜头切换速度，轻松桥段加快切镜节奏，走心独白段落放缓镜头切换，保证观感舒适；分类运用特效：搞笑段落使用趣味转场、动态贴纸，情绪段落搭配光影、渐变特效，文字内容添加动态字幕特效，做到特效与内容相融；统一全片画面色调，特效风格保持整体协调，避免特效堆砌，以内容表达为核心。<br><br>🏷️ 成果：原创职业病主题短视频成片 · 完整文字脚本与分镜方案 · 全部原始拍摄素材 · 多镜头远近景结合与多样化特效包装'},

        videoWorks.forEach(function(item, i){
          var card = document.createElement('div');
          card.className = 'ac-card border-glow-card';
          card.innerHTML =
            '<div class="ac-card-thumb" style="width:100%;height:200px;position:relative;overflow:hidden;background:#fff;">'+
              '<img src="'+item.cover+'" alt="'+item.name+'" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy">'+
              '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2);opacity:0;transition:opacity 0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">'+
                '<div style="width:48px;height:48px;border-radius:50%;background:rgba(239,76,172,0.85);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;">▶</div>'+
              '</div>'+
            '</div>'+
            '<div class="ac-card-info"><div class="ac-card-category">🎬 视频</div><h3 class="ac-card-title">'+item.name+'</h3></div>';
          card.addEventListener('click', function(){ openVideoDetail(item); });
          track.appendChild(card);
        });

        prev.addEventListener('click', function(){ scrollPaused=true; track.scrollBy({left:-250,behavior:'smooth'}); setTimeout(function(){scrollPaused=false;},1500); });
        next.addEventListener('click', function(){ scrollPaused=true; track.scrollBy({left:250,behavior:'smooth'}); setTimeout(function(){scrollPaused=false;},1500); });
      }

      function openVideoDetail(item){
        var overlay = document.getElementById('videoOverlay');
        var inner = document.getElementById('videoOverlayInner');
        if(!overlay || !inner) return;
        inner.innerHTML =
          '<div style="max-width:900px;margin:0 auto;">'+
            '<div style="float:left;width:45%;min-width:280px;margin:0 28px 20px 0;">'+
              '<div style="aspect-ratio:16/9;background:#1a1a2e;border-radius:12px;overflow:hidden;">'+
                '<img src="'+item.cover+'" alt="'+item.name+'" style="width:100%;height:100%;object-fit:cover;">'+
              '</div>'+
              (item.link?'<a href="'+item.link+'" target="_blank" style="display:block;text-align:center;color:#fff;text-decoration:none;font-family:JetBrains Mono,monospace;font-size:0.85rem;background:var(--pink);padding:10px 28px;border-radius:999px;margin-top:14px;transition:all 0.25s;" onmouseover="this.style.boxShadow=\'0 0 20px rgba(239,76,172,0.4)\'" onmouseout="this.style.boxShadow=\'none\'">🔗 观看视频</a>':'<div style="text-align:center;margin-top:14px;color:var(--text-secondary);font-size:0.8rem;">🔗 链接待补充</div>')+
            '</div>'+
            '<h3 style="color:#fff;font-family:Inter,sans-serif;font-size:1.4rem;margin:0 0 14px;">'+item.name+'</h3>'+
            '<div class="ac-detail-text" style="padding:0;line-height:2;">'+(item.desc || '')+'</div>'+
            '<div style="clear:both;"></div>'+
          '</div>';
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeVideoOverlay(){
        var overlay = document.getElementById('videoOverlay');
        if(overlay){ overlay.classList.remove('open'); }
        document.body.style.overflow = '';
      }

      // Bind video overlay close after DOM ready
      window.addEventListener('DOMContentLoaded', function(){
        var overlay = document.getElementById('videoOverlay');
        var closeBtn = document.getElementById('videoOverlayClose');
        if(closeBtn) closeBtn.addEventListener('click', closeVideoOverlay);
        if(overlay) overlay.addEventListener('click', function(e){ if(e.target === overlay) closeVideoOverlay(); });
        document.addEventListener('keydown', function(e){ if(e.key === 'Escape' && overlay && overlay.classList.contains('open')) closeVideoOverlay(); });
      });

      buildVideoCarousel();

      var tracks = [
        {el:document.getElementById('acTrack'), speed:-0.9},
        {el:document.getElementById('videoTrack'), speed:-0.7}
      ];
      var scrollPaused = false;

      function autoScroll(){
        if(!scrollPaused){
          tracks.forEach(function(t){
            if(!t.el) return;
            t.el.scrollLeft += t.speed;
            // Loop: reset when reaching end
            if(t.speed > 0 && t.el.scrollLeft >= t.el.scrollWidth - t.el.clientWidth - 10){
              t.el.scrollLeft = 0;
            }
            if(t.speed < 0 && t.el.scrollLeft <= 10){
              t.el.scrollLeft = t.el.scrollWidth - t.el.clientWidth;
            }
          });
        }
        requestAnimationFrame(autoScroll);
      }

      tracks.forEach(function(t){
        if(!t.el) return;
        t.el.addEventListener('mouseenter', function(){ scrollPaused = true; });
        t.el.addEventListener('mouseleave', function(){ scrollPaused = false; });
        t.el.addEventListener('touchstart', function(){ scrollPaused = true; });
        t.el.addEventListener('touchend', function(){ scrollPaused = false; });
      });

      autoScroll();

      // Escape collapses campus card
      document.addEventListener('keydown',(e)=>{
        if(e.key === 'Escape' && expandedCard){
          expandedCard.classList.remove('expanded');
          expandedCard = null;
        }
      });

    })();

        {org:'2025.10 - 2025.12 · 秋叶集团',role:'AI 内容策划',focus:'<b>智能体策划：</b>基于 Coze 平台独立设计并上线 6 类 AI 智能体，覆盖剧情生成、人设设计、活动文案、社区互动等内容场景。<br><br><b>Prompt调试：</b>持续迭代 Prompt 策略与参数配置，沉淀可复用提示词模板体系，显著提升内容生成准确度与稳定性。<br><br><b>效果展示：</b>结合平台传播规律优化内容节奏与选题方向，最终推动短视频点击率提升 20%、ROI 提升 200%。<br><br><a href="https://www.coze.cn/store/project/7589201646908031039?entity_id=1&bid=6k2mk1ik1g1a&share=1&from=wechat" target="_blank" style="display:block;text-align:center;color:#fff;text-decoration:none;font-family:JetBrains Mono,monospace;font-size:0.82rem;background:#ef4cac;padding:8px 18px;border-radius:999px;transition:all 0.25s;margin:0 auto" onmouseover="this.style.boxShadow=\'0 0 20px rgba(239,76,172,0.4)\'" onmouseout="this.style.boxShadow=\'none\'">🔗 查看网站</a>',kpi:'',desc:''},

      cards.forEach((card,i)=>{

        const d = document.createElement('span');
        d.className = 'book-dot'+(i===0?' active':'');

      nextBtn.className = 'book-arrow'; nextBtn.textContent = '→';
      nav.appendChild(nextBtn);

      pageNum.className = 'page-num';
      pageNum.textContent = '1 / '+totalPages;
      nav.appendChild(pageNum);

      function updateUI(){
        document.querySelectorAll('.book-page').forEach((p,i)=>{
          if(i<currentPage) p.classList.add('flipped');
          else p.classList.remove('flipped');
          p.style.zIndex = i<currentPage ? 0 : totalPages-i;
        });
        document.querySelectorAll('.book-dot').forEach((d,i)=>d.classList.toggle('active',i===currentPage));
        pageNum.textContent = (currentPage+1)+' / '+totalPages;
      }

      function goToPage(idx){
        if(idx<0||idx>=totalPages) return;
        currentPage = idx;
        updateUI();
      }

      prevBtn.addEventListener('click',()=>goToPage(currentPage-1));
      nextBtn.addEventListener('click',()=>goToPage(currentPage+1));

    <div class="pdf-viewer-toolbar" id="pdfToolbar">
